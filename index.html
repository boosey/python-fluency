<script>
/* narrate.js — reusable voice-over for course lessons.
 *
 * Uses the browser's built-in Web Speech API (speechSynthesis). No install, no
 * network, works offline in any modern browser.
 *
 * Usage in a lesson:
 *   1. Add a hidden narration script:
 *        <div id=&quot;narration&quot; hidden>
 *          First sentence of the voice-over. Second sentence. ...
 *        </div>
 *      Split narration into sentences ending in . ! or ? — each becomes one
 *      utterance so pause/stop are responsive and Chrome's long-utterance bug
 *      (it silently stops after ~15s) is avoided.
 *   2. Include this script: <script src=&quot;../assets/narrate.js&quot; defer><\/script>
 *
 * The control bar (Play / Pause / Stop, speed, voice) is injected automatically.
 */
(function () {
  &quot;use strict&quot;;

  if (!(&quot;speechSynthesis&quot; in window)) {
    document.addEventListener(&quot;DOMContentLoaded&quot;, function () {
      var bar = document.createElement(&quot;div&quot;);
      bar.className = &quot;narrator-bar&quot;;
      bar.style.cssText = barCss() + &quot;;color:#b23b3b&quot;;
      bar.textContent = &quot;Voice-over unavailable: this browser has no speech synthesis.&quot;;
      document.body.appendChild(bar);
    });
    return;
  }

  var synth = window.speechSynthesis;
  var chunks = [];      // sentences to speak
  var idx = 0;          // current sentence index
  var playing = false;
  var paused = false;
  var voices = [];
  var chosenVoice = null;
  var rate = 1.0;
  var els = {};
  var watchdog = null;   // fallback timer for voices that never fire `onend`
  var heartbeat = null;  // periodic resume() to defeat Chrome's ~15s stall

  function clearTimers() {
    if (watchdog) { clearTimeout(watchdog); watchdog = null; }
    if (heartbeat) { clearInterval(heartbeat); heartbeat = null; }
  }

  function barCss() {
    return [
      &quot;position:fixed&quot;, &quot;top:0&quot;, &quot;left:0&quot;, &quot;right:0&quot;, &quot;z-index:1000&quot;,
      &quot;display:flex&quot;, &quot;gap:.5rem&quot;, &quot;align-items:center&quot;,
      &quot;padding:.5rem .9rem&quot;,
      &quot;background:rgba(253,252,249,.92)&quot;, &quot;backdrop-filter:blur(6px)&quot;,
      &quot;border-bottom:1px solid #e3e0d8&quot;,
      &quot;font-family:ui-sans-serif,system-ui,sans-serif&quot;, &quot;font-size:.85rem&quot;
    ].join(&quot;;&quot;);
  }

  function btn(label, title) {
    var b = document.createElement(&quot;button&quot;);
    b.textContent = label;
    b.title = title || label;
    b.style.cssText =
      &quot;font:inherit;cursor:pointer;border:1px solid #cfcabb;background:#fff;&quot; +
      &quot;border-radius:6px;padding:.25rem .6rem;color:#1a1a1a&quot;;
    return b;
  }

  function loadNarration() {
    var src = document.getElementById(&quot;narration&quot;);
    if (!src) return [];
    var text = src.textContent.replace(/\s+/g, &quot; &quot;).trim();
    if (!text) return [];
    // Split into sentences, keeping the terminal punctuation.
    var parts = text.match(/[^.!?]+[.!?]+(\s|$)|[^.!?]+$/g) || [text];
    return parts.map(function (s) { return s.trim(); }).filter(Boolean);
  }

  function pickDefaultVoice() {
    if (!voices.length) return null;
    // Prefer an English voice; fall back to the first available.
    var en = voices.filter(function (v) { return /^en(-|_|$)/i.test(v.lang); });
    var pool = en.length ? en : voices;
    // Prefer a LOCAL (on-device) voice. Chrome's remote Google voices fire
    // `onend` unreliably — usually not at all between back-to-back utterances —
    // which stalls the sentence-by-sentence chain after the first line. Local
    // voices fire it dependably, so use them first.
    var local = pool.filter(function (v) { return v.localService; });
    return local[0] || pool[0];
  }

  function startHeartbeat() {
    if (heartbeat) clearInterval(heartbeat);
    // Chrome silently pauses synthesis after ~15s; a periodic resume() keeps
    // long sentences (and the queue) alive.
    heartbeat = setInterval(function () {
      if (playing &amp;&amp; !paused &amp;&amp; synth.speaking) synth.resume();
    }, 10000);
  }

  function speakFrom(i) {
    if (i >= chunks.length) { stop(); return; }
    idx = i;
    var advanced = false;            // guard: advance to the next chunk once
    function next() {
      if (advanced) return;
      advanced = true;
      if (watchdog) { clearTimeout(watchdog); watchdog = null; }
      if (playing &amp;&amp; !paused) speakFrom(idx + 1);
    }

    var u = new SpeechSynthesisUtterance(chunks[i]);
    if (chosenVoice) u.voice = chosenVoice;
    u.rate = rate;
    u.onend = next;                  // fast path: advance the moment it ends
    u.onerror = next;                // a failed/cancelled chunk: skip ahead
    var started = false;
    u.onstart = function () { started = true; };
    synth.speak(u);

    // Fallback for voices that never fire `onend` (notably Chrome's remote
    // Google voices): poll `speaking` every 250ms and advance as soon as the
    // engine has spoken and gone quiet, so the gap between lines stays short
    // instead of stalling. A per-line hard cap covers an engine that never
    // starts at all.
    var words = chunks[i].split(/\s+/).length;
    var hardCapMs = (words / 2.0) * 1000 + 8000;
    var elapsed = 0, step = 250;
    function poll() {
      if (advanced) return;
      if (paused) { watchdog = setTimeout(poll, step); return; }
      if (synth.speaking) started = true;
      elapsed += step;
      if (!playing || (started &amp;&amp; !synth.speaking) || elapsed >= hardCapMs) { next(); return; }
      watchdog = setTimeout(poll, step);
    }
    watchdog = setTimeout(poll, step);
  }

  function play() {
    if (!chunks.length) return;
    if (paused) { synth.resume(); paused = false; setState(); return; }
    if (playing) return;
    synth.cancel();
    playing = true; paused = false;
    startHeartbeat();
    speakFrom(idx >= chunks.length ? 0 : idx);
    setState();
  }
  function pause() {
    if (!playing || paused) return;
    synth.pause(); paused = true; setState();
  }
  function stop() {
    // Set state BEFORE cancel(): cancelling can synchronously fire the current
    // utterance onend/onerror, and if playing were still true that handler
    // would speak the next sentence — the press-Stop-hear-the-next-line bug.
    playing = false; paused = false; idx = 0;
    clearTimers();
    synth.cancel();
    setState();
  }

  function setState() {
    els.play.textContent = paused ? &quot;▶ Resume&quot; : (playing ? &quot;❚❚ Pause&quot; : &quot;▶ Play narration&quot;);
    els.play.onclick = (playing &amp;&amp; !paused) ? pause : play;
    els.stop.disabled = !playing;
    els.stop.style.opacity = playing ? &quot;1&quot; : &quot;.5&quot;;
  }

  function buildBar() {
    chunks = loadNarration();

    var bar = document.createElement(&quot;div&quot;);
    bar.className = &quot;narrator-bar&quot;;
    bar.style.cssText = barCss();

    var label = document.createElement(&quot;strong&quot;);
    label.textContent = &quot;🔊 Voice-over&quot;;
    label.style.cssText = &quot;color:#3a5a78;margin-right:.3rem&quot;;

    els.play = btn(&quot;▶ Play narration&quot;);
    els.stop = btn(&quot;■ Stop&quot;);
    els.stop.onclick = stop;

    // Speed control
    var speedWrap = document.createElement(&quot;label&quot;);
    speedWrap.style.cssText = &quot;display:flex;align-items:center;gap:.3rem;color:#6b6b6b&quot;;
    speedWrap.append(&quot;speed&quot;);
    var speed = document.createElement(&quot;input&quot;);
    speed.type = &quot;range&quot;; speed.min = &quot;0.7&quot;; speed.max = &quot;1.4&quot;; speed.step = &quot;0.1&quot;; speed.value = &quot;1&quot;;
    speed.style.width = &quot;70px&quot;;
    var speedVal = document.createElement(&quot;span&quot;);
    speedVal.textContent = &quot;1.0×&quot;; speedVal.style.minWidth = &quot;2.4em&quot;;
    speed.oninput = function () {
      rate = parseFloat(speed.value); speedVal.textContent = rate.toFixed(1) + &quot;×&quot;;
      if (playing &amp;&amp; !paused) { var resumeAt = idx; stop(); idx = resumeAt; play(); }
    };
    speedWrap.append(speed, speedVal);

    // Voice selector
    var voiceSel = document.createElement(&quot;select&quot;);
    voiceSel.style.cssText = &quot;font:inherit;max-width:11rem;border:1px solid #cfcabb;border-radius:6px;padding:.2rem&quot;;
    voiceSel.title = &quot;Narration voice&quot;;
    voiceSel.onchange = function () {
      chosenVoice = voices[parseInt(voiceSel.value, 10)] || null;
      if (playing) { var at = idx; stop(); idx = at; play(); }
    };
    els.voiceSel = voiceSel;

    var spacer = document.createElement(&quot;span&quot;);
    spacer.style.flex = &quot;1&quot;;

    bar.append(label, els.play, els.stop, speedWrap, spacer, voiceSel);
    document.body.appendChild(bar);

    // Push page content down so the fixed bar doesn't cover the title.
    document.body.style.paddingTop = &quot;2.6rem&quot;;

    setState();
    refreshVoices();
  }

  function refreshVoices() {
    voices = synth.getVoices();
    if (!els.voiceSel) return;
    els.voiceSel.innerHTML = &quot;&quot;;
    voices.forEach(function (v, i) {
      var o = document.createElement(&quot;option&quot;);
      o.value = i; o.textContent = v.name + &quot; (&quot; + v.lang + &quot;)&quot;;
      els.voiceSel.appendChild(o);
    });
    if (!chosenVoice) chosenVoice = pickDefaultVoice();
    if (chosenVoice) els.voiceSel.value = String(voices.indexOf(chosenVoice));
  }

  // Voices load asynchronously in most browsers.
  if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = refreshVoices;

  // Stop narration when leaving the page (otherwise it keeps talking).
  window.addEventListener(&quot;beforeunload&quot;, function () { synth.cancel(); });

  document.addEventListener(&quot;DOMContentLoaded&quot;, buildBar);
})();

</script>

<!-- Voice-over script. One sentence per utterance. Hidden from view. -->
<div id=&quot;narration&quot; hidden>
Welcome to lesson five: iteration and its built-ins.
Here is the headline that trips up almost every newcomer: Python has no C-style index loop.
There is no for-i-equals-zero, i-less-than-length, i-plus-plus.
Instead you iterate the object itself, directly, with for x in xs.
So the first reflex to unlearn is for i in range(len(xs)) followed by xs at i.
If you only need the items, just say for x in xs and reach for the value by name.
When you genuinely need the index too, wrap the iterable in enumerate.
Enumerate yields index-value pairs, and you can pass start equals one when you want human-friendly numbering.
To walk two sequences in lockstep, use zip, which pairs up their items and stops at the shorter one.
A lovely trick: zip star matrix transposes a matrix, turning rows into columns.
In Python three-ten and later, zip strict equals True raises if the inputs differ in length, catching silent bugs.
Python also has a control structure most languages lack entirely: for-else.
The else clause after a loop runs only if the loop finished without hitting a break, which is perfect for search-then-not-found logic.
When you want to walk backwards, reach for reversed rather than fiddling with negative indices.
When you want a different order, sorted takes a key function and a reverse flag, and returns a new list.
Iterating a dict gives you its keys by default; use dot items for key-value pairs, dot values for just the values.
Under all of this sits the iterator protocol: iter gives you an iterator, next pulls the following value, and StopIteration signals the end.
You rarely call those by hand, but knowing they exist explains why generators, which we meet later, fit so neatly.
And remember that range is lazy; it does not build a list, it produces numbers on demand as you iterate.
Take the quick checks below, then ask me anything that is still fuzzy.
</div>

<main>
  <div class=&quot;kicker&quot;>Lesson 05 · Idiomatic Python</div>
  <h1>Iteration &amp;amp; its built-ins</h1>
  <p class=&quot;lede&quot;>Python has no C-style index loop. You iterate objects directly —
  and a handful of built-ins make almost every &quot;I need the index too&quot; case
  index-free.</p>

  <p>You know how to loop. The win here is narrow and concrete: never reach for
  <code>range(len(xs))</code> again. Iterate the thing itself, and let
  <code>enumerate</code>, <code>zip</code>, and friends carry the bookkeeping.</p>

  <h2>The loop Python doesn't have</h2>
  <div class=&quot;contrast&quot;>
    <div class=&quot;col other&quot;>
      <h4>Most languages</h4>
<pre><code><span class=&quot;c-com&quot;>// index, bound, increment</span>
<span class=&quot;c-kw&quot;>for</span> (i = <span class=&quot;c-num&quot;>0</span>; i &amp;lt; xs.length; i++) {
    use(xs[i]);
}</code></pre>
    </div>
    <div class=&quot;col py&quot;>
      <h4>Idiomatic Python</h4>
<pre><code><span class=&quot;c-com&quot;># iterate the object directly</span>
<span class=&quot;c-kw&quot;>for</span> x <span class=&quot;c-kw&quot;>in</span> xs:
    use(x)</code></pre>
    </div>
  </div>

  <p>The first reflex to retire is <code>for i in range(len(xs)):</code> followed
  by <code>xs[i]</code>. If you only need the items, name them:
  <code>for x in xs</code>. The index was never the point — the value was.</p>

  <h2>When you really need the index: <code>enumerate</code></h2>
<pre><code><span class=&quot;c-com&quot;># index AND item, no manual counter</span>
<span class=&quot;c-kw&quot;>for</span> i, x <span class=&quot;c-kw&quot;>in</span> <span class=&quot;c-fn&quot;>enumerate</span>(xs):
    <span class=&quot;c-fn&quot;>print</span>(i, x)

<span class=&quot;c-com&quot;># human-friendly numbering starts at 1</span>
<span class=&quot;c-kw&quot;>for</span> rank, name <span class=&quot;c-kw&quot;>in</span> <span class=&quot;c-fn&quot;>enumerate</span>(winners, start=<span class=&quot;c-num&quot;>1</span>):
    <span class=&quot;c-fn&quot;>print</span>(f<span class=&quot;c-str&quot;>&quot;{rank}. {name}&quot;</span>)</code></pre>
  <p><code>enumerate(xs)</code> yields <code>(index, item)</code> pairs, which you
  unpack right in the <code>for</code> header. Pass <code>start=1</code> when the
  number is for people, not for indexing.</p>

  <div class=&quot;note&quot;><strong>The mental shift:</strong> the index is a <em>side
  product</em> of iteration, not the driver of it. You ask for it explicitly with
  <code>enumerate</code> when you need it, and otherwise it stays out of your way.</div>

  <h2>Two sequences at once: <code>zip</code></h2>
<pre><code><span class=&quot;c-com&quot;># walk in parallel; stops at the shorter input</span>
<span class=&quot;c-kw&quot;>for</span> name, score <span class=&quot;c-kw&quot;>in</span> <span class=&quot;c-fn&quot;>zip</span>(names, scores):
    <span class=&quot;c-fn&quot;>print</span>(name, score)

<span class=&quot;c-com&quot;># transpose a matrix: rows become columns</span>
rows = [[<span class=&quot;c-num&quot;>1</span>, <span class=&quot;c-num&quot;>2</span>, <span class=&quot;c-num&quot;>3</span>], [<span class=&quot;c-num&quot;>4</span>, <span class=&quot;c-num&quot;>5</span>, <span class=&quot;c-num&quot;>6</span>]]
cols = <span class=&quot;c-fn&quot;>list</span>(<span class=&quot;c-fn&quot;>zip</span>(*rows))   <span class=&quot;c-com&quot;># [(1, 4), (2, 5), (3, 6)]</span></code></pre>
  <p><code>zip</code> pairs items position-by-position and stops at the shortest
  argument. The <code>zip(*rows)</code> idiom spreads the rows as separate
  arguments, so column <code>k</code> is gathered from every row — a one-line
  transpose.</p>

  <div class=&quot;note&quot;><strong>Python 3.10+:</strong> pass <code>zip(a, b, strict=True)</code>
  to raise a <code>ValueError</code> when the inputs differ in length, instead of
  silently truncating to the shortest. Reach for it when &quot;same length&quot; is an
  invariant you want enforced.</div>

  <h2>A loop clause most languages lack: <code>for … else</code></h2>
<pre><code><span class=&quot;c-com&quot;># the else runs only if the loop did NOT break</span>
<span class=&quot;c-kw&quot;>for</span> item <span class=&quot;c-kw&quot;>in</span> haystack:
    <span class=&quot;c-kw&quot;>if</span> matches(item):
        found = item
        <span class=&quot;c-kw&quot;>break</span>
<span class=&quot;c-kw&quot;>else</span>:
    found = <span class=&quot;c-kw&quot;>None</span>   <span class=&quot;c-com&quot;># searched everything, no break ever fired</span></code></pre>
  <p>The <code>else</code> attached to a <code>for</code> (or <code>while</code>)
  runs <strong>only if the loop completed without hitting <code>break</code></strong>.
  Read it as &quot;for … else if-nothing-broke&quot;. It's the clean home for the
  searched-and-found-nothing branch.</p>

  <h2>Order, on demand: <code>reversed</code> and <code>sorted</code></h2>
<pre><code><span class=&quot;c-com&quot;># walk backwards without negative-index gymnastics</span>
<span class=&quot;c-kw&quot;>for</span> x <span class=&quot;c-kw&quot;>in</span> <span class=&quot;c-fn&quot;>reversed</span>(xs):
    ...

<span class=&quot;c-com&quot;># sorted returns a NEW list; key picks what to sort on</span>
by_len  = <span class=&quot;c-fn&quot;>sorted</span>(words, key=<span class=&quot;c-fn&quot;>len</span>)
by_high = <span class=&quot;c-fn&quot;>sorted</span>(scores, reverse=<span class=&quot;c-kw&quot;>True</span>)
people  = <span class=&quot;c-fn&quot;>sorted</span>(people, key=<span class=&quot;c-kw&quot;>lambda</span> p: p.age)</code></pre>
  <p><code>sorted</code> never mutates its argument — it returns a fresh list,
  so it composes inside expressions. <code>key</code> takes a function applied to
  each item to decide the order; <code>reverse=True</code> flips it.</p>

  <h2>Iterating a <code>dict</code></h2>
<pre><code><span class=&quot;c-com&quot;># iterating a dict gives its KEYS by default</span>
<span class=&quot;c-kw&quot;>for</span> key <span class=&quot;c-kw&quot;>in</span> prices:
    ...

<span class=&quot;c-kw&quot;>for</span> key, value <span class=&quot;c-kw&quot;>in</span> prices.items():   <span class=&quot;c-com&quot;># pairs</span>
    ...
<span class=&quot;c-kw&quot;>for</span> value <span class=&quot;c-kw&quot;>in</span> prices.values():     <span class=&quot;c-com&quot;># just values</span>
    ...
<span class=&quot;c-kw&quot;>for</span> key   <span class=&quot;c-kw&quot;>in</span> prices.keys():       <span class=&quot;c-com&quot;># explicit keys</span>
    ...</code></pre>
  <p>A bare <code>for k in d</code> walks the <em>keys</em>. When you want both
  sides, <code>.items()</code> is the idiom — never index back into the dict with
  <code>d[k]</code> just to fetch the value you already have.</p>

  <h2>Underneath: the iterator protocol</h2>
  <p>All of this rests on a tiny contract. <code>iter(obj)</code> returns an
  <em>iterator</em>; <code>next(it)</code> pulls the following value; when there
  are none left it raises <code>StopIteration</code>, which the <code>for</code>
  loop catches for you:</p>
<pre><code>it = <span class=&quot;c-fn&quot;>iter</span>([<span class=&quot;c-num&quot;>10</span>, <span class=&quot;c-num&quot;>20</span>])
<span class=&quot;c-fn&quot;>next</span>(it)   <span class=&quot;c-com&quot;># 10</span>
<span class=&quot;c-fn&quot;>next</span>(it)   <span class=&quot;c-com&quot;># 20</span>
<span class=&quot;c-fn&quot;>next</span>(it)   <span class=&quot;c-com&quot;># raises StopIteration</span></code></pre>
  <p>You rarely call these by hand, but they explain why a <code>for</code> loop
  works on <em>anything</em> iterable — and they're exactly the hooks that
  generators (a later lesson) implement to produce values lazily.</p>

  <div class=&quot;note&quot;><strong>Lazy by default:</strong> <code>range</code> doesn't
  build a list — it computes numbers on demand as you iterate. That's why
  <code>range(1_000_000)</code> costs almost nothing until you walk it.</div>

  <!-- ---------------- Quiz ---------------- -->
  <h2>Three quick checks</h2>
  <p class=&quot;muted&quot;>Recall beats recognition — answer before you scroll. Immediate
  feedback below each.</p>

  <div class=&quot;quiz&quot; id=&quot;q1&quot;>
    <div class=&quot;q&quot;>1. You need each item <em>and</em> its position. Which is idiomatic?</div>

  <div class=&quot;quiz&quot; id=&quot;q2&quot;>

    <button class=&quot;opt&quot;>only when the loop body raised an exception</button>
    <button class=&quot;opt&quot; data-correct=&quot;1&quot;>only if the loop finished without a break</button>
    <div class=&quot;fb&quot;></div>
  </div>

  <div class=&quot;quiz&quot; id=&quot;q3&quot;>

    <button class=&quot;opt&quot;>just the values of d, paired with None</button>
    <div class=&quot;fb&quot;></div>
  </div>

<script>
/* narrate.js — reusable voice-over for course lessons.
 *
 * Uses the browser's built-in Web Speech API (speechSynthesis). No install, no
 * network, works offline in any modern browser.
 *
 * Usage in a lesson:
 *   1. Add a hidden narration script:
 *        <div id=&quot;narration&quot; hidden>
 *          First sentence of the voice-over. Second sentence. ...
 *        </div>
 *      Split narration into sentences ending in . ! or ? — each becomes one
 *      utterance so pause/stop are responsive and Chrome's long-utterance bug
 *      (it silently stops after ~15s) is avoided.
 *   2. Include this script: <script src=&quot;../assets/narrate.js&quot; defer><\/script>
 *
 * The control bar (Play / Pause / Stop, speed, voice) is injected automatically.
 */
(function () {
  &quot;use strict&quot;;

  if (!(&quot;speechSynthesis&quot; in window)) {
    document.addEventListener(&quot;DOMContentLoaded&quot;, function () {
      var bar = document.createElement(&quot;div&quot;);
      bar.className = &quot;narrator-bar&quot;;
      bar.style.cssText = barCss() + &quot;;color:#b23b3b&quot;;
      bar.textContent = &quot;Voice-over unavailable: this browser has no speech synthesis.&quot;;
      document.body.appendChild(bar);
    });
    return;
  }

  var synth = window.speechSynthesis;
  var chunks = [];      // sentences to speak
  var idx = 0;          // current sentence index
  var playing = false;
  var paused = false;
  var voices = [];
  var chosenVoice = null;
  var rate = 1.0;
  var els = {};
  var watchdog = null;   // fallback timer for voices that never fire `onend`
  var heartbeat = null;  // periodic resume() to defeat Chrome's ~15s stall

  function clearTimers() {
    if (watchdog) { clearTimeout(watchdog); watchdog = null; }
    if (heartbeat) { clearInterval(heartbeat); heartbeat = null; }
  }

  function barCss() {
    return [
      &quot;position:fixed&quot;, &quot;top:0&quot;, &quot;left:0&quot;, &quot;right:0&quot;, &quot;z-index:1000&quot;,
      &quot;display:flex&quot;, &quot;gap:.5rem&quot;, &quot;align-items:center&quot;,
      &quot;padding:.5rem .9rem&quot;,
      &quot;background:rgba(253,252,249,.92)&quot;, &quot;backdrop-filter:blur(6px)&quot;,
      &quot;border-bottom:1px solid #e3e0d8&quot;,
      &quot;font-family:ui-sans-serif,system-ui,sans-serif&quot;, &quot;font-size:.85rem&quot;
    ].join(&quot;;&quot;);
  }

  function btn(label, title) {
    var b = document.createElement(&quot;button&quot;);
    b.textContent = label;
    b.title = title || label;
    b.style.cssText =
      &quot;font:inherit;cursor:pointer;border:1px solid #cfcabb;background:#fff;&quot; +
      &quot;border-radius:6px;padding:.25rem .6rem;color:#1a1a1a&quot;;
    return b;
  }

  function loadNarration() {
    var src = document.getElementById(&quot;narration&quot;);
    if (!src) return [];
    var text = src.textContent.replace(/\s+/g, &quot; &quot;).trim();
    if (!text) return [];
    // Split into sentences, keeping the terminal punctuation.
    var parts = text.match(/[^.!?]+[.!?]+(\s|$)|[^.!?]+$/g) || [text];
    return parts.map(function (s) { return s.trim(); }).filter(Boolean);
  }

  function pickDefaultVoice() {
    if (!voices.length) return null;
    // Prefer an English voice; fall back to the first available.
    var en = voices.filter(function (v) { return /^en(-|_|$)/i.test(v.lang); });
    var pool = en.length ? en : voices;
    // Prefer a LOCAL (on-device) voice. Chrome's remote Google voices fire
    // `onend` unreliably — usually not at all between back-to-back utterances —
    // which stalls the sentence-by-sentence chain after the first line. Local
    // voices fire it dependably, so use them first.
    var local = pool.filter(function (v) { return v.localService; });
    return local[0] || pool[0];
  }

  function startHeartbeat() {
    if (heartbeat) clearInterval(heartbeat);
    // Chrome silently pauses synthesis after ~15s; a periodic resume() keeps
    // long sentences (and the queue) alive.
    heartbeat = setInterval(function () {
      if (playing &amp;&amp; !paused &amp;&amp; synth.speaking) synth.resume();
    }, 10000);
  }

  function speakFrom(i) {
    if (i >= chunks.length) { stop(); return; }
    idx = i;
    var advanced = false;            // guard: advance to the next chunk once
    function next() {
      if (advanced) return;
      advanced = true;
      if (watchdog) { clearTimeout(watchdog); watchdog = null; }
      if (playing &amp;&amp; !paused) speakFrom(idx + 1);
    }

    var u = new SpeechSynthesisUtterance(chunks[i]);
    if (chosenVoice) u.voice = chosenVoice;
    u.rate = rate;
    u.onend = next;                  // fast path: advance the moment it ends
    u.onerror = next;                // a failed/cancelled chunk: skip ahead
    var started = false;
    u.onstart = function () { started = true; };
    synth.speak(u);

    // Fallback for voices that never fire `onend` (notably Chrome's remote
    // Google voices): poll `speaking` every 250ms and advance as soon as the
    // engine has spoken and gone quiet, so the gap between lines stays short
    // instead of stalling. A per-line hard cap covers an engine that never
    // starts at all.
    var words = chunks[i].split(/\s+/).length;
    var hardCapMs = (words / 2.0) * 1000 + 8000;
    var elapsed = 0, step = 250;
    function poll() {
      if (advanced) return;
      if (paused) { watchdog = setTimeout(poll, step); return; }
      if (synth.speaking) started = true;
      elapsed += step;
      if (!playing || (started &amp;&amp; !synth.speaking) || elapsed >= hardCapMs) { next(); return; }
      watchdog = setTimeout(poll, step);
    }
    watchdog = setTimeout(poll, step);
  }

  function play() {
    if (!chunks.length) return;
    if (paused) { synth.resume(); paused = false; setState(); return; }
    if (playing) return;
    synth.cancel();
    playing = true; paused = false;
    startHeartbeat();
    speakFrom(idx >= chunks.length ? 0 : idx);
    setState();
  }
  function pause() {
    if (!playing || paused) return;
    synth.pause(); paused = true; setState();
  }
  function stop() {
    // Set state BEFORE cancel(): cancelling can synchronously fire the current
    // utterance onend/onerror, and if playing were still true that handler
    // would speak the next sentence — the press-Stop-hear-the-next-line bug.
    playing = false; paused = false; idx = 0;
    clearTimers();
    synth.cancel();
    setState();
  }

  function setState() {
    els.play.textContent = paused ? &quot;▶ Resume&quot; : (playing ? &quot;❚❚ Pause&quot; : &quot;▶ Play narration&quot;);
    els.play.onclick = (playing &amp;&amp; !paused) ? pause : play;
    els.stop.disabled = !playing;
    els.stop.style.opacity = playing ? &quot;1&quot; : &quot;.5&quot;;
  }

  function buildBar() {
    chunks = loadNarration();

    var bar = document.createElement(&quot;div&quot;);
    bar.className = &quot;narrator-bar&quot;;
    bar.style.cssText = barCss();

    var label = document.createElement(&quot;strong&quot;);
    label.textContent = &quot;🔊 Voice-over&quot;;
    label.style.cssText = &quot;color:#3a5a78;margin-right:.3rem&quot;;

    els.play = btn(&quot;▶ Play narration&quot;);
    els.stop = btn(&quot;■ Stop&quot;);
    els.stop.onclick = stop;

    // Speed control
    var speedWrap = document.createElement(&quot;label&quot;);
    speedWrap.style.cssText = &quot;display:flex;align-items:center;gap:.3rem;color:#6b6b6b&quot;;
    speedWrap.append(&quot;speed&quot;);
    var speed = document.createElement(&quot;input&quot;);
    speed.type = &quot;range&quot;; speed.min = &quot;0.7&quot;; speed.max = &quot;1.4&quot;; speed.step = &quot;0.1&quot;; speed.value = &quot;1&quot;;
    speed.style.width = &quot;70px&quot;;
    var speedVal = document.createElement(&quot;span&quot;);
    speedVal.textContent = &quot;1.0×&quot;; speedVal.style.minWidth = &quot;2.4em&quot;;
    speed.oninput = function () {
      rate = parseFloat(speed.value); speedVal.textContent = rate.toFixed(1) + &quot;×&quot;;
      if (playing &amp;&amp; !paused) { var resumeAt = idx; stop(); idx = resumeAt; play(); }
    };
    speedWrap.append(speed, speedVal);

    // Voice selector
    var voiceSel = document.createElement(&quot;select&quot;);
    voiceSel.style.cssText = &quot;font:inherit;max-width:11rem;border:1px solid #cfcabb;border-radius:6px;padding:.2rem&quot;;
    voiceSel.title = &quot;Narration voice&quot;;
    voiceSel.onchange = function () {
      chosenVoice = voices[parseInt(voiceSel.value, 10)] || null;
      if (playing) { var at = idx; stop(); idx = at; play(); }
    };
    els.voiceSel = voiceSel;

    var spacer = document.createElement(&quot;span&quot;);
    spacer.style.flex = &quot;1&quot;;

    bar.append(label, els.play, els.stop, speedWrap, spacer, voiceSel);
    document.body.appendChild(bar);

    // Push page content down so the fixed bar doesn't cover the title.
    document.body.style.paddingTop = &quot;2.6rem&quot;;

    setState();
    refreshVoices();
  }

  function refreshVoices() {
    voices = synth.getVoices();
    if (!els.voiceSel) return;
    els.voiceSel.innerHTML = &quot;&quot;;
    voices.forEach(function (v, i) {
      var o = document.createElement(&quot;option&quot;);
      o.value = i; o.textContent = v.name + &quot; (&quot; + v.lang + &quot;)&quot;;
      els.voiceSel.appendChild(o);
    });
    if (!chosenVoice) chosenVoice = pickDefaultVoice();
    if (chosenVoice) els.voiceSel.value = String(voices.indexOf(chosenVoice));
  }

  // Voices load asynchronously in most browsers.
  if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = refreshVoices;

  // Stop narration when leaving the page (otherwise it keeps talking).
  window.addEventListener(&quot;beforeunload&quot;, function () { synth.cancel(); });

  document.addEventListener(&quot;DOMContentLoaded&quot;, buildBar);
})();

</script>
</body>

<div id=&quot;narration&quot; hidden>
Welcome to lesson six: strings and f-strings.
You already format strings in whatever language you came from, so this lesson is about the one Python way that has quietly replaced all the others.
That way is the f-string: put an f before the opening quote, and any expression inside curly braces is evaluated and dropped right into the text.
So f, quote, name is age, with name in braces and age in braces, reads almost exactly like the sentence it produces.
The braces are not limited to bare variables; you can put any expression inside, like a method call or arithmetic.
A small gift from Python 3.8 is the self-documenting form: write the expression, then an equals sign, still inside the braces, and you get both the expression text and its value.
After the value you can add a colon and a format spec to control how it looks.
Colon dot two f rounds a float to two decimal places; colon comma adds thousands separators; colon greater-than ten right-aligns in a field of width ten; colon zero three d pads an integer to three digits with leading zeros.
Now the second big idea: building a string from many pieces.
In many languages you reach for a StringBuilder, or you append to a string inside a loop with plus-equals.
In Python you collect the pieces in a list and then call join on the separator, like empty-quote dot join of parts.
Join is idiomatic because Python strings are immutable, so plus-equals in a loop quietly creates a brand new string every iteration.
Immutability is the theme of the whole type: every string method returns a new string and never changes the original.
Strip, split, replace, starts-with, and lower all hand you a fresh value, so you assign the result rather than expecting a mutation.
To test whether one string contains another, you do not call a method at all; you just write the in operator.
Splitlines breaks text into a list of lines, and triple-quoted strings let you write blocks that span several lines.
For regular expressions and Windows paths, reach for a raw string by prefixing the quote with r, which turns off backslash escapes.
A quick word on history: you may still meet percent-formatting and the dot-format method, but for new code prefer f-strings, which are clearer and faster.
There is no printf and no StringBuilder here; the f-string and join cover almost everything.
Scroll down, take the quick checks, and replay this narration whenever you like.
When something is unclear, ask me directly. I am your teacher for this course.

  <h1>Strings &amp;amp; f-strings</h1>
  <p class=&quot;lede&quot;>One syntax for formatting, one idiom for building — f-strings and
  <code>join</code> replace the printf, concatenation, and StringBuilder habits you
  arrived with.</p>

  <p>You already know how to stitch text together. The win here is narrow: make the
  f-string your reflex for <em>formatting</em>, and <code>&quot;&quot;.join(...)</code> your
  reflex for <em>building</em>, so you stop reaching for the patterns Python doesn't
  want.</p>

  <h2>The f-string: expressions inside the text</h2>
  <div class=&quot;contrast&quot;>
    <div class=&quot;col other&quot;>
      <h4>Other formatting styles</h4>
<pre><code><span class=&quot;c-com&quot;># positional / printf-ish / .format</span>
<span class=&quot;c-str&quot;>&quot;%s is %d&quot;</span> % (name, age)
<span class=&quot;c-str&quot;>&quot;{} is {}&quot;</span>.<span class=&quot;c-fn&quot;>format</span>(name, age)</code></pre>
    </div>
    <div class=&quot;col py&quot;>
      <h4>Idiomatic Python</h4>
<pre><code><span class=&quot;c-com&quot;># the value sits where you read it</span>
f<span class=&quot;c-str&quot;>&quot;{name} is {age}&quot;</span></code></pre>
    </div>
  </div>

  <p>The <code>f</code> prefix turns the literal into a template: anything inside
  <code>{ }</code> is a real Python <strong>expression</strong>, evaluated in place.
  That means method calls and arithmetic live right where the value appears:</p>
<pre><code>f<span class=&quot;c-str&quot;>&quot;{name.upper()} scored {score * 100:.0f}%&quot;</span>
f<span class=&quot;c-str&quot;>&quot;total: {price + tax}&quot;</span></code></pre>

  <div class=&quot;note&quot;><strong>Self-documenting (3.8+):</strong> add an <code>=</code>
  after the expression and the f-string prints both the source text <em>and</em> its
  value — perfect for quick debugging:
<pre><code>x = <span class=&quot;c-num&quot;>42</span>
<span class=&quot;c-fn&quot;>print</span>(f<span class=&quot;c-str&quot;>&quot;{x=}&quot;</span>)   <span class=&quot;c-com&quot;># x=42</span></code></pre></div>

  <h2>Format specs: the part after the colon</h2>
  <p>Inside the braces, a <code>:</code> introduces a <strong>format spec</strong>
  that controls presentation without touching the value:</p>
<pre><code>f<span class=&quot;c-str&quot;>&quot;{x:.2f}&quot;</span>    <span class=&quot;c-com&quot;># 3.14159  -&amp;gt; '3.14'   (2 decimal places)</span>
f<span class=&quot;c-str&quot;>&quot;{n:,}&quot;</span>      <span class=&quot;c-com&quot;># 1000000  -&amp;gt; '1,000,000' (thousands)</span>
f<span class=&quot;c-str&quot;>&quot;{p:&amp;gt;10}&quot;</span>    <span class=&quot;c-com&quot;># 'hi'     -&amp;gt; '        hi' (right-align, width 10)</span>
f<span class=&quot;c-str&quot;>&quot;{i:03d}&quot;</span>    <span class=&quot;c-com&quot;># 7        -&amp;gt; '007'   (zero-pad to 3 digits)</span></code></pre>
  <p>You can combine them — alignment, width, precision, and grouping all stack in
  one spec, e.g. <code>f&quot;{value:&amp;gt;12,.2f}&quot;</code>.</p>

  <h2>Building strings: <code>join</code>, not <code>+=</code></h2>
  <div class=&quot;contrast&quot;>
    <div class=&quot;col other&quot;>
      <h4>The habit to drop</h4>
<pre><code><span class=&quot;c-com&quot;># new string every iteration</span>
out = <span class=&quot;c-str&quot;>&quot;&quot;</span>
<span class=&quot;c-kw&quot;>for</span> p <span class=&quot;c-kw&quot;>in</span> parts:
    out += p + <span class=&quot;c-str&quot;>&quot;,&quot;</span></code></pre>
    </div>
    <div class=&quot;col py&quot;>
      <h4>Idiomatic Python</h4>
<pre><code><span class=&quot;c-com&quot;># one allocation, separator up front</span>
out = <span class=&quot;c-str&quot;>&quot;,&quot;</span>.<span class=&quot;c-fn&quot;>join</span>(parts)</code></pre>
    </div>
  </div>
  <p>There is no StringBuilder in Python, and you don't need one. Because strings are
  <strong>immutable</strong>, <code>+=</code> in a loop quietly allocates a fresh
  string each pass. <code>str.join</code> walks the pieces once and builds the result
  in a single pass — call it on the <em>separator</em>:
  <code>&quot;&quot;.join(parts)</code> glues with nothing between.</p>

  <div class=&quot;note&quot;><strong>The theme — immutability:</strong> every string method
  <em>returns a new string</em> and never mutates in place. So you assign the result;
  you don't expect the original to change.</div>

  <h2>Methods return new strings</h2>
<pre><code>s = <span class=&quot;c-str&quot;>&quot;  Hello, World  &quot;</span>
s.strip()              <span class=&quot;c-com&quot;># 'Hello, World'  (s is unchanged)</span>
s.lower()              <span class=&quot;c-com&quot;># '  hello, world  '</span>
s.replace(<span class=&quot;c-str&quot;>&quot;l&quot;</span>, <span class=&quot;c-str&quot;>&quot;L&quot;</span>)   <span class=&quot;c-com&quot;># '  HeLLo, WorLd  '</span>
<span class=&quot;c-str&quot;>&quot;a,b,c&quot;</span>.split(<span class=&quot;c-str&quot;>&quot;,&quot;</span>)    <span class=&quot;c-com&quot;># ['a', 'b', 'c']</span>
<span class=&quot;c-str&quot;>&quot;file.py&quot;</span>.startswith(<span class=&quot;c-str&quot;>&quot;file&quot;</span>)  <span class=&quot;c-com&quot;># True</span></code></pre>
  <p>To test for a <em>substring</em>, don't call a method — use the
  <code>in</code> operator, which reads like English:</p>
<pre><code><span class=&quot;c-kw&quot;>if</span> <span class=&quot;c-str&quot;>&quot;@&quot;</span> <span class=&quot;c-kw&quot;>in</span> address:       <span class=&quot;c-com&quot;># substring test</span>
    ...
<span class=&quot;c-kw&quot;>for</span> line <span class=&quot;c-kw&quot;>in</span> text.splitlines():  <span class=&quot;c-com&quot;># list of lines, no trailing \n</span>
    ...</code></pre>

  <h2>Multi-line and raw strings</h2>
<pre><code><span class=&quot;c-com&quot;># triple quotes span lines verbatim</span>
msg = <span class=&quot;c-str&quot;>&quot;&quot;&quot;Dear user,
Your order shipped.
&quot;&quot;&quot;</span>

<span class=&quot;c-com&quot;># raw string: backslashes are literal — for regex and paths</span>
pattern = r<span class=&quot;c-str&quot;>&quot;\d+\.\d+&quot;</span>
path    = r<span class=&quot;c-str&quot;>&quot;C:\Users\me&quot;</span></code></pre>
  <p>An <code>r</code> prefix turns off backslash escapes, so <code>\d</code> stays
  two characters instead of becoming an escape — exactly what regex and Windows paths
  want. (You can combine: <code>rf&quot;...&quot;</code> is a raw f-string.)</p>

  <p class=&quot;muted&quot;>Old code uses <code>%</code> and <code>.format()</code>; you should
  be able to <em>read</em> them, but reach for f-strings in new code — they're
  clearer and faster.</p>

  <!-- ---------------- Quiz ---------------- -->
  <h2>Three quick checks</h2>
  <p class=&quot;muted&quot;>Recall beats recognition — answer before you scroll. Immediate
  feedback below each.</p>

  <div class=&quot;quiz&quot; id=&quot;q1&quot;>
    <div class=&quot;q&quot;>1. Which expression formats <code>x</code> with exactly two decimal places?</div>
    <button class=&quot;opt&quot; data-correct=&quot;1&quot;>f&quot;{x:.2f}&quot;</button>
    <button class=&quot;opt&quot;>f&quot;{x:2.f}&quot;</button>
    <button class=&quot;opt&quot;>f&quot;{x:02d}&quot;</button>
    <div class=&quot;fb&quot;></div>
  </div>

  <div class=&quot;quiz&quot; id=&quot;q2&quot;>
    <div class=&quot;q&quot;>2. Which is the idiomatic way to build one string from a list <code>parts</code>?</div>
    <button class=&quot;opt&quot;>acc = &quot;&quot;; loop with acc += part</button>

  <div class=&quot;quiz&quot; id=&quot;q3&quot;>

    <button class=&quot;opt&quot; data-correct=&quot;1&quot;>nothing — it returns a new string &quot;hi&quot;</button>
    <button class=&quot;opt&quot;>it changes s in place to be &quot;hi&quot;</button>
    <button class=&quot;opt&quot;>it errors — s has no method lower</button>
    <div class=&quot;fb&quot;></div>

  methods</a> for everything <code>str</code> can do.</p>

</main>

          no: &quot;Not quite. `.2f` is the fixed-point-with-2-decimals spec; `:2.f` is malformed and `:02d` formats integers.&quot; },
    q2: { ok: &quot;Correct — call join on the separator. Strings are immutable, so `+=` in a loop reallocates each pass.&quot;,
          no: &quot;Both traps are non-idiomatic: `+=` reallocates every loop, and there is no StringBuilder. Use `\&quot;\&quot;.join(parts)`.&quot; },
    q3: { ok: &quot;Correct — strings are immutable, so `.lower()` returns a new string and leaves `s` untouched.&quot;,
          no: &quot;Strings are immutable. `.lower()` returns a NEW string; you must assign it. It does not mutate `s` or error.&quot; }
  }[quiz.id];
  quiz.querySelectorAll(&quot;.opt&quot;).forEach(function (opt) {
    opt.addEventListener(&quot;click&quot;, function () {
      var right = opt.dataset.correct === &quot;1&quot;;
      quiz.querySelectorAll(&quot;.opt&quot;).forEach(function (o) {
        o.disabled = true;
        if (o.dataset.correct === &quot;1&quot;) o.classList.add(&quot;correct&quot;);
      });
      if (!right) opt.classList.add(&quot;wrong&quot;);
      fb.textContent = right ? msgs.ok : msgs.no;
      fb.className = &quot;fb &quot; + (right ? &quot;correct&quot; : &quot;wrong&quot;);
    });
  });
});
</script>
<script>
/* narrate.js — reusable voice-over for course lessons.
 *
 * Uses the browser's built-in Web Speech API (speechSynthesis). No install, no
 * network, works offline in any modern browser.
 *
 * Usage in a lesson:
 *   1. Add a hidden narration script:
 *        <div id=&quot;narration&quot; hidden>
 *          First sentence of the voice-over. Second sentence. ...
 *        </div>
 *      Split narration into sentences ending in . ! or ? — each becomes one
 *      utterance so pause/stop are responsive and Chrome's long-utterance bug
 *      (it silently stops after ~15s) is avoided.
 *   2. Include this script: <script src=&quot;../assets/narrate.js&quot; defer><\/script>
 *
 * The control bar (Play / Pause / Stop, speed, voice) is injected automatically.
 */
(function () {
  &quot;use strict&quot;;

  if (!(&quot;speechSynthesis&quot; in window)) {
    document.addEventListener(&quot;DOMContentLoaded&quot;, function () {
      var bar = document.createElement(&quot;div&quot;);
      bar.className = &quot;narrator-bar&quot;;
      bar.style.cssText = barCss() + &quot;;color:#b23b3b&quot;;
      bar.textContent = &quot;Voice-over unavailable: this browser has no speech synthesis.&quot;;
      document.body.appendChild(bar);
    });
    return;
  }

  var synth = window.speechSynthesis;
  var chunks = [];      // sentences to speak
  var idx = 0;          // current sentence index
  var playing = false;
  var paused = false;
  var voices = [];
  var chosenVoice = null;
  var rate = 1.0;
  var els = {};
  var watchdog = null;   // fallback timer for voices that never fire `onend`
  var heartbeat = null;  // periodic resume() to defeat Chrome's ~15s stall

  function clearTimers() {
    if (watchdog) { clearTimeout(watchdog); watchdog = null; }
    if (heartbeat) { clearInterval(heartbeat); heartbeat = null; }
  }

  function barCss() {
    return [
      &quot;position:fixed&quot;, &quot;top:0&quot;, &quot;left:0&quot;, &quot;right:0&quot;, &quot;z-index:1000&quot;,
      &quot;display:flex&quot;, &quot;gap:.5rem&quot;, &quot;align-items:center&quot;,
      &quot;padding:.5rem .9rem&quot;,
      &quot;background:rgba(253,252,249,.92)&quot;, &quot;backdrop-filter:blur(6px)&quot;,
      &quot;border-bottom:1px solid #e3e0d8&quot;,
      &quot;font-family:ui-sans-serif,system-ui,sans-serif&quot;, &quot;font-size:.85rem&quot;
    ].join(&quot;;&quot;);
  }

  function btn(label, title) {
    var b = document.createElement(&quot;button&quot;);
    b.textContent = label;
    b.title = title || label;
    b.style.cssText =
      &quot;font:inherit;cursor:pointer;border:1px solid #cfcabb;background:#fff;&quot; +
      &quot;border-radius:6px;padding:.25rem .6rem;color:#1a1a1a&quot;;
    return b;
  }

  function loadNarration() {
    var src = document.getElementById(&quot;narration&quot;);
    if (!src) return [];
    var text = src.textContent.replace(/\s+/g, &quot; &quot;).trim();
    if (!text) return [];
    // Split into sentences, keeping the terminal punctuation.
    var parts = text.match(/[^.!?]+[.!?]+(\s|$)|[^.!?]+$/g) || [text];
    return parts.map(function (s) { return s.trim(); }).filter(Boolean);
  }

  function pickDefaultVoice() {
    if (!voices.length) return null;
    // Prefer an English voice; fall back to the first available.
    var en = voices.filter(function (v) { return /^en(-|_|$)/i.test(v.lang); });
    var pool = en.length ? en : voices;
    // Prefer a LOCAL (on-device) voice. Chrome's remote Google voices fire
    // `onend` unreliably — usually not at all between back-to-back utterances —
    // which stalls the sentence-by-sentence chain after the first line. Local
    // voices fire it dependably, so use them first.
    var local = pool.filter(function (v) { return v.localService; });
    return local[0] || pool[0];
  }

  function startHeartbeat() {
    if (heartbeat) clearInterval(heartbeat);
    // Chrome silently pauses synthesis after ~15s; a periodic resume() keeps
    // long sentences (and the queue) alive.
    heartbeat = setInterval(function () {
      if (playing &amp;&amp; !paused &amp;&amp; synth.speaking) synth.resume();
    }, 10000);
  }

  function speakFrom(i) {
    if (i >= chunks.length) { stop(); return; }
    idx = i;
    var advanced = false;            // guard: advance to the next chunk once
    function next() {
      if (advanced) return;
      advanced = true;
      if (watchdog) { clearTimeout(watchdog); watchdog = null; }
      if (playing &amp;&amp; !paused) speakFrom(idx + 1);
    }

    var u = new SpeechSynthesisUtterance(chunks[i]);
    if (chosenVoice) u.voice = chosenVoice;
    u.rate = rate;
    u.onend = next;                  // fast path: advance the moment it ends
    u.onerror = next;                // a failed/cancelled chunk: skip ahead
    var started = false;
    u.onstart = function () { started = true; };
    synth.speak(u);

    // Fallback for voices that never fire `onend` (notably Chrome's remote
    // Google voices): poll `speaking` every 250ms and advance as soon as the
    // engine has spoken and gone quiet, so the gap between lines stays short
    // instead of stalling. A per-line hard cap covers an engine that never
    // starts at all.
    var words = chunks[i].split(/\s+/).length;
    var hardCapMs = (words / 2.0) * 1000 + 8000;
    var elapsed = 0, step = 250;
    function poll() {
      if (advanced) return;
      if (paused) { watchdog = setTimeout(poll, step); return; }
      if (synth.speaking) started = true;
      elapsed += step;
      if (!playing || (started &amp;&amp; !synth.speaking) || elapsed >= hardCapMs) { next(); return; }
      watchdog = setTimeout(poll, step);
    }
    watchdog = setTimeout(poll, step);
  }

  function play() {
    if (!chunks.length) return;
    if (paused) { synth.resume(); paused = false; setState(); return; }
    if (playing) return;
    synth.cancel();
    playing = true; paused = false;
    startHeartbeat();
    speakFrom(idx >= chunks.length ? 0 : idx);
    setState();
  }
  function pause() {
    if (!playing || paused) return;
    synth.pause(); paused = true; setState();
  }
  function stop() {
    // Set state BEFORE cancel(): cancelling can synchronously fire the current
    // utterance onend/onerror, and if playing were still true that handler
    // would speak the next sentence — the press-Stop-hear-the-next-line bug.
    playing = false; paused = false; idx = 0;
    clearTimers();
    synth.cancel();
    setState();
  }

  function setState() {
    els.play.textContent = paused ? &quot;▶ Resume&quot; : (playing ? &quot;❚❚ Pause&quot; : &quot;▶ Play narration&quot;);
    els.play.onclick = (playing &amp;&amp; !paused) ? pause : play;
    els.stop.disabled = !playing;
    els.stop.style.opacity = playing ? &quot;1&quot; : &quot;.5&quot;;
  }

  function buildBar() {
    chunks = loadNarration();

    var bar = document.createElement(&quot;div&quot;);
    bar.className = &quot;narrator-bar&quot;;
    bar.style.cssText = barCss();

    var label = document.createElement(&quot;strong&quot;);
    label.textContent = &quot;🔊 Voice-over&quot;;
    label.style.cssText = &quot;color:#3a5a78;margin-right:.3rem&quot;;

    els.play = btn(&quot;▶ Play narration&quot;);
    els.stop = btn(&quot;■ Stop&quot;);
    els.stop.onclick = stop;

    // Speed control
    var speedWrap = document.createElement(&quot;label&quot;);
    speedWrap.style.cssText = &quot;display:flex;align-items:center;gap:.3rem;color:#6b6b6b&quot;;
    speedWrap.append(&quot;speed&quot;);
    var speed = document.createElement(&quot;input&quot;);
    speed.type = &quot;range&quot;; speed.min = &quot;0.7&quot;; speed.max = &quot;1.4&quot;; speed.step = &quot;0.1&quot;; speed.value = &quot;1&quot;;
    speed.style.width = &quot;70px&quot;;
    var speedVal = document.createElement(&quot;span&quot;);
    speedVal.textContent = &quot;1.0×&quot;; speedVal.style.minWidth = &quot;2.4em&quot;;
    speed.oninput = function () {
      rate = parseFloat(speed.value); speedVal.textContent = rate.toFixed(1) + &quot;×&quot;;
      if (playing &amp;&amp; !paused) { var resumeAt = idx; stop(); idx = resumeAt; play(); }
    };
    speedWrap.append(speed, speedVal);

    // Voice selector
    var voiceSel = document.createElement(&quot;select&quot;);
    voiceSel.style.cssText = &quot;font:inherit;max-width:11rem;border:1px solid #cfcabb;border-radius:6px;padding:.2rem&quot;;
    voiceSel.title = &quot;Narration voice&quot;;
    voiceSel.onchange = function () {
      chosenVoice = voices[parseInt(voiceSel.value, 10)] || null;
      if (playing) { var at = idx; stop(); idx = at; play(); }
    };
    els.voiceSel = voiceSel;

    var spacer = document.createElement(&quot;span&quot;);
    spacer.style.flex = &quot;1&quot;;

    bar.append(label, els.play, els.stop, speedWrap, spacer, voiceSel);
    document.body.appendChild(bar);

    // Push page content down so the fixed bar doesn't cover the title.
    document.body.style.paddingTop = &quot;2.6rem&quot;;

    setState();
    refreshVoices();
  }

  function refreshVoices() {
    voices = synth.getVoices();
    if (!els.voiceSel) return;
    els.voiceSel.innerHTML = &quot;&quot;;
    voices.forEach(function (v, i) {
      var o = document.createElement(&quot;option&quot;);
      o.value = i; o.textContent = v.name + &quot; (&quot; + v.lang + &quot;)&quot;;
      els.voiceSel.appendChild(o);
    });
    if (!chosenVoice) chosenVoice = pickDefaultVoice();
    if (chosenVoice) els.voiceSel.value = String(voices.indexOf(chosenVoice));
  }

  // Voices load asynchronously in most browsers.
  if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = refreshVoices;

  // Stop narration when leaving the page (otherwise it keeps talking).
  window.addEventListener(&quot;beforeunload&quot;, function () { synth.cancel(); });

  document.addEventListener(&quot;DOMContentLoaded&quot;, buildBar);
})();

</script>
</body>

<!-- Voice-over script. One sentence per utterance. Hidden from view. -->
<div id=&quot;narration&quot; hidden>
Welcome to lesson seven: dictionary idioms.
The dict is Python's workhorse, and a handful of small habits separate ported code from native code.
The first habit is lookups with a fallback.
In many languages you check whether a key exists, and only then index into the dictionary.
In Python you reach for get instead: d dot get of key returns the value, or None when the key is missing.
Pass a second argument to choose your own default, like d dot get of key comma zero.
The next habit is grouping, and it has two idiomatic forms.
The classic one is setdefault: d dot setdefault of key comma empty list, then append, all on one line.
The cleaner one is a defaultdict from the collections module, which manufactures a missing value the moment you touch the key.
When you only want to count things, reach for Counter, which is a dict subclass built exactly for tallying.
Counter of a list gives you item-to-count pairs, and most common returns the top entries already sorted.
When you iterate a dict, iterate items, so you get the key and the value together in one clean loop.
To test membership, write key in d, not key in d dot keys, because the plain form is shorter and faster.
A dict comprehension recaps lesson one: curly braces, key colon value, for each pair.
That same shape lets you invert a dict in one line: value colon key, for key comma value in d dot items.
Merging changed over the years, so know both forms.
The double-star spread builds a new merged dict, and from Python three point nine the pipe operator does the same with less noise.
Pipe equals merges in place, updating the dict on the left.
One fact worth internalising: since Python three point seven, dicts preserve insertion order, so iteration is predictable.
Two more tools for your pocket: pop with a default removes a key safely, and dict dot fromkeys builds a dict from a list of keys.
Scroll down, take the quick checks, and replay the narration whenever you like.
When something is unclear, ask me directly. I am your teacher for this course.

  <div class=&quot;kicker&quot;>Lesson 07 · Idiomatic Python</div>
  <h1>Dictionary idioms</h1>
  <p class=&quot;lede&quot;>You already reach for a hash map without thinking. This lesson
  swaps a few ported habits for the Python forms that read as native.</p>

  <p>The dict is the most-used container in Python, so the difference between
  clumsy and fluent dict code shows up on nearly every screen you write. The win
  here is a small set of idioms you'll use daily.</p>

  <h2>Lookups with a fallback: <code>.get()</code></h2>
  <div class=&quot;contrast&quot;>
    <div class=&quot;col other&quot;>
      <h4>Most languages</h4>
<pre><code><span class=&quot;c-com&quot;># check, then index</span>
<span class=&quot;c-kw&quot;>if</span> key <span class=&quot;c-kw&quot;>in</span> d:
    val = d[key]
<span class=&quot;c-kw&quot;>else</span>:
    val = <span class=&quot;c-num&quot;>0</span></code></pre>
    </div>
    <div class=&quot;col py&quot;>
      <h4>Idiomatic Python</h4>
<pre><code><span class=&quot;c-com&quot;># one lookup, with a default</span>
val = d.<span class=&quot;c-fn&quot;>get</span>(key, <span class=&quot;c-num&quot;>0</span>)</code></pre>
    </div>
  </div>
  <p><code>d.get(key)</code> returns the value, or <code>None</code> when the key
  is absent — no <code>KeyError</code>. Pass a second argument to choose the
  default: <code>d.get(key, 0)</code>. Reach for <code>.get()</code> any time a
  missing key is normal rather than exceptional.</p>

  <h2>Grouping: <code>setdefault</code> and <code>defaultdict</code></h2>
  <p>To bucket items by a key, the one-line classic is <code>setdefault</code>:
  it inserts a fresh value the first time, then returns whatever is there.</p>
<pre><code><span class=&quot;c-com&quot;># group words by their first letter</span>
groups = {}
<span class=&quot;c-kw&quot;>for</span> w <span class=&quot;c-kw&quot;>in</span> words:
    groups.<span class=&quot;c-fn&quot;>setdefault</span>(w[<span class=&quot;c-num&quot;>0</span>], []).<span class=&quot;c-fn&quot;>append</span>(w)</code></pre>
  <p>The cleaner form is <code>collections.defaultdict</code>, which manufactures
  the missing value automatically the moment you touch a new key:</p>
<pre><code><span class=&quot;c-kw&quot;>from</span> collections <span class=&quot;c-kw&quot;>import</span> defaultdict

groups = <span class=&quot;c-fn&quot;>defaultdict</span>(list)
<span class=&quot;c-kw&quot;>for</span> w <span class=&quot;c-kw&quot;>in</span> words:
    groups[w[<span class=&quot;c-num&quot;>0</span>]].<span class=&quot;c-fn&quot;>append</span>(w)</code></pre>
  <div class=&quot;note&quot;><strong>The mental shift:</strong> you pass <code>list</code>
  (the function itself, not <code>list()</code>) as the <em>factory</em>.
  <code>defaultdict</code> calls it to make a default whenever a key is first
  accessed — so the <code>append</code> always has something to append to.</div>

  <h2>Counting: <code>Counter</code></h2>
  <p>When the value you want <em>is</em> a count, skip the manual bookkeeping and
  use <code>collections.Counter</code>, a dict subclass built for tallying:</p>
<pre><code><span class=&quot;c-kw&quot;>from</span> collections <span class=&quot;c-kw&quot;>import</span> Counter

counts = <span class=&quot;c-fn&quot;>Counter</span>(words)        <span class=&quot;c-com&quot;># {'the': 4, 'cat': 2, ...}</span>
counts.<span class=&quot;c-fn&quot;>most_common</span>(<span class=&quot;c-num&quot;>3</span>)            <span class=&quot;c-com&quot;># top 3 as (item, count) pairs</span>
counts[<span class=&quot;c-str&quot;>&quot;unseen&quot;</span>]              <span class=&quot;c-com&quot;># 0 — never a KeyError</span></code></pre>

  <h2>Iterating and membership</h2>
  <p>Iterate <code>.items()</code> to get key and value together, and test
  membership against the dict directly — <code>key in d</code>, never
  <code>key in d.keys()</code>:</p>
<pre><code><span class=&quot;c-com&quot;># key and value in one clean loop</span>
<span class=&quot;c-kw&quot;>for</span> name, score <span class=&quot;c-kw&quot;>in</span> scores.<span class=&quot;c-fn&quot;>items</span>():
    <span class=&quot;c-fn&quot;>print</span>(name, score)

<span class=&quot;c-com&quot;># membership: short and fast</span>
<span class=&quot;c-kw&quot;>if</span> <span class=&quot;c-str&quot;>&quot;alice&quot;</span> <span class=&quot;c-kw&quot;>in</span> scores:
    ...</code></pre>
  <p class=&quot;muted&quot;>Iterating a dict directly (<code>for k in d</code>) already
  yields keys, so <code>d.keys()</code> there is redundant. <code>key in d</code>
  tests keys too — and is faster than scanning <code>d.keys()</code>.</p>

  <h2>Dict comprehensions and inverting</h2>
  <p>The comprehension shape from <a href=&quot;0001-comprehensions.html&quot;>lesson 01</a>
  applies to dicts: curly braces, <code>key: value</code>, for each pair. That's
  all you need to <strong>invert</strong> a dict in one line:</p>
<pre><code><span class=&quot;c-com&quot;># swap keys and values</span>
inverse = {v: k <span class=&quot;c-kw&quot;>for</span> k, v <span class=&quot;c-kw&quot;>in</span> d.<span class=&quot;c-fn&quot;>items</span>()}</code></pre>
  <p class=&quot;muted&quot;>Inverting assumes the values are unique and hashable; duplicate
  values collapse, keeping the last one seen.</p>

  <h2>Merging dicts</h2>
  <p>To combine dicts, the spread form works everywhere; from Python 3.9 the
  <code>|</code> operator does the same with less noise. On overlap, the
  <em>right-hand</em> value wins:</p>
<pre><code><span class=&quot;c-com&quot;># build a new merged dict</span>
merged = {**a, **b}          <span class=&quot;c-com&quot;># all versions</span>
merged = a | b               <span class=&quot;c-com&quot;># 3.9+, same result</span>

<span class=&quot;c-com&quot;># merge in place — update `a`</span>
a |= b                       <span class=&quot;c-com&quot;># 3.9+</span></code></pre>

  <div class=&quot;note&quot;><strong>Order is guaranteed:</strong> since Python 3.7, dicts
  <em>preserve insertion order</em>. Iteration, <code>.items()</code>, and merges
  all follow the order keys were first added — so output is predictable, and
  there's rarely a reason to reach for <code>OrderedDict</code> anymore.</div>

  <h2>Two for your pocket</h2>
<pre><code>val = d.<span class=&quot;c-fn&quot;>pop</span>(key, <span class=&quot;c-kw&quot;>None</span>)         <span class=&quot;c-com&quot;># remove &amp;amp; return, default if absent</span>
seen = dict.<span class=&quot;c-fn&quot;>fromkeys</span>(items, <span class=&quot;c-num&quot;>0</span>)   <span class=&quot;c-com&quot;># {item: 0, ...} from a sequence of keys</span></code></pre>
  <p><code>d.pop(key, default)</code> removes a key without risking a
  <code>KeyError</code>; <code>dict.fromkeys(keys)</code> builds a dict from a
  sequence of keys (all sharing one default value).</p>

  <!-- ---------------- Quiz ---------------- -->
  <h2>Quick checks</h2>
  <p class=&quot;muted&quot;>Recall beats recognition — answer before you scroll. Immediate
  feedback below each.</p>

  <div class=&quot;quiz&quot; id=&quot;q1&quot;>
    <div class=&quot;q&quot;>1. Which returns <code>0</code> instead of raising when <code>key</code> is missing?</div>
    <button class=&quot;opt&quot; data-correct=&quot;1&quot;>val = scores.get(key, 0)</button>
    <button class=&quot;opt&quot;>val = scores[key] or 0</button>
    <button class=&quot;opt&quot;>val = scores.fetch(key, 0)</button>
    <div class=&quot;fb&quot;></div>
  </div>

  <div class=&quot;quiz&quot; id=&quot;q2&quot;>
    <div class=&quot;q&quot;>2. Which is the idiomatic way to group items into lists by a key?</div>
    <button class=&quot;opt&quot;>groups = {}; groups[k] += [item]</button>
    <button class=&quot;opt&quot; data-correct=&quot;1&quot;>groups = defaultdict(list); groups[k].append(item)</button>
    <button class=&quot;opt&quot;>groups = dict(list); groups[k].append(item)</button>
    <div class=&quot;fb&quot;></div>
  </div>

  <div class=&quot;quiz&quot; id=&quot;q3&quot;>
    <div class=&quot;q&quot;>3. What does <code>{v: k for k, v in d.items()}</code> build?</div>
    <button class=&quot;opt&quot; data-correct=&quot;1&quot;>a new dict with keys and values swapped</button>
    <button class=&quot;opt&quot;>a set holding the values of the dict</button>
    <button class=&quot;opt&quot;>a list of the dict's value-key pairs</button>
    <div class=&quot;fb&quot;></div>
  </div>

  <hr>

  <p><strong>Primary source to go deeper:</strong> the official library reference
  is the place to settle any dict question:
  <a href=&quot;https://docs.python.org/3/library/stdtypes.html#dict&quot;>the
  <code>dict</code> type in Built-in Types</a> (covers <code>get</code>,
  <code>setdefault</code>, <code>pop</code>, <code>fromkeys</code>, and the
  <code>|</code> operators), and
  <a href=&quot;https://docs.python.org/3/library/collections.html&quot;>the
  <code>collections</code> module</a> for <code>defaultdict</code> and
  <code>Counter</code>.</p>

  <div class=&quot;ask-teacher&quot;>💬 <strong>Stuck or curious?</strong> Ask me directly —
  “when should I prefer <code>setdefault</code> over <code>defaultdict</code>?”,

document.querySelectorAll(&quot;.quiz&quot;).forEach(function (quiz) {
  var fb = quiz.querySelector(&quot;.fb&quot;);
  var msgs = {
    q1: { ok: &quot;Correct — `.get(key, 0)` returns the default for a missing key, no KeyError.&quot;,
          no: &quot;Not quite. Indexing raises KeyError, and there's no `.fetch`. Use `.get(key, 0)`.&quot; },
    q2: { ok: &quot;Correct — `defaultdict(list)` auto-creates an empty list, so `.append` always works.&quot;,
          no: &quot;Those raise or pass a value where a factory belongs. `defaultdict(list)` is the idiom.&quot; },
    q3: { ok: &quot;Correct — `{v: k for k, v in d.items()}` swaps each key and value into a new dict.&quot;,
          no: &quot;Curly braces with `v: k` build a dict, not a set or list — it inverts the mapping.&quot; }
  }[quiz.id];
  quiz.querySelectorAll(&quot;.opt&quot;).forEach(function (opt) {
    opt.addEventListener(&quot;click&quot;, function () {
      var right = opt.dataset.correct === &quot;1&quot;;
      quiz.querySelectorAll(&quot;.opt&quot;).forEach(function (o) {
        o.disabled = true;
        if (o.dataset.correct === &quot;1&quot;) o.classList.add(&quot;correct&quot;);
      });
      if (!right) opt.classList.add(&quot;wrong&quot;);
      fb.textContent = right ? msgs.ok : msgs.no;
      fb.className = &quot;fb &quot; + (right ? &quot;correct&quot; : &quot;wrong&quot;);
    });

<script>
/* narrate.js — reusable voice-over for course lessons.
 *
 * Uses the browser's built-in Web Speech API (speechSynthesis). No install, no
 * network, works offline in any modern browser.
 *
 * Usage in a lesson:
 *   1. Add a hidden narration script:
 *        <div id=&quot;narration&quot; hidden>
 *          First sentence of the voice-over. Second sentence. ...
 *        </div>
 *      Split narration into sentences ending in . ! or ? — each becomes one
 *      utterance so pause/stop are responsive and Chrome's long-utterance bug
 *      (it silently stops after ~15s) is avoided.
 *   2. Include this script: <script src=&quot;../assets/narrate.js&quot; defer><\/script>
 *
 * The control bar (Play / Pause / Stop, speed, voice) is injected automatically.
 */
(function () {
  &quot;use strict&quot;;

  if (!(&quot;speechSynthesis&quot; in window)) {
    document.addEventListener(&quot;DOMContentLoaded&quot;, function () {
      var bar = document.createElement(&quot;div&quot;);
      bar.className = &quot;narrator-bar&quot;;
      bar.style.cssText = barCss() + &quot;;color:#b23b3b&quot;;
      bar.textContent = &quot;Voice-over unavailable: this browser has no speech synthesis.&quot;;
      document.body.appendChild(bar);
    });
    return;
  }

  var synth = window.speechSynthesis;
  var chunks = [];      // sentences to speak
  var idx = 0;          // current sentence index
  var playing = false;
  var paused = false;
  var voices = [];
  var chosenVoice = null;
  var rate = 1.0;
  var els = {};
  var watchdog = null;   // fallback timer for voices that never fire `onend`
  var heartbeat = null;  // periodic resume() to defeat Chrome's ~15s stall

  function clearTimers() {
    if (watchdog) { clearTimeout(watchdog); watchdog = null; }
    if (heartbeat) { clearInterval(heartbeat); heartbeat = null; }
  }

  function barCss() {
    return [
      &quot;position:fixed&quot;, &quot;top:0&quot;, &quot;left:0&quot;, &quot;right:0&quot;, &quot;z-index:1000&quot;,
      &quot;display:flex&quot;, &quot;gap:.5rem&quot;, &quot;align-items:center&quot;,
      &quot;padding:.5rem .9rem&quot;,
      &quot;background:rgba(253,252,249,.92)&quot;, &quot;backdrop-filter:blur(6px)&quot;,
      &quot;border-bottom:1px solid #e3e0d8&quot;,
      &quot;font-family:ui-sans-serif,system-ui,sans-serif&quot;, &quot;font-size:.85rem&quot;
    ].join(&quot;;&quot;);
  }

  function btn(label, title) {
    var b = document.createElement(&quot;button&quot;);
    b.textContent = label;
    b.title = title || label;
    b.style.cssText =
      &quot;font:inherit;cursor:pointer;border:1px solid #cfcabb;background:#fff;&quot; +
      &quot;border-radius:6px;padding:.25rem .6rem;color:#1a1a1a&quot;;
    return b;
  }

  function loadNarration() {
    var src = document.getElementById(&quot;narration&quot;);
    if (!src) return [];
    var text = src.textContent.replace(/\s+/g, &quot; &quot;).trim();
    if (!text) return [];
    // Split into sentences, keeping the terminal punctuation.
    var parts = text.match(/[^.!?]+[.!?]+(\s|$)|[^.!?]+$/g) || [text];
    return parts.map(function (s) { return s.trim(); }).filter(Boolean);
  }

  function pickDefaultVoice() {
    if (!voices.length) return null;
    // Prefer an English voice; fall back to the first available.
    var en = voices.filter(function (v) { return /^en(-|_|$)/i.test(v.lang); });
    var pool = en.length ? en : voices;
    // Prefer a LOCAL (on-device) voice. Chrome's remote Google voices fire
    // `onend` unreliably — usually not at all between back-to-back utterances —
    // which stalls the sentence-by-sentence chain after the first line. Local
    // voices fire it dependably, so use them first.
    var local = pool.filter(function (v) { return v.localService; });
    return local[0] || pool[0];
  }

  function startHeartbeat() {
    if (heartbeat) clearInterval(heartbeat);
    // Chrome silently pauses synthesis after ~15s; a periodic resume() keeps
    // long sentences (and the queue) alive.
    heartbeat = setInterval(function () {
      if (playing &amp;&amp; !paused &amp;&amp; synth.speaking) synth.resume();
    }, 10000);
  }

  function speakFrom(i) {
    if (i >= chunks.length) { stop(); return; }
    idx = i;
    var advanced = false;            // guard: advance to the next chunk once
    function next() {
      if (advanced) return;
      advanced = true;
      if (watchdog) { clearTimeout(watchdog); watchdog = null; }
      if (playing &amp;&amp; !paused) speakFrom(idx + 1);
    }

    var u = new SpeechSynthesisUtterance(chunks[i]);
    if (chosenVoice) u.voice = chosenVoice;
    u.rate = rate;
    u.onend = next;                  // fast path: advance the moment it ends
    u.onerror = next;                // a failed/cancelled chunk: skip ahead
    var started = false;
    u.onstart = function () { started = true; };
    synth.speak(u);

    // Fallback for voices that never fire `onend` (notably Chrome's remote
    // Google voices): poll `speaking` every 250ms and advance as soon as the
    // engine has spoken and gone quiet, so the gap between lines stays short
    // instead of stalling. A per-line hard cap covers an engine that never
    // starts at all.
    var words = chunks[i].split(/\s+/).length;
    var hardCapMs = (words / 2.0) * 1000 + 8000;
    var elapsed = 0, step = 250;
    function poll() {
      if (advanced) return;
      if (paused) { watchdog = setTimeout(poll, step); return; }
      if (synth.speaking) started = true;
      elapsed += step;
      if (!playing || (started &amp;&amp; !synth.speaking) || elapsed >= hardCapMs) { next(); return; }
      watchdog = setTimeout(poll, step);
    }
    watchdog = setTimeout(poll, step);
  }

  function play() {
    if (!chunks.length) return;
    if (paused) { synth.resume(); paused = false; setState(); return; }
    if (playing) return;
    synth.cancel();
    playing = true; paused = false;
    startHeartbeat();
    speakFrom(idx >= chunks.length ? 0 : idx);
    setState();
  }
  function pause() {
    if (!playing || paused) return;
    synth.pause(); paused = true; setState();
  }
  function stop() {
    // Set state BEFORE cancel(): cancelling can synchronously fire the current
    // utterance onend/onerror, and if playing were still true that handler
    // would speak the next sentence — the press-Stop-hear-the-next-line bug.
    playing = false; paused = false; idx = 0;
    clearTimers();
    synth.cancel();
    setState();
  }

  function setState() {
    els.play.textContent = paused ? &quot;▶ Resume&quot; : (playing ? &quot;❚❚ Pause&quot; : &quot;▶ Play narration&quot;);
    els.play.onclick = (playing &amp;&amp; !paused) ? pause : play;
    els.stop.disabled = !playing;
    els.stop.style.opacity = playing ? &quot;1&quot; : &quot;.5&quot;;
  }

  function buildBar() {
    chunks = loadNarration();

    var bar = document.createElement(&quot;div&quot;);
    bar.className = &quot;narrator-bar&quot;;
    bar.style.cssText = barCss();

    var label = document.createElement(&quot;strong&quot;);
    label.textContent = &quot;🔊 Voice-over&quot;;
    label.style.cssText = &quot;color:#3a5a78;margin-right:.3rem&quot;;

    els.play = btn(&quot;▶ Play narration&quot;);
    els.stop = btn(&quot;■ Stop&quot;);
    els.stop.onclick = stop;

    // Speed control
    var speedWrap = document.createElement(&quot;label&quot;);
    speedWrap.style.cssText = &quot;display:flex;align-items:center;gap:.3rem;color:#6b6b6b&quot;;
    speedWrap.append(&quot;speed&quot;);
    var speed = document.createElement(&quot;input&quot;);
    speed.type = &quot;range&quot;; speed.min = &quot;0.7&quot;; speed.max = &quot;1.4&quot;; speed.step = &quot;0.1&quot;; speed.value = &quot;1&quot;;
    speed.style.width = &quot;70px&quot;;
    var speedVal = document.createElement(&quot;span&quot;);
    speedVal.textContent = &quot;1.0×&quot;; speedVal.style.minWidth = &quot;2.4em&quot;;
    speed.oninput = function () {
      rate = parseFloat(speed.value); speedVal.textContent = rate.toFixed(1) + &quot;×&quot;;
      if (playing &amp;&amp; !paused) { var resumeAt = idx; stop(); idx = resumeAt; play(); }
    };
    speedWrap.append(speed, speedVal);

    // Voice selector
    var voiceSel = document.createElement(&quot;select&quot;);
    voiceSel.style.cssText = &quot;font:inherit;max-width:11rem;border:1px solid #cfcabb;border-radius:6px;padding:.2rem&quot;;
    voiceSel.title = &quot;Narration voice&quot;;
    voiceSel.onchange = function () {
      chosenVoice = voices[parseInt(voiceSel.value, 10)] || null;
      if (playing) { var at = idx; stop(); idx = at; play(); }
    };
    els.voiceSel = voiceSel;

    var spacer = document.createElement(&quot;span&quot;);
    spacer.style.flex = &quot;1&quot;;

    bar.append(label, els.play, els.stop, speedWrap, spacer, voiceSel);
    document.body.appendChild(bar);

    // Push page content down so the fixed bar doesn't cover the title.
    document.body.style.paddingTop = &quot;2.6rem&quot;;

    setState();
    refreshVoices();
  }

  function refreshVoices() {
    voices = synth.getVoices();
    if (!els.voiceSel) return;
    els.voiceSel.innerHTML = &quot;&quot;;
    voices.forEach(function (v, i) {
      var o = document.createElement(&quot;option&quot;);
      o.value = i; o.textContent = v.name + &quot; (&quot; + v.lang + &quot;)&quot;;
      els.voiceSel.appendChild(o);
    });
    if (!chosenVoice) chosenVoice = pickDefaultVoice();
    if (chosenVoice) els.voiceSel.value = String(voices.indexOf(chosenVoice));
  }

  // Voices load asynchronously in most browsers.
  if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = refreshVoices;

  // Stop narration when leaving the page (otherwise it keeps talking).
  window.addEventListener(&quot;beforeunload&quot;, function () { synth.cancel(); });

  document.addEventListener(&quot;DOMContentLoaded&quot;, buildBar);
})();

</script>
</body>
