<!-- Voice-over script. One sentence per utterance. Hidden from view. -->
<div id=&quot;narration&quot; hidden>
Welcome to lesson one: comprehensions.
This is the single most recognisable piece of Python syntax, so it is the fastest win toward reading Python fluently.
In most languages, to build a new list from an old one, you create an empty list, write a loop, and append inside it.
Python collapses that whole pattern into one expression called a list comprehension.
You read it left to right as: the thing I want, for each item, from this source, optionally where a condition holds.
So, square brackets, n times n, for n in numbers, gives you a list of squares.
Add an if clause at the end to filter: n times n, for n in numbers, if n is even.
The key mental shift is that a comprehension is an expression, not a statement.
It evaluates to a value, so you can pass it straight to a function or return it directly.
The same shape works for dictionaries and sets: swap the square brackets for curly braces.
Curly braces with a key colon value pair build a dict; curly braces with single values build a set.
Now the most important variant for an experienced programmer: the generator expression.
Swap the square brackets for round brackets and nothing is built in memory.
Instead you get a lazy iterator that produces one value at a time, only as it is consumed.
That means sum of n times n for n in a billion numbers uses almost no memory, because values flow through one at a time.
When you pass a generator expression as the only argument to a function, you can even drop the extra parentheses.
A word of restraint: comprehensions are for building a collection from an expression.
If the body has side effects, or you are nesting two or more loops with conditions, a plain for loop reads better.
The Zen of Python says flat is better than nested, and readability counts.
Scroll down, take the three quick checks, and watch the narrated walkthrough you can replay any time.
When something is unclear, ask me directly. I am your teacher for this course.
</div>

  <h1>Comprehensions</h1>
  <p class=&quot;lede&quot;>The most recognisable line of Python you'll ever read — and
  the fastest way to start writing Python that looks native instead of ported.</p>

  <p>You already know how to transform a collection. The point of this lesson is
  not <em>that</em> you can — it's to make Python's one-line form so automatic
  that you read and write it without slowing down.</p>

  <h2>The pattern Python replaces</h2>
  <div class=&quot;contrast&quot;>
    <div class=&quot;col other&quot;>
      <h4>Most languages</h4>
<pre><code><span class=&quot;c-com&quot;># build, loop, append</span>
squares = []
<span class=&quot;c-kw&quot;>for</span> n <span class=&quot;c-kw&quot;>in</span> numbers:
    squares.append(n * n)</code></pre>
    </div>
    <div class=&quot;col py&quot;>
      <h4>Idiomatic Python</h4>
<pre><code><span class=&quot;c-com&quot;># one expression</span>
squares = [n * n <span class=&quot;c-kw&quot;>for</span> n <span class=&quot;c-kw&quot;>in</span> numbers]</code></pre>
    </div>
  </div>

  <p>Read it left-to-right as a sentence: <strong>“<code>n * n</code> — for each
  <code>n</code> in <code>numbers</code>.”</strong> The expression comes first
  because the <em>result</em> is what you care about, not the mechanics.</p>

  <h2>Filtering: the trailing <code>if</code></h2>
<pre><code>evens   = [n      <span class=&quot;c-kw&quot;>for</span> n <span class=&quot;c-kw&quot;>in</span> numbers <span class=&quot;c-kw&quot;>if</span> n % <span class=&quot;c-num&quot;>2</span> == <span class=&quot;c-num&quot;>0</span>]
labels  = [f<span class=&quot;c-str&quot;>&quot;#{n}&quot;</span> <span class=&quot;c-kw&quot;>for</span> n <span class=&quot;c-kw&quot;>in</span> numbers <span class=&quot;c-kw&quot;>if</span> n &amp;gt; <span class=&quot;c-num&quot;>0</span>]</code></pre>
  <p>A trailing <code>if</code> <em>selects</em> which items make it through. (An
  <code>if</code>/<code>else</code> placed <em>before</em> the <code>for</code> is
  a different thing — a conditional expression that transforms each item — a
  later lesson.)</p>

  <div class=&quot;note&quot;><strong>The mental shift:</strong> a comprehension is an
  <em>expression</em>, not a statement. It evaluates to a value, so you can
  <code>return</code> it, pass it to a function, or nest it directly — no
  temporary variable required.</div>

  <h2>Same shape, three containers</h2>
<pre><code><span class=&quot;c-com&quot;># list  — square brackets</span>
[n * n <span class=&quot;c-kw&quot;>for</span> n <span class=&quot;c-kw&quot;>in</span> nums]

<span class=&quot;c-com&quot;># set   — curly braces, single values (deduplicates)</span>
{n % <span class=&quot;c-num&quot;>10</span> <span class=&quot;c-kw&quot;>for</span> n <span class=&quot;c-kw&quot;>in</span> nums}

<span class=&quot;c-com&quot;># dict  — curly braces, key: value pairs</span>
{n: n * n <span class=&quot;c-kw&quot;>for</span> n <span class=&quot;c-kw&quot;>in</span> nums}</code></pre>

  <h2>The one that matters most: generator expressions</h2>
  <p>Swap the square brackets for <strong>round</strong> ones and nothing is built
  in memory. You get a <em>lazy iterator</em> that yields one value at a time, as
  it's consumed:</p>
<pre><code><span class=&quot;c-com&quot;># list comp: builds a million-item list in memory</span>
total = <span class=&quot;c-fn&quot;>sum</span>([n * n <span class=&quot;c-kw&quot;>for</span> n <span class=&quot;c-kw&quot;>in</span> <span class=&quot;c-fn&quot;>range</span>(<span class=&quot;c-num&quot;>1_000_000</span>)])

<span class=&quot;c-com&quot;># generator: values flow through one at a time — near-zero memory</span>
total = <span class=&quot;c-fn&quot;>sum</span>(n * n <span class=&quot;c-kw&quot;>for</span> n <span class=&quot;c-kw&quot;>in</span> <span class=&quot;c-fn&quot;>range</span>(<span class=&quot;c-num&quot;>1_000_000</span>))</code></pre>
  <p>When the generator expression is the <em>only</em> argument to a function,
  you drop the extra parentheses — as above. This is everyday idiomatic Python:
  reach for a generator when you're feeding a pipeline (<code>sum</code>,
  <code>any</code>, <code>max</code>, <code>&quot;&quot;.join(...)</code>) rather than
  keeping the whole collection.</p>

  <h2>When <em>not</em> to use one</h2>
  <p>Comprehensions are for building a collection from an expression. Step back to
  a plain <code>for</code> loop when:</p>
  <ul>
    <li>the body has <strong>side effects</strong> (logging, writing, mutating) —
      a comprehension built only for its side effects is a code smell;</li>
    <li>you'd nest <strong>two or more</strong> <code>for</code>/<code>if</code>
      clauses and it stops reading like a sentence.</li>
  </ul>
  <p class=&quot;muted&quot;>“Flat is better than nested. Readability counts.” — the Zen of
  Python (<a href=&quot;https://peps.python.org/pep-0020/&quot;>PEP 20</a>).</p>

  <!-- ---------------- Quiz ---------------- -->
  <h2>Three quick checks</h2>
  <p class=&quot;muted&quot;>Recall beats recognition — answer before you scroll. Immediate
  feedback below each.</p>

  <div class=&quot;quiz&quot; id=&quot;q1&quot;>
    <div class=&quot;q&quot;>1. Which expression squares only the even numbers in <code>nums</code>?</div>
    <button class=&quot;opt&quot; data-correct=&quot;1&quot;>[n * n for n in nums if n % 2 == 0]</button>

  <div class=&quot;quiz&quot; id=&quot;q2&quot;>

  <div class=&quot;quiz&quot; id=&quot;q3&quot;>

    <button class=&quot;opt&quot; data-correct=&quot;1&quot;>a dict mapping each word to its length</button>
    <button class=&quot;opt&quot;>a set holding the lengths of each word</button>
    <button class=&quot;opt&quot;>a list pairing each word and length</button>
    <div class=&quot;fb&quot;></div>
  </div>

  <hr>

  <p><strong>Primary source to go deeper:</strong> Raymond Hettinger,
  <a href=&quot;https://www.youtube.com/watch?v=OSGv2VnC0go&quot;>“Transforming Code into
  Beautiful, Idiomatic Python”</a> (PyCon 2013) — a core developer showing the

  official tutorial on comprehensions</a>.</p>

  <div class=&quot;ask-teacher&quot;>💬 <strong>Stuck or curious?</strong> Ask me directly —
  “why is a generator lazy?”, “show me a nested one”, “when would I use a set
  comprehension?”. I'm your teacher for this course, and the next lesson adapts to

<script>
/* narrate.js — reusable voice-over for course lessons.
 *
 * Uses the browser's built-in Web Speech API (speechSynthesis). No install, no
 * network, works offline in any modern browser.
 *
 * Usage in a lesson:
 *   1. Add a hidden narration script:
 *        <div id=&quot;narration&quot; hidden>
 *          First sentence of the voice-over. Second sentence. ...
 *        </div>
 *      Split narration into sentences ending in . ! or ? — each becomes one
 *      utterance so pause/stop are responsive and Chrome's long-utterance bug
 *      (it silently stops after ~15s) is avoided.
 *   2. Include this script: <script src=&quot;../assets/narrate.js&quot; defer><\/script>
 *
 * The control bar (Play / Pause / Stop, speed, voice) is injected automatically.
 */
(function () {
  &quot;use strict&quot;;

  if (!(&quot;speechSynthesis&quot; in window)) {
    document.addEventListener(&quot;DOMContentLoaded&quot;, function () {
      var bar = document.createElement(&quot;div&quot;);
      bar.className = &quot;narrator-bar&quot;;
      bar.style.cssText = barCss() + &quot;;color:#b23b3b&quot;;
      bar.textContent = &quot;Voice-over unavailable: this browser has no speech synthesis.&quot;;
      document.body.appendChild(bar);
    });
    return;
  }

  var synth = window.speechSynthesis;
  var chunks = [];      // sentences to speak
  var idx = 0;          // current sentence index
  var playing = false;
  var paused = false;
  var voices = [];
  var chosenVoice = null;
  var rate = 1.0;
  var els = {};
  var watchdog = null;   // fallback timer for voices that never fire `onend`
  var heartbeat = null;  // periodic resume() to defeat Chrome's ~15s stall

  function clearTimers() {
    if (watchdog) { clearTimeout(watchdog); watchdog = null; }
    if (heartbeat) { clearInterval(heartbeat); heartbeat = null; }
  }

  function barCss() {
    return [
      &quot;position:fixed&quot;, &quot;top:0&quot;, &quot;left:0&quot;, &quot;right:0&quot;, &quot;z-index:1000&quot;,
      &quot;display:flex&quot;, &quot;gap:.5rem&quot;, &quot;align-items:center&quot;,
      &quot;padding:.5rem .9rem&quot;,
      &quot;background:rgba(253,252,249,.92)&quot;, &quot;backdrop-filter:blur(6px)&quot;,
      &quot;border-bottom:1px solid #e3e0d8&quot;,
      &quot;font-family:ui-sans-serif,system-ui,sans-serif&quot;, &quot;font-size:.85rem&quot;
    ].join(&quot;;&quot;);
  }

  function btn(label, title) {
    var b = document.createElement(&quot;button&quot;);
    b.textContent = label;
    b.title = title || label;
    b.style.cssText =
      &quot;font:inherit;cursor:pointer;border:1px solid #cfcabb;background:#fff;&quot; +
      &quot;border-radius:6px;padding:.25rem .6rem;color:#1a1a1a&quot;;
    return b;
  }

  function loadNarration() {
    var src = document.getElementById(&quot;narration&quot;);
    if (!src) return [];
    var text = src.textContent.replace(/\s+/g, &quot; &quot;).trim();
    if (!text) return [];
    // Split into sentences, keeping the terminal punctuation.
    var parts = text.match(/[^.!?]+[.!?]+(\s|$)|[^.!?]+$/g) || [text];
    return parts.map(function (s) { return s.trim(); }).filter(Boolean);
  }

  function pickDefaultVoice() {
    if (!voices.length) return null;
    // Prefer an English voice; fall back to the first available.
    var en = voices.filter(function (v) { return /^en(-|_|$)/i.test(v.lang); });
    var pool = en.length ? en : voices;
    // Prefer a LOCAL (on-device) voice. Chrome's remote Google voices fire
    // `onend` unreliably — usually not at all between back-to-back utterances —
    // which stalls the sentence-by-sentence chain after the first line. Local
    // voices fire it dependably, so use them first.
    var local = pool.filter(function (v) { return v.localService; });
    return local[0] || pool[0];
  }

  function startHeartbeat() {
    if (heartbeat) clearInterval(heartbeat);
    // Chrome silently pauses synthesis after ~15s; a periodic resume() keeps
    // long sentences (and the queue) alive.
    heartbeat = setInterval(function () {
      if (playing &amp;&amp; !paused &amp;&amp; synth.speaking) synth.resume();
    }, 10000);
  }

  function speakFrom(i) {
    if (i >= chunks.length) { stop(); return; }
    idx = i;
    var advanced = false;            // guard: advance to the next chunk once
    function next() {
      if (advanced) return;
      advanced = true;
      if (watchdog) { clearTimeout(watchdog); watchdog = null; }
      if (playing &amp;&amp; !paused) speakFrom(idx + 1);
    }

    var u = new SpeechSynthesisUtterance(chunks[i]);
    if (chosenVoice) u.voice = chosenVoice;
    u.rate = rate;
    u.onend = next;                  // fast path: advance the moment it ends
    u.onerror = next;                // a failed/cancelled chunk: skip ahead
    var started = false;
    u.onstart = function () { started = true; };
    synth.speak(u);

    // Fallback for voices that never fire `onend` (notably Chrome's remote
    // Google voices): poll `speaking` every 250ms and advance as soon as the
    // engine has spoken and gone quiet, so the gap between lines stays short
    // instead of stalling. A per-line hard cap covers an engine that never
    // starts at all.
    var words = chunks[i].split(/\s+/).length;
    var hardCapMs = (words / 2.0) * 1000 + 8000;
    var elapsed = 0, step = 250;
    function poll() {
      if (advanced) return;
      if (paused) { watchdog = setTimeout(poll, step); return; }
      if (synth.speaking) started = true;
      elapsed += step;
      if (!playing || (started &amp;&amp; !synth.speaking) || elapsed >= hardCapMs) { next(); return; }
      watchdog = setTimeout(poll, step);
    }
    watchdog = setTimeout(poll, step);
  }

  function play() {
    if (!chunks.length) return;
    if (paused) { synth.resume(); paused = false; setState(); return; }
    if (playing) return;
    synth.cancel();
    playing = true; paused = false;
    startHeartbeat();
    speakFrom(idx >= chunks.length ? 0 : idx);
    setState();
  }
  function pause() {
    if (!playing || paused) return;
    synth.pause(); paused = true; setState();
  }
  function stop() {
    // Set state BEFORE cancel(): cancelling can synchronously fire the current
    // utterance onend/onerror, and if playing were still true that handler
    // would speak the next sentence — the press-Stop-hear-the-next-line bug.
    playing = false; paused = false; idx = 0;
    clearTimers();
    synth.cancel();
    setState();
  }

  function setState() {
    els.play.textContent = paused ? &quot;▶ Resume&quot; : (playing ? &quot;❚❚ Pause&quot; : &quot;▶ Play narration&quot;);
    els.play.onclick = (playing &amp;&amp; !paused) ? pause : play;
    els.stop.disabled = !playing;
    els.stop.style.opacity = playing ? &quot;1&quot; : &quot;.5&quot;;
  }

  function buildBar() {
    chunks = loadNarration();

    var bar = document.createElement(&quot;div&quot;);
    bar.className = &quot;narrator-bar&quot;;
    bar.style.cssText = barCss();

    var label = document.createElement(&quot;strong&quot;);
    label.textContent = &quot;🔊 Voice-over&quot;;
    label.style.cssText = &quot;color:#3a5a78;margin-right:.3rem&quot;;

    els.play = btn(&quot;▶ Play narration&quot;);
    els.stop = btn(&quot;■ Stop&quot;);
    els.stop.onclick = stop;

    // Speed control
    var speedWrap = document.createElement(&quot;label&quot;);
    speedWrap.style.cssText = &quot;display:flex;align-items:center;gap:.3rem;color:#6b6b6b&quot;;
    speedWrap.append(&quot;speed&quot;);
    var speed = document.createElement(&quot;input&quot;);
    speed.type = &quot;range&quot;; speed.min = &quot;0.7&quot;; speed.max = &quot;1.4&quot;; speed.step = &quot;0.1&quot;; speed.value = &quot;1&quot;;
    speed.style.width = &quot;70px&quot;;
    var speedVal = document.createElement(&quot;span&quot;);
    speedVal.textContent = &quot;1.0×&quot;; speedVal.style.minWidth = &quot;2.4em&quot;;
    speed.oninput = function () {
      rate = parseFloat(speed.value); speedVal.textContent = rate.toFixed(1) + &quot;×&quot;;
      if (playing &amp;&amp; !paused) { var resumeAt = idx; stop(); idx = resumeAt; play(); }
    };
    speedWrap.append(speed, speedVal);

    // Voice selector
    var voiceSel = document.createElement(&quot;select&quot;);
    voiceSel.style.cssText = &quot;font:inherit;max-width:11rem;border:1px solid #cfcabb;border-radius:6px;padding:.2rem&quot;;
    voiceSel.title = &quot;Narration voice&quot;;
    voiceSel.onchange = function () {
      chosenVoice = voices[parseInt(voiceSel.value, 10)] || null;
      if (playing) { var at = idx; stop(); idx = at; play(); }
    };
    els.voiceSel = voiceSel;

    var spacer = document.createElement(&quot;span&quot;);
    spacer.style.flex = &quot;1&quot;;

    bar.append(label, els.play, els.stop, speedWrap, spacer, voiceSel);
    document.body.appendChild(bar);

    // Push page content down so the fixed bar doesn't cover the title.
    document.body.style.paddingTop = &quot;2.6rem&quot;;

    setState();
    refreshVoices();
  }

  function refreshVoices() {
    voices = synth.getVoices();
    if (!els.voiceSel) return;
    els.voiceSel.innerHTML = &quot;&quot;;
    voices.forEach(function (v, i) {
      var o = document.createElement(&quot;option&quot;);
      o.value = i; o.textContent = v.name + &quot; (&quot; + v.lang + &quot;)&quot;;
      els.voiceSel.appendChild(o);
    });
    if (!chosenVoice) chosenVoice = pickDefaultVoice();
    if (chosenVoice) els.voiceSel.value = String(voices.indexOf(chosenVoice));
  }

  // Voices load asynchronously in most browsers.
  if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = refreshVoices;

  // Stop narration when leaving the page (otherwise it keeps talking).
  window.addEventListener(&quot;beforeunload&quot;, function () { synth.cancel(); });

  document.addEventListener(&quot;DOMContentLoaded&quot;, buildBar);
})();

</script>

<div id=&quot;narration&quot; hidden>
Welcome to lesson two: unpacking and multiple assignment.
This is the idiom that lets you pull values out of sequences in a single readable line, instead of indexing one element at a time.
The starting point is multiple assignment: a comma b equals one comma two binds two names at once.
The right side is really a tuple, and Python takes it apart to match the names on the left.
The famous payoff is swapping two variables: a comma b equals b comma a, with no temporary variable at all.
Python evaluates the whole right side first, then assigns, so the swap just works.
Unpacking is not limited to tuples; it works on any iterable, including lists, strings, and the results of a function call.
You will see it most often in for loops: for key comma value in pairs reads the two parts of each item directly.
When a sequence is longer than the names, star unpacking captures the rest into a list.
First comma star rest equals the sequence puts the head in first and everything else in rest.
You can put the star in the middle or at the end too: star init comma last, or head comma star mid comma tail.
The starred name always becomes a list, even when it captures nothing.
When you do not care about a value, bind it to a single underscore by convention.
A starred underscore, star underscore, swallows several values you want to ignore.
Unpacking nests, so a comma open paren b comma c close paren mirrors the shape of the data.
The same star and double-star work in the other direction, when you build calls and literals.
A single star spreads an iterable into positional arguments or into a new list or tuple.
A double star spreads a dictionary into keyword arguments, or merges dicts inside curly braces.
Extended unpacking with the star came from PEP three one three two, and the dict union operator pipe arrived in Python three point nine.
Reach for unpacking whenever you are reaching for an index; it almost always reads better.
Scroll down, take the quick checks, and replay this narration whenever you like.

  <h1>Unpacking &amp;amp; multiple assignment</h1>
  <p class=&quot;lede&quot;>Stop indexing sequences one element at a time. Python lets you
  name the pieces in a single line — and once it's automatic, half your “glue”
  code disappears.</p>

  <p>You already know how to read <code>pair[0]</code> and <code>pair[1]</code>.
  The point of this lesson isn't <em>that</em> you can — it's to make Python's
  unpacking forms so reflexive that you stop writing the index at all.</p>

  <h2>Multiple assignment, and the swap</h2>
  <div class=&quot;contrast&quot;>
    <div class=&quot;col other&quot;>
      <h4>Most languages</h4>
<pre><code><span class=&quot;c-com&quot;># swap needs a temp</span>
tmp = a
a = b
b = tmp</code></pre>
    </div>
    <div class=&quot;col py&quot;>
      <h4>Idiomatic Python</h4>
<pre><code><span class=&quot;c-com&quot;># one line, no temp</span>
a, b = b, a</code></pre>
    </div>
  </div>

  <p>The right-hand side <code>b, a</code> is a tuple. Python evaluates that
  <em>whole</em> tuple first, <em>then</em> binds the names on the left — which is
  exactly why the swap needs no temporary. The same mechanism powers plain
  multiple assignment: <code>a, b = 1, 2</code>.</p>

  <h2>Unpacking any iterable</h2>
  <p>The left side describes a <em>shape</em>; the right side is any iterable that
  matches it. Lengths must agree or you get a <code>ValueError</code>.</p>
<pre><code>x, y, z = [<span class=&quot;c-num&quot;>1</span>, <span class=&quot;c-num&quot;>2</span>, <span class=&quot;c-num&quot;>3</span>]       <span class=&quot;c-com&quot;># from a list</span>
r, g, b = <span class=&quot;c-str&quot;>&quot;RGB&quot;</span>           <span class=&quot;c-com&quot;># from a string</span>
name, age = get_user()      <span class=&quot;c-com&quot;># from a returned tuple</span></code></pre>

  <div class=&quot;note&quot;><strong>The mental shift:</strong> unpacking isn't a special
  tuple feature — it's how <em>assignment itself</em> works against any iterable.
  Once you see that, the <code>for</code>-loop form below stops looking like magic.</div>

  <h2>Unpacking in <code>for</code> loops</h2>
  <p>This is where you'll meet it most. Each item is unpacked as the loop binds it:</p>
<pre><code><span class=&quot;c-kw&quot;>for</span> k, v <span class=&quot;c-kw&quot;>in</span> pairs:              <span class=&quot;c-com&quot;># pairs of (key, value)</span>
    <span class=&quot;c-fn&quot;>print</span>(k, <span class=&quot;c-str&quot;>&quot;->&quot;</span>, v)

<span class=&quot;c-kw&quot;>for</span> i, item <span class=&quot;c-kw&quot;>in</span> <span class=&quot;c-fn&quot;>enumerate</span>(seq):  <span class=&quot;c-com&quot;># index + value, idiomatic</span>
    <span class=&quot;c-fn&quot;>print</span>(i, item)</code></pre>

  <h2>Star unpacking: capture the rest</h2>
  <p>When the iterable is longer than your names, a single starred name absorbs
  whatever's left — as a <strong>list</strong>, always, even if it's empty:</p>
<pre><code>first, *rest  = [<span class=&quot;c-num&quot;>1</span>, <span class=&quot;c-num&quot;>2</span>, <span class=&quot;c-num&quot;>3</span>, <span class=&quot;c-num&quot;>4</span>]   <span class=&quot;c-com&quot;># first=1,  rest=[2, 3, 4]</span>
*init, last   = [<span class=&quot;c-num&quot;>1</span>, <span class=&quot;c-num&quot;>2</span>, <span class=&quot;c-num&quot;>3</span>, <span class=&quot;c-num&quot;>4</span>]   <span class=&quot;c-com&quot;># init=[1, 2, 3],  last=4</span>
head, *mid, tail = [<span class=&quot;c-num&quot;>1</span>, <span class=&quot;c-num&quot;>2</span>, <span class=&quot;c-num&quot;>3</span>, <span class=&quot;c-num&quot;>4</span>] <span class=&quot;c-com&quot;># head=1, mid=[2, 3], tail=4</span></code></pre>
  <p>Exactly one star is allowed per target list — Python needs an unambiguous
  pivot point. This is <a href=&quot;https://peps.python.org/pep-3132/&quot;>PEP 3132</a>
  “extended iterable unpacking”.</p>

  <h2>Ignoring values</h2>
  <p>Bind throwaway values to a single underscore <code>_</code> by convention, and
  use <code>*_</code> to swallow several you don't care about:</p>
<pre><code>_, y = point              <span class=&quot;c-com&quot;># ignore the x coordinate</span>
first, *_ = record       <span class=&quot;c-com&quot;># keep the head, drop the rest</span>
name, *_, country = row  <span class=&quot;c-com&quot;># keep the ends, drop the middle</span></code></pre>

  <h2>Nested unpacking</h2>
  <p>The target can mirror nested structure — parentheses on the left match
  parentheses (or any grouping) on the right:</p>
<pre><code>(a, (b, c)) = (<span class=&quot;c-num&quot;>1</span>, (<span class=&quot;c-num&quot;>2</span>, <span class=&quot;c-num&quot;>3</span>))         <span class=&quot;c-com&quot;># a=1, b=2, c=3</span>

<span class=&quot;c-kw&quot;>for</span> name, (lat, lon) <span class=&quot;c-kw&quot;>in</span> cities:    <span class=&quot;c-com&quot;># unpack the pair inside each item</span>
    <span class=&quot;c-fn&quot;>print</span>(name, lat, lon)</code></pre>

  <h2>The other direction: <code>*</code> and <code>**</code> in calls and literals</h2>
  <p>The same stars <em>spread</em> values when you build things. A single
  <code>*</code> spreads an iterable; a double <code>**</code> spreads a dict:</p>
<pre><code><span class=&quot;c-fn&quot;>print</span>(*args)                <span class=&quot;c-com&quot;># spread an iterable as positional args</span>
merged_list  = [*a, *b]      <span class=&quot;c-com&quot;># concatenate into a new list</span>
merged_tuple = (*a, *b)      <span class=&quot;c-com&quot;># ...or a new tuple</span>

config = {**base, <span class=&quot;c-str&quot;>&quot;k&quot;</span>: <span class=&quot;c-num&quot;>1</span>}    <span class=&quot;c-com&quot;># copy base, then override &quot;k&quot;</span>
merged = {**d1, **d2}        <span class=&quot;c-com&quot;># later keys win on conflict</span>
greet(**kwargs)              <span class=&quot;c-com&quot;># spread a dict as keyword args</span></code></pre>

  <div class=&quot;note&quot;><strong>Two ways to merge dicts:</strong> the
  <code>{**d1, **d2}</code> form works everywhere, and on conflict the
  <em>later</em> key wins. Python 3.9+ also has the union operator
  <code>d1 | d2</code>, which reads more cleanly — but
  <code>{**d1, **d2}</code> is the form you'll see in code targeting any 3.x.</div>

  <h2>When to reach for it</h2>
  <p>The rule of thumb is simple: <strong>whenever you're about to write an index,
  ask whether unpacking reads better.</strong> It usually does. Step back only when
  the shape is genuinely dynamic — when you don't know how many elements you'll get
  and can't express that with a single star.</p>

  <!-- ---------------- Quiz ---------------- -->
  <h2>Three quick checks</h2>
  <p class=&quot;muted&quot;>Recall beats recognition — answer before you scroll. Immediate
  feedback below each.</p>

  <div class=&quot;quiz&quot; id=&quot;q1&quot;>
    <div class=&quot;q&quot;>1. After <code>a, b = b, a</code>, why is no temporary variable needed?</div>
    <button class=&quot;opt&quot; data-correct=&quot;1&quot;>the right-hand tuple is fully evaluated before any name is bound</button>
    <button class=&quot;opt&quot;>Python secretly creates a hidden temporary tuple to hold the value</button>
    <button class=&quot;opt&quot;>the names are bound left to right, so the old value is reused</button>
    <div class=&quot;fb&quot;></div>
  </div>

  <div class=&quot;quiz&quot; id=&quot;q2&quot;>
    <div class=&quot;q&quot;>2. After <code>first, *rest = [10]</code>, what are <code>first</code> and <code>rest</code>?</div>
    <button class=&quot;opt&quot;>first is 10 and rest is None because there is nothing left</button>
    <button class=&quot;opt&quot; data-correct=&quot;1&quot;>first is 10 and rest is the empty list because star is always a list</button>

    <div class=&quot;fb&quot;></div>
  </div>

  <div class=&quot;quiz&quot; id=&quot;q3&quot;>

    <button class=&quot;opt&quot;>a new dict where d1's value for &quot;x&quot; wins over d2's</button>
    <button class=&quot;opt&quot;>a TypeError, because the key &quot;x&quot; is defined twice</button>
    <div class=&quot;fb&quot;></div>
  </div>

  statements</a> defines exactly how targets and starred targets are matched.</p>

  var fb = quiz.querySelector(&quot;.fb&quot;);
  var msgs = {
    q1: { ok: &quot;Correct — Python evaluates the entire right-hand tuple first, then binds the targets, so both old values survive the swap.&quot;,
          no: &quot;There's no hidden temp and no left-to-right reuse: the whole right side is evaluated before any name is bound. Answer: the first one.&quot; },
    q2: { ok: &quot;Correct — a starred target always becomes a list, here the empty list `[]`, never None and never an error.&quot;,
          no: &quot;A starred target is always a list — `[]` when it captures nothing. It's not None, and it doesn't raise. Answer: the second one.&quot; },
    q3: { ok: &quot;Correct — both keys are spread in order, and the later one (d2) wins on a conflict.&quot;,
          no: &quot;Spreading both is fine — no error. On a key clash the later dict (d2) wins. Answer: the first one.&quot; }
  }[quiz.id];
  quiz.querySelectorAll(&quot;.opt&quot;).forEach(function (opt) {
    opt.addEventListener(&quot;click&quot;, function () {
      var right = opt.dataset.correct === &quot;1&quot;;
      quiz.querySelectorAll(&quot;.opt&quot;).forEach(function (o) {
        o.disabled = true;
        if (o.dataset.correct === &quot;1&quot;) o.classList.add(&quot;correct&quot;);
      });
      if (!right) opt.classList.add(&quot;wrong&quot;);
      fb.textContent = right ? msgs.ok : msgs.no;
      fb.className = &quot;fb &quot; + (right ? &quot;correct&quot; : &quot;wrong&quot;);
    });
  });
});
</script>
<script>
/* narrate.js — reusable voice-over for course lessons.
 *
 * Uses the browser's built-in Web Speech API (speechSynthesis). No install, no
 * network, works offline in any modern browser.
 *
 * Usage in a lesson:
 *   1. Add a hidden narration script:
 *        <div id=&quot;narration&quot; hidden>
 *          First sentence of the voice-over. Second sentence. ...
 *        </div>
 *      Split narration into sentences ending in . ! or ? — each becomes one
 *      utterance so pause/stop are responsive and Chrome's long-utterance bug
 *      (it silently stops after ~15s) is avoided.
 *   2. Include this script: <script src=&quot;../assets/narrate.js&quot; defer><\/script>
 *
 * The control bar (Play / Pause / Stop, speed, voice) is injected automatically.
 */
(function () {
  &quot;use strict&quot;;

  if (!(&quot;speechSynthesis&quot; in window)) {
    document.addEventListener(&quot;DOMContentLoaded&quot;, function () {
      var bar = document.createElement(&quot;div&quot;);
      bar.className = &quot;narrator-bar&quot;;
      bar.style.cssText = barCss() + &quot;;color:#b23b3b&quot;;
      bar.textContent = &quot;Voice-over unavailable: this browser has no speech synthesis.&quot;;
      document.body.appendChild(bar);
    });
    return;
  }

  var synth = window.speechSynthesis;
  var chunks = [];      // sentences to speak
  var idx = 0;          // current sentence index
  var playing = false;
  var paused = false;
  var voices = [];
  var chosenVoice = null;
  var rate = 1.0;
  var els = {};
  var watchdog = null;   // fallback timer for voices that never fire `onend`
  var heartbeat = null;  // periodic resume() to defeat Chrome's ~15s stall

  function clearTimers() {
    if (watchdog) { clearTimeout(watchdog); watchdog = null; }
    if (heartbeat) { clearInterval(heartbeat); heartbeat = null; }
  }

  function barCss() {
    return [
      &quot;position:fixed&quot;, &quot;top:0&quot;, &quot;left:0&quot;, &quot;right:0&quot;, &quot;z-index:1000&quot;,
      &quot;display:flex&quot;, &quot;gap:.5rem&quot;, &quot;align-items:center&quot;,
      &quot;padding:.5rem .9rem&quot;,
      &quot;background:rgba(253,252,249,.92)&quot;, &quot;backdrop-filter:blur(6px)&quot;,
      &quot;border-bottom:1px solid #e3e0d8&quot;,
      &quot;font-family:ui-sans-serif,system-ui,sans-serif&quot;, &quot;font-size:.85rem&quot;
    ].join(&quot;;&quot;);
  }

  function btn(label, title) {
    var b = document.createElement(&quot;button&quot;);
    b.textContent = label;
    b.title = title || label;
    b.style.cssText =
      &quot;font:inherit;cursor:pointer;border:1px solid #cfcabb;background:#fff;&quot; +
      &quot;border-radius:6px;padding:.25rem .6rem;color:#1a1a1a&quot;;
    return b;
  }

  function loadNarration() {
    var src = document.getElementById(&quot;narration&quot;);
    if (!src) return [];
    var text = src.textContent.replace(/\s+/g, &quot; &quot;).trim();
    if (!text) return [];
    // Split into sentences, keeping the terminal punctuation.
    var parts = text.match(/[^.!?]+[.!?]+(\s|$)|[^.!?]+$/g) || [text];
    return parts.map(function (s) { return s.trim(); }).filter(Boolean);
  }

  function pickDefaultVoice() {
    if (!voices.length) return null;
    // Prefer an English voice; fall back to the first available.
    var en = voices.filter(function (v) { return /^en(-|_|$)/i.test(v.lang); });
    var pool = en.length ? en : voices;
    // Prefer a LOCAL (on-device) voice. Chrome's remote Google voices fire
    // `onend` unreliably — usually not at all between back-to-back utterances —
    // which stalls the sentence-by-sentence chain after the first line. Local
    // voices fire it dependably, so use them first.
    var local = pool.filter(function (v) { return v.localService; });
    return local[0] || pool[0];
  }

  function startHeartbeat() {
    if (heartbeat) clearInterval(heartbeat);
    // Chrome silently pauses synthesis after ~15s; a periodic resume() keeps
    // long sentences (and the queue) alive.
    heartbeat = setInterval(function () {
      if (playing &amp;&amp; !paused &amp;&amp; synth.speaking) synth.resume();
    }, 10000);
  }

  function speakFrom(i) {
    if (i >= chunks.length) { stop(); return; }
    idx = i;
    var advanced = false;            // guard: advance to the next chunk once
    function next() {
      if (advanced) return;
      advanced = true;
      if (watchdog) { clearTimeout(watchdog); watchdog = null; }
      if (playing &amp;&amp; !paused) speakFrom(idx + 1);
    }

    var u = new SpeechSynthesisUtterance(chunks[i]);
    if (chosenVoice) u.voice = chosenVoice;
    u.rate = rate;
    u.onend = next;                  // fast path: advance the moment it ends
    u.onerror = next;                // a failed/cancelled chunk: skip ahead
    var started = false;
    u.onstart = function () { started = true; };
    synth.speak(u);

    // Fallback for voices that never fire `onend` (notably Chrome's remote
    // Google voices): poll `speaking` every 250ms and advance as soon as the
    // engine has spoken and gone quiet, so the gap between lines stays short
    // instead of stalling. A per-line hard cap covers an engine that never
    // starts at all.
    var words = chunks[i].split(/\s+/).length;
    var hardCapMs = (words / 2.0) * 1000 + 8000;
    var elapsed = 0, step = 250;
    function poll() {
      if (advanced) return;
      if (paused) { watchdog = setTimeout(poll, step); return; }
      if (synth.speaking) started = true;
      elapsed += step;
      if (!playing || (started &amp;&amp; !synth.speaking) || elapsed >= hardCapMs) { next(); return; }
      watchdog = setTimeout(poll, step);
    }
    watchdog = setTimeout(poll, step);
  }

  function play() {
    if (!chunks.length) return;
    if (paused) { synth.resume(); paused = false; setState(); return; }
    if (playing) return;
    synth.cancel();
    playing = true; paused = false;
    startHeartbeat();
    speakFrom(idx >= chunks.length ? 0 : idx);
    setState();
  }
  function pause() {
    if (!playing || paused) return;
    synth.pause(); paused = true; setState();
  }
  function stop() {
    // Set state BEFORE cancel(): cancelling can synchronously fire the current
    // utterance onend/onerror, and if playing were still true that handler
    // would speak the next sentence — the press-Stop-hear-the-next-line bug.
    playing = false; paused = false; idx = 0;
    clearTimers();
    synth.cancel();
    setState();
  }

  function setState() {
    els.play.textContent = paused ? &quot;▶ Resume&quot; : (playing ? &quot;❚❚ Pause&quot; : &quot;▶ Play narration&quot;);
    els.play.onclick = (playing &amp;&amp; !paused) ? pause : play;
    els.stop.disabled = !playing;
    els.stop.style.opacity = playing ? &quot;1&quot; : &quot;.5&quot;;
  }

  function buildBar() {
    chunks = loadNarration();

    var bar = document.createElement(&quot;div&quot;);
    bar.className = &quot;narrator-bar&quot;;
    bar.style.cssText = barCss();

    var label = document.createElement(&quot;strong&quot;);
    label.textContent = &quot;🔊 Voice-over&quot;;
    label.style.cssText = &quot;color:#3a5a78;margin-right:.3rem&quot;;

    els.play = btn(&quot;▶ Play narration&quot;);
    els.stop = btn(&quot;■ Stop&quot;);
    els.stop.onclick = stop;

    // Speed control
    var speedWrap = document.createElement(&quot;label&quot;);
    speedWrap.style.cssText = &quot;display:flex;align-items:center;gap:.3rem;color:#6b6b6b&quot;;
    speedWrap.append(&quot;speed&quot;);
    var speed = document.createElement(&quot;input&quot;);
    speed.type = &quot;range&quot;; speed.min = &quot;0.7&quot;; speed.max = &quot;1.4&quot;; speed.step = &quot;0.1&quot;; speed.value = &quot;1&quot;;
    speed.style.width = &quot;70px&quot;;
    var speedVal = document.createElement(&quot;span&quot;);
    speedVal.textContent = &quot;1.0×&quot;; speedVal.style.minWidth = &quot;2.4em&quot;;
    speed.oninput = function () {
      rate = parseFloat(speed.value); speedVal.textContent = rate.toFixed(1) + &quot;×&quot;;
      if (playing &amp;&amp; !paused) { var resumeAt = idx; stop(); idx = resumeAt; play(); }
    };
    speedWrap.append(speed, speedVal);

    // Voice selector
    var voiceSel = document.createElement(&quot;select&quot;);
    voiceSel.style.cssText = &quot;font:inherit;max-width:11rem;border:1px solid #cfcabb;border-radius:6px;padding:.2rem&quot;;
    voiceSel.title = &quot;Narration voice&quot;;
    voiceSel.onchange = function () {
      chosenVoice = voices[parseInt(voiceSel.value, 10)] || null;
      if (playing) { var at = idx; stop(); idx = at; play(); }
    };
    els.voiceSel = voiceSel;

    var spacer = document.createElement(&quot;span&quot;);
    spacer.style.flex = &quot;1&quot;;

    bar.append(label, els.play, els.stop, speedWrap, spacer, voiceSel);
    document.body.appendChild(bar);

    // Push page content down so the fixed bar doesn't cover the title.
    document.body.style.paddingTop = &quot;2.6rem&quot;;

    setState();
    refreshVoices();
  }

  function refreshVoices() {
    voices = synth.getVoices();
    if (!els.voiceSel) return;
    els.voiceSel.innerHTML = &quot;&quot;;
    voices.forEach(function (v, i) {
      var o = document.createElement(&quot;option&quot;);
      o.value = i; o.textContent = v.name + &quot; (&quot; + v.lang + &quot;)&quot;;
      els.voiceSel.appendChild(o);
    });
    if (!chosenVoice) chosenVoice = pickDefaultVoice();
    if (chosenVoice) els.voiceSel.value = String(voices.indexOf(chosenVoice));
  }

  // Voices load asynchronously in most browsers.
  if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = refreshVoices;

  // Stop narration when leaving the page (otherwise it keeps talking).
  window.addEventListener(&quot;beforeunload&quot;, function () { synth.cancel(); });

  document.addEventListener(&quot;DOMContentLoaded&quot;, buildBar);
})();

</script>
</body>

<!-- Voice-over script. One sentence per utterance. Hidden from view. -->
<div id=&quot;narration&quot; hidden>
Welcome to lesson three: truthiness and boolean idioms.
This is the lesson that makes your conditionals stop looking ported and start looking native.
In Python, every object already knows whether it is truthy or falsy, so you rarely have to ask explicitly.
Empty containers, the number zero, an empty string, and None are all falsy; anything non-empty is truthy.
That means you write if items, not if len of items is greater than zero.
And you write if not items to ask whether a list is empty, never items equals empty brackets.
The conditional reads like plain English, and that is the whole point.
Now the most important rule about None: always compare it with is and is not, never with double equals.
None is a singleton, so is checks identity, which is exact, fast, and what PEP 8 asks for.
Next, the or operator is the classic way to supply a default: name equals name or anon.
But watch the trap: if zero or an empty string is a valid value, or will wrongly replace it, because those are falsy.
When zero and empty string are legitimate, reach for x if x is not None else default instead.
Here is the part that surprises people from other languages: and and or do not return booleans.
They short-circuit and return one of the actual operands, so a or b can hand you a or it can hand you b.
For aggregate questions, any and all read beautifully with a generator expression flowing through them.
any of this for that gives you True the moment one item qualifies, and all the moment one fails.
Python also lets you chain comparisons, so zero is less than or equal to x less than ten is one clean expression.
And membership tests read like a sentence: if x in collection, or if key in dict.
One last thing: never write equals True or equals False; the value is already a boolean, so just use it.
And a small curiosity for later: bool is a subclass of int, so True really does behave like one.
Scroll down, take the quick checks, and replay this narration whenever you like.
When something is unclear, ask me directly. I am your teacher for this course.

  <div class=&quot;kicker&quot;>Lesson 03 · Idiomatic Python</div>
  <h1>Truthiness &amp;amp; boolean idioms</h1>
  <p class=&quot;lede&quot;>Python objects already know if they're &quot;empty&quot; — lean on that and
  your conditionals read like English instead of like a port from another language.</p>

  <p>You know how to write an <code>if</code>. The win here is smaller and sharper:
  the handful of boolean idioms that idiomatic Python leans on everywhere, so you
  read and write them without a second thought.</p>

  <h2>Truthiness: let the object answer</h2>
  <div class=&quot;contrast&quot;>
    <div class=&quot;col other&quot;>
      <h4>Most languages</h4>
<pre><code><span class=&quot;c-com&quot;># ask explicitly</span>
<span class=&quot;c-kw&quot;>if</span> <span class=&quot;c-fn&quot;>len</span>(items) &amp;gt; <span class=&quot;c-num&quot;>0</span>:
    ...
<span class=&quot;c-kw&quot;>if</span> items == []:
    ...</code></pre>
    </div>
    <div class=&quot;col py&quot;>
      <h4>Idiomatic Python</h4>
<pre><code><span class=&quot;c-com&quot;># the object is already truthy/falsy</span>
<span class=&quot;c-kw&quot;>if</span> items:
    ...
<span class=&quot;c-kw&quot;>if</span> <span class=&quot;c-kw&quot;>not</span> items:
    ...</code></pre>
    </div>
  </div>

  <p>Empty containers, <code>0</code>, <code>&quot;&quot;</code>, and <code>None</code> are
  all <strong>falsy</strong>; anything non-empty is <strong>truthy</strong>. So
  <code>if items:</code> means &quot;if there's anything in <code>items</code>,&quot; and
  <code>if not items:</code> means &quot;if it's empty.&quot; No <code>len</code>, no
  comparison to a literal.</p>

  <h2><code>is None</code>, never <code>== None</code></h2>
<pre><code><span class=&quot;c-com&quot;># identity check — what PEP 8 asks for</span>
<span class=&quot;c-kw&quot;>if</span> value <span class=&quot;c-kw&quot;>is</span> <span class=&quot;c-kw&quot;>None</span>:
    ...
<span class=&quot;c-kw&quot;>if</span> value <span class=&quot;c-kw&quot;>is</span> <span class=&quot;c-kw&quot;>not</span> <span class=&quot;c-kw&quot;>None</span>:
    ...</code></pre>
  <p><code>None</code> is a singleton — there is exactly one of it — so you compare
  with <code>is</code>/<code>is not</code>, which tests <em>identity</em>. It's
  exact, fast, and can't be fooled by an object that overrides <code>==</code>.</p>

  <div class=&quot;note&quot;><strong>The mental shift:</strong> &quot;is it empty?&quot; and &quot;is it
  <code>None</code>?&quot; are <em>different questions</em>. <code>if not value:</code>
  is true for <code>None</code>, <code>0</code>, <code>&quot;&quot;</code>, and <code>[]</code>
  alike. When you specifically mean &quot;was nothing passed?&quot;, say <code>is None</code>.</div>

  <h2><code>or</code> for defaults — and its trap</h2>
<pre><code><span class=&quot;c-com&quot;># common, concise default</span>
name = name <span class=&quot;c-kw&quot;>or</span> <span class=&quot;c-str&quot;>&quot;anon&quot;</span>

<span class=&quot;c-com&quot;># trap: 0 and &quot;&quot; are valid but falsy, so `or` replaces them</span>
count = count <span class=&quot;c-kw&quot;>or</span> <span class=&quot;c-num&quot;>10</span>      <span class=&quot;c-com&quot;># count == 0 becomes 10 — bug!</span>

<span class=&quot;c-com&quot;># safe when 0 / &quot;&quot; are legitimate values</span>
count = count <span class=&quot;c-kw&quot;>if</span> count <span class=&quot;c-kw&quot;>is</span> <span class=&quot;c-kw&quot;>not</span> <span class=&quot;c-kw&quot;>None</span> <span class=&quot;c-kw&quot;>else</span> <span class=&quot;c-num&quot;>10</span></code></pre>
  <p><code>name or &quot;anon&quot;</code> is great when any falsy input should fall back. But
  if <code>0</code> or <code>&quot;&quot;</code> are <em>real</em> values you must keep, use
  the explicit <code>x if x is not None else default</code> form instead.</p>

  <h2><code>and</code>/<code>or</code> return operands, not booleans</h2>
<pre><code><span class=&quot;c-com&quot;># short-circuit: the result is one of the actual operands</span>
<span class=&quot;c-str&quot;>&quot;hi&quot;</span> <span class=&quot;c-kw&quot;>or</span> <span class=&quot;c-str&quot;>&quot;bye&quot;</span>     <span class=&quot;c-com&quot;># =&amp;gt; &quot;hi&quot;   (first truthy)</span>
<span class=&quot;c-str&quot;>&quot;&quot;</span> <span class=&quot;c-kw&quot;>or</span> <span class=&quot;c-str&quot;>&quot;bye&quot;</span>       <span class=&quot;c-com&quot;># =&amp;gt; &quot;bye&quot;  (first was falsy)</span>
<span class=&quot;c-str&quot;>&quot;hi&quot;</span> <span class=&quot;c-kw&quot;>and</span> <span class=&quot;c-str&quot;>&quot;bye&quot;</span>    <span class=&quot;c-com&quot;># =&amp;gt; &quot;bye&quot;  (both truthy, returns last)</span>
<span class=&quot;c-num&quot;>0</span> <span class=&quot;c-kw&quot;>and</span> <span class=&quot;c-str&quot;>&quot;bye&quot;</span>       <span class=&quot;c-com&quot;># =&amp;gt; 0     (stops at first falsy)</span></code></pre>
  <p>This is exactly <em>why</em> <code>name or &quot;anon&quot;</code> works: <code>or</code>
  returns the first truthy operand, or the last one if none qualify. The value you
  get back is the operand itself, not a coerced <code>True</code>/<code>False</code>.</p>

  <h2><code>any</code> / <code>all</code> with a generator</h2>
<pre><code><span class=&quot;c-com&quot;># True as soon as one item qualifies — stops early</span>
<span class=&quot;c-kw&quot;>if</span> <span class=&quot;c-fn&quot;>any</span>(n &amp;lt; <span class=&quot;c-num&quot;>0</span> <span class=&quot;c-kw&quot;>for</span> n <span class=&quot;c-kw&quot;>in</span> numbers):
    ...

<span class=&quot;c-com&quot;># True only if every item qualifies</span>
<span class=&quot;c-kw&quot;>if</span> <span class=&quot;c-fn&quot;>all</span>(<span class=&quot;c-fn&quot;>isinstance</span>(x, <span class=&quot;c-fn&quot;>str</span>) <span class=&quot;c-kw&quot;>for</span> x <span class=&quot;c-kw&quot;>in</span> values):
    ...</code></pre>
  <p>Feed <code>any</code> and <code>all</code> a generator expression and you get a
  readable, short-circuiting aggregate: <code>any</code> stops at the first match,
  <code>all</code> stops at the first failure. No accumulator flag required.</p>

  <h2>Chained comparisons &amp;amp; membership</h2>
<pre><code><span class=&quot;c-com&quot;># chain comparisons like math — x is evaluated once</span>
<span class=&quot;c-kw&quot;>if</span> <span class=&quot;c-num&quot;>0</span> &amp;lt;= x &amp;lt; <span class=&quot;c-num&quot;>10</span>:
    ...

<span class=&quot;c-com&quot;># membership reads like a sentence</span>
<span class=&quot;c-kw&quot;>if</span> x <span class=&quot;c-kw&quot;>in</span> collection:
    ...
<span class=&quot;c-kw&quot;>if</span> key <span class=&quot;c-kw&quot;>in</span> some_dict:      <span class=&quot;c-com&quot;># tests keys, not values</span>
    ...</code></pre>
  <p><code>0 &amp;lt;= x &amp;lt; 10</code> means exactly what it says and is the same as
  <code>0 &amp;lt;= x and x &amp;lt; 10</code> — but <code>x</code> is evaluated only once.
  And <code>in</code> is the idiomatic membership test; on a <code>dict</code> it
  checks the <em>keys</em>.</p>

  <div class=&quot;note&quot;><strong>Don't write <code>== True</code>.</strong> If
  <code>flag</code> is already a boolean, <code>if flag:</code> says it best;
  <code>if flag == True:</code> is noise. (Aside: <code>bool</code> is a subclass
  of <code>int</code>, so <code>True == 1</code> — another reason to compare by
  truthiness, not by equality.)</div>

  <!-- ---------------- Quiz ---------------- -->
  <h2>Three quick checks</h2>
  <p class=&quot;muted&quot;>Recall beats recognition — answer before you scroll. Immediate
  feedback below each.</p>

  <div class=&quot;quiz&quot; id=&quot;q1&quot;>
    <div class=&quot;q&quot;>1. Which line idiomatically checks that the list <code>items</code> is <strong>not</strong> empty?</div>
    <button class=&quot;opt&quot; data-correct=&quot;1&quot;>if items:</button>
    <button class=&quot;opt&quot;>if len(items) &amp;gt; 0:</button>
    <button class=&quot;opt&quot;>if items != []:</button>
    <div class=&quot;fb&quot;></div>
  </div>

  <div class=&quot;quiz&quot; id=&quot;q2&quot;>
    <div class=&quot;q&quot;>2. <code>count</code> may legitimately be <code>0</code>. Which default keeps a real <code>0</code>?</div>
    <button class=&quot;opt&quot;>count = count or 10</button>
    <button class=&quot;opt&quot; data-correct=&quot;1&quot;>count = count if count is not None else 10</button>
    <button class=&quot;opt&quot;>count = count if count else 10</button>
    <div class=&quot;fb&quot;></div>
  </div>

  <div class=&quot;quiz&quot; id=&quot;q3&quot;>
    <div class=&quot;q&quot;>3. What does the expression <code>&quot;&quot; or &quot;bye&quot;</code> evaluate to?</div>
    <button class=&quot;opt&quot; data-correct=&quot;1&quot;>the string &quot;bye&quot;</button>
    <button class=&quot;opt&quot;>the boolean True</button>
    <button class=&quot;opt&quot;>the empty string &quot;&quot;</button>
    <div class=&quot;fb&quot;></div>
  </div>

  <hr>

  <p><strong>Primary source to go deeper:</strong> the official reference on
  <a href=&quot;https://docs.python.org/3/library/stdtypes.html#truth-value-testing&quot;>truth
  value testing</a> spells out exactly which objects are falsy. For the
  <code>is None</code> and comparison advice, see the Programming Recommendations in
  <a href=&quot;https://peps.python.org/pep-0008/&quot;>PEP 8</a> — Python's style guide,
  written by the people who shaped the language.</p>

  <div class=&quot;ask-teacher&quot;>💬 <strong>Stuck or curious?</strong> Ask me directly —
  “why is <code>is None</code> better than <code>== None</code>?”, “show me where
  <code>x or default</code> bites me”, “when does <code>all</code> short-circuit?”.
  I'm your teacher for this course, and the next lesson adapts to what you ask.</div>

/* Inline quiz behaviour — tight, immediate feedback loop. */
document.querySelectorAll(&quot;.quiz&quot;).forEach(function (quiz) {
  var fb = quiz.querySelector(&quot;.fb&quot;);
  var msgs = {
    q1: { ok: &quot;Correct — an empty list is falsy, so `if items:` is true exactly when it has contents. No `len`, no literal comparison.&quot;,
          no: &quot;Those work, but aren't idiomatic. Lean on truthiness: `if items:` is true precisely when the list is non-empty.&quot; },
    q2: { ok: &quot;Correct — `is not None` keeps a real 0; only an actual None falls back to 10.&quot;,
          no: &quot;Trap: `or` and `if count` are both falsy-based, so a real 0 gets replaced by 10. Use `is not None`.&quot; },
    q3: { ok: &quot;Correct — `or` returns the first truthy operand; \&quot;\&quot; is falsy, so you get \&quot;bye\&quot; itself, not a boolean.&quot;,
          no: &quot;`or` returns an operand, not a bool. The empty string is falsy, so it skips to \&quot;bye\&quot;.&quot; }
  }[quiz.id];
  quiz.querySelectorAll(&quot;.opt&quot;).forEach(function (opt) {
    opt.addEventListener(&quot;click&quot;, function () {
      var right = opt.dataset.correct === &quot;1&quot;;
      quiz.querySelectorAll(&quot;.opt&quot;).forEach(function (o) {
        o.disabled = true;
        if (o.dataset.correct === &quot;1&quot;) o.classList.add(&quot;correct&quot;);
      });
      if (!right) opt.classList.add(&quot;wrong&quot;);
      fb.textContent = right ? msgs.ok : msgs.no;
      fb.className = &quot;fb &quot; + (right ? &quot;correct&quot; : &quot;wrong&quot;);
    });
  });
});
</script>
<script>
/* narrate.js — reusable voice-over for course lessons.
 *
 * Uses the browser's built-in Web Speech API (speechSynthesis). No install, no
 * network, works offline in any modern browser.
 *
 * Usage in a lesson:
 *   1. Add a hidden narration script:
 *        <div id=&quot;narration&quot; hidden>
 *          First sentence of the voice-over. Second sentence. ...
 *        </div>
 *      Split narration into sentences ending in . ! or ? — each becomes one
 *      utterance so pause/stop are responsive and Chrome's long-utterance bug
 *      (it silently stops after ~15s) is avoided.
 *   2. Include this script: <script src=&quot;../assets/narrate.js&quot; defer><\/script>
 *
 * The control bar (Play / Pause / Stop, speed, voice) is injected automatically.
 */
(function () {
  &quot;use strict&quot;;

  if (!(&quot;speechSynthesis&quot; in window)) {
    document.addEventListener(&quot;DOMContentLoaded&quot;, function () {
      var bar = document.createElement(&quot;div&quot;);
      bar.className = &quot;narrator-bar&quot;;
      bar.style.cssText = barCss() + &quot;;color:#b23b3b&quot;;
      bar.textContent = &quot;Voice-over unavailable: this browser has no speech synthesis.&quot;;
      document.body.appendChild(bar);
    });
    return;
  }

  var synth = window.speechSynthesis;
  var chunks = [];      // sentences to speak
  var idx = 0;          // current sentence index
  var playing = false;
  var paused = false;
  var voices = [];
  var chosenVoice = null;
  var rate = 1.0;
  var els = {};
  var watchdog = null;   // fallback timer for voices that never fire `onend`
  var heartbeat = null;  // periodic resume() to defeat Chrome's ~15s stall

  function clearTimers() {
    if (watchdog) { clearTimeout(watchdog); watchdog = null; }
    if (heartbeat) { clearInterval(heartbeat); heartbeat = null; }
  }

  function barCss() {
    return [
      &quot;position:fixed&quot;, &quot;top:0&quot;, &quot;left:0&quot;, &quot;right:0&quot;, &quot;z-index:1000&quot;,
      &quot;display:flex&quot;, &quot;gap:.5rem&quot;, &quot;align-items:center&quot;,
      &quot;padding:.5rem .9rem&quot;,
      &quot;background:rgba(253,252,249,.92)&quot;, &quot;backdrop-filter:blur(6px)&quot;,
      &quot;border-bottom:1px solid #e3e0d8&quot;,
      &quot;font-family:ui-sans-serif,system-ui,sans-serif&quot;, &quot;font-size:.85rem&quot;
    ].join(&quot;;&quot;);
  }

  function btn(label, title) {
    var b = document.createElement(&quot;button&quot;);
    b.textContent = label;
    b.title = title || label;
    b.style.cssText =
      &quot;font:inherit;cursor:pointer;border:1px solid #cfcabb;background:#fff;&quot; +
      &quot;border-radius:6px;padding:.25rem .6rem;color:#1a1a1a&quot;;
    return b;
  }

  function loadNarration() {
    var src = document.getElementById(&quot;narration&quot;);
    if (!src) return [];
    var text = src.textContent.replace(/\s+/g, &quot; &quot;).trim();
    if (!text) return [];
    // Split into sentences, keeping the terminal punctuation.
    var parts = text.match(/[^.!?]+[.!?]+(\s|$)|[^.!?]+$/g) || [text];
    return parts.map(function (s) { return s.trim(); }).filter(Boolean);
  }

  function pickDefaultVoice() {
    if (!voices.length) return null;
    // Prefer an English voice; fall back to the first available.
    var en = voices.filter(function (v) { return /^en(-|_|$)/i.test(v.lang); });
    var pool = en.length ? en : voices;
    // Prefer a LOCAL (on-device) voice. Chrome's remote Google voices fire
    // `onend` unreliably — usually not at all between back-to-back utterances —
    // which stalls the sentence-by-sentence chain after the first line. Local
    // voices fire it dependably, so use them first.
    var local = pool.filter(function (v) { return v.localService; });
    return local[0] || pool[0];
  }

  function startHeartbeat() {
    if (heartbeat) clearInterval(heartbeat);
    // Chrome silently pauses synthesis after ~15s; a periodic resume() keeps
    // long sentences (and the queue) alive.
    heartbeat = setInterval(function () {
      if (playing &amp;&amp; !paused &amp;&amp; synth.speaking) synth.resume();
    }, 10000);
  }

  function speakFrom(i) {
    if (i >= chunks.length) { stop(); return; }
    idx = i;
    var advanced = false;            // guard: advance to the next chunk once
    function next() {
      if (advanced) return;
      advanced = true;
      if (watchdog) { clearTimeout(watchdog); watchdog = null; }
      if (playing &amp;&amp; !paused) speakFrom(idx + 1);
    }

    var u = new SpeechSynthesisUtterance(chunks[i]);
    if (chosenVoice) u.voice = chosenVoice;
    u.rate = rate;
    u.onend = next;                  // fast path: advance the moment it ends
    u.onerror = next;                // a failed/cancelled chunk: skip ahead
    var started = false;
    u.onstart = function () { started = true; };
    synth.speak(u);

    // Fallback for voices that never fire `onend` (notably Chrome's remote
    // Google voices): poll `speaking` every 250ms and advance as soon as the
    // engine has spoken and gone quiet, so the gap between lines stays short
    // instead of stalling. A per-line hard cap covers an engine that never
    // starts at all.
    var words = chunks[i].split(/\s+/).length;
    var hardCapMs = (words / 2.0) * 1000 + 8000;
    var elapsed = 0, step = 250;
    function poll() {
      if (advanced) return;
      if (paused) { watchdog = setTimeout(poll, step); return; }
      if (synth.speaking) started = true;
      elapsed += step;
      if (!playing || (started &amp;&amp; !synth.speaking) || elapsed >= hardCapMs) { next(); return; }
      watchdog = setTimeout(poll, step);
    }
    watchdog = setTimeout(poll, step);
  }

  function play() {
    if (!chunks.length) return;
    if (paused) { synth.resume(); paused = false; setState(); return; }
    if (playing) return;
    synth.cancel();
    playing = true; paused = false;
    startHeartbeat();
    speakFrom(idx >= chunks.length ? 0 : idx);
    setState();
  }
  function pause() {
    if (!playing || paused) return;
    synth.pause(); paused = true; setState();
  }
  function stop() {
    // Set state BEFORE cancel(): cancelling can synchronously fire the current
    // utterance onend/onerror, and if playing were still true that handler
    // would speak the next sentence — the press-Stop-hear-the-next-line bug.
    playing = false; paused = false; idx = 0;
    clearTimers();
    synth.cancel();
    setState();
  }

  function setState() {
    els.play.textContent = paused ? &quot;▶ Resume&quot; : (playing ? &quot;❚❚ Pause&quot; : &quot;▶ Play narration&quot;);
    els.play.onclick = (playing &amp;&amp; !paused) ? pause : play;
    els.stop.disabled = !playing;
    els.stop.style.opacity = playing ? &quot;1&quot; : &quot;.5&quot;;
  }

  function buildBar() {
    chunks = loadNarration();

    var bar = document.createElement(&quot;div&quot;);
    bar.className = &quot;narrator-bar&quot;;
    bar.style.cssText = barCss();

    var label = document.createElement(&quot;strong&quot;);
    label.textContent = &quot;🔊 Voice-over&quot;;
    label.style.cssText = &quot;color:#3a5a78;margin-right:.3rem&quot;;

    els.play = btn(&quot;▶ Play narration&quot;);
    els.stop = btn(&quot;■ Stop&quot;);
    els.stop.onclick = stop;

    // Speed control
    var speedWrap = document.createElement(&quot;label&quot;);
    speedWrap.style.cssText = &quot;display:flex;align-items:center;gap:.3rem;color:#6b6b6b&quot;;
    speedWrap.append(&quot;speed&quot;);
    var speed = document.createElement(&quot;input&quot;);
    speed.type = &quot;range&quot;; speed.min = &quot;0.7&quot;; speed.max = &quot;1.4&quot;; speed.step = &quot;0.1&quot;; speed.value = &quot;1&quot;;
    speed.style.width = &quot;70px&quot;;
    var speedVal = document.createElement(&quot;span&quot;);
    speedVal.textContent = &quot;1.0×&quot;; speedVal.style.minWidth = &quot;2.4em&quot;;
    speed.oninput = function () {
      rate = parseFloat(speed.value); speedVal.textContent = rate.toFixed(1) + &quot;×&quot;;
      if (playing &amp;&amp; !paused) { var resumeAt = idx; stop(); idx = resumeAt; play(); }
    };
    speedWrap.append(speed, speedVal);

    // Voice selector
    var voiceSel = document.createElement(&quot;select&quot;);
    voiceSel.style.cssText = &quot;font:inherit;max-width:11rem;border:1px solid #cfcabb;border-radius:6px;padding:.2rem&quot;;
    voiceSel.title = &quot;Narration voice&quot;;
    voiceSel.onchange = function () {
      chosenVoice = voices[parseInt(voiceSel.value, 10)] || null;
      if (playing) { var at = idx; stop(); idx = at; play(); }
    };
    els.voiceSel = voiceSel;

    var spacer = document.createElement(&quot;span&quot;);
    spacer.style.flex = &quot;1&quot;;

    bar.append(label, els.play, els.stop, speedWrap, spacer, voiceSel);
    document.body.appendChild(bar);

    // Push page content down so the fixed bar doesn't cover the title.
    document.body.style.paddingTop = &quot;2.6rem&quot;;

    setState();
    refreshVoices();
  }

  function refreshVoices() {
    voices = synth.getVoices();
    if (!els.voiceSel) return;
    els.voiceSel.innerHTML = &quot;&quot;;
    voices.forEach(function (v, i) {
      var o = document.createElement(&quot;option&quot;);
      o.value = i; o.textContent = v.name + &quot; (&quot; + v.lang + &quot;)&quot;;
      els.voiceSel.appendChild(o);
    });
    if (!chosenVoice) chosenVoice = pickDefaultVoice();
    if (chosenVoice) els.voiceSel.value = String(voices.indexOf(chosenVoice));
  }

  // Voices load asynchronously in most browsers.
  if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = refreshVoices;

  // Stop narration when leaving the page (otherwise it keeps talking).
  window.addEventListener(&quot;beforeunload&quot;, function () { synth.cancel(); });

  document.addEventListener(&quot;DOMContentLoaded&quot;, buildBar);
})();

</script>
</body>

<!-- Voice-over script. One sentence per utterance. Hidden from view. -->
<div id=&quot;narration&quot; hidden>
Welcome to lesson four: slicing.
Slicing is the notation Python gives you for pulling a contiguous run of items out of any sequence, and reading it fluently pays off on almost every line.
The basic form is sequence, square bracket, start, colon, stop.
The single rule that unlocks everything is that the interval is half-open: it includes start and excludes stop.
That is why the length of the slice is simply stop minus start, with no off-by-one arithmetic to second-guess.
It is also why adjacent slices like zero to n and n to the end fit together perfectly, sharing the index n with no gap and no overlap.
Either bound can be omitted, and the omission means &quot;as far as it goes&quot;: colon n is the first n items, n colon is everything from n onward.
A bare colon means the whole thing, and on a list that is the idiomatic shallow copy.
Negative indices count from the right, so minus one is the last item and minus three colon gives you the last three.
And colon minus one gives you everything except the last item, which reads much better than length minus one.
There is an optional third number, the step: colon colon two takes every second element.
A step of minus one walks the sequence backwards, so sequence colon colon minus one is the idiomatic reverse.
Here is the property that surprises people coming from other languages: a slice never raises IndexError.
An out-of-range bound is quietly clamped to the edge, so slicing past the end just gives you what is there, even an empty sequence.
That is the opposite of indexing with a single integer, which does raise when you overshoot.
On a mutable sequence like a list, a slice is also an assignment target: you can replace a whole region in one statement, and the replacement need not be the same length.
You can delete a region the same way with del and a slice.
Strings, tuples, bytes, and ranges all slice with the identical syntax, but because they are immutable their slices return a fresh copy rather than a view.
One last idea to file away: the brackets are really passing a slice object to the data model, and a colon expression just constructs one for you.
We will return to that when we reach the data-model lesson.
Scroll down, take the quick checks, and replay the narration whenever you like.
When something is unclear, ask me directly. I am your teacher for this course.
</div>

<main>
  <div class=&quot;kicker&quot;>Lesson 04 · Idiomatic Python</div>
  <h1>Slicing</h1>
  <p class=&quot;lede&quot;>One compact notation reads a whole region out of any sequence —
  master the half-open interval and slices stop being something you puzzle over
  and become something you skim.</p>

  <p>You already index into arrays. The win here is reading and writing Python's
  slice syntax without translating it in your head — and internalising the one
  rule (<code>stop</code> is exclusive) that makes every other slice fall into
  place.</p>

  <h2>The half-open interval</h2>
  <div class=&quot;contrast&quot;>
    <div class=&quot;col other&quot;>
      <h4>Many languages</h4>
<pre><code><span class=&quot;c-com&quot;># compute a length, mind the +1</span>
sub = []
<span class=&quot;c-kw&quot;>for</span> i <span class=&quot;c-kw&quot;>in</span> <span class=&quot;c-fn&quot;>range</span>(start, stop):
    sub.append(seq[i])</code></pre>
    </div>
    <div class=&quot;col py&quot;>
      <h4>Idiomatic Python</h4>
<pre><code><span class=&quot;c-com&quot;># one expression; includes start, excludes stop</span>
sub = seq[start:stop]</code></pre>
    </div>
  </div>

  <p>Read <code>seq[2:5]</code> as <strong>“from index 2 up to <em>but not
  including</em> 5.”</strong> The interval is <em>half-open</em>, and that single
  choice is what makes slicing pleasant: the length is just
  <code>stop&amp;nbsp;-&amp;nbsp;start</code> (here <code>5 - 2 == 3</code> items), and
  adjacent slices like <code>seq[:n]</code> and <code>seq[n:]</code> meet exactly
  at <code>n</code> — no gap, no overlap, no off-by-one.</p>

  <h2>Omit a bound to mean “all the way”</h2>
<pre><code>seq[:n]   <span class=&quot;c-com&quot;># the first n items   (start defaults to 0)</span>
seq[n:]   <span class=&quot;c-com&quot;># everything from n on (stop defaults to len)</span>
seq[:]    <span class=&quot;c-com&quot;># the whole sequence — a shallow copy of a list</span></code></pre>
  <p>A missing bound means “as far as it goes.” <code>seq[:]</code> on a list is
  the idiomatic <strong>shallow copy</strong>: a new list, same elements.</p>

  <h2>Negative indices count from the right</h2>
<pre><code>seq[-1]    <span class=&quot;c-com&quot;># last item</span>
seq[-3:]   <span class=&quot;c-com&quot;># last three items</span>
seq[:-1]   <span class=&quot;c-com&quot;># everything except the last item</span></code></pre>
  <p>Negative numbers index from the end, so you never write
  <code>seq[len(seq) - 1]</code> again. <code>seq[:-1]</code> (“all but the last”)
  is far more readable than computing the length yourself.</p>

  <h2>The third number: step</h2>
<pre><code>seq[::2]    <span class=&quot;c-com&quot;># every second item</span>
seq[::-1]   <span class=&quot;c-com&quot;># the whole sequence, reversed</span></code></pre>
  <p>An optional <code>start:stop:step</code> third value sets the stride. A step
  of <code>-1</code> walks backwards, so <code>seq[::-1]</code> is the idiomatic
  <strong>reverse</strong> — it works on strings and tuples too, where there is no
  <code>.reverse()</code> method to reach for.</p>

  <div class=&quot;note&quot;><strong>Slices never raise <code>IndexError</code>.</strong>
  An out-of-range bound is <em>clamped</em> to the edge: <code>seq[:1000]</code>
  on a short list just returns what's there, and <code>seq[1000:]</code> returns
  <code>[]</code>. Contrast a single integer index — <code>seq[1000]</code> —
  which <em>does</em> raise. Slicing is forgiving; indexing is strict.</div>

  <h2>Slices are assignment targets (on mutable sequences)</h2>
  <p>On a list, a slice isn't just for reading — it names a region you can
  replace or delete, and the replacement need not be the same length:</p>
<pre><code>xs = [<span class=&quot;c-num&quot;>0</span>, <span class=&quot;c-num&quot;>1</span>, <span class=&quot;c-num&quot;>2</span>, <span class=&quot;c-num&quot;>3</span>, <span class=&quot;c-num&quot;>4</span>]
xs[<span class=&quot;c-num&quot;>1</span>:<span class=&quot;c-num&quot;>3</span>] = [<span class=&quot;c-str&quot;>&quot;a&quot;</span>, <span class=&quot;c-str&quot;>&quot;b&quot;</span>, <span class=&quot;c-str&quot;>&quot;c&quot;</span>]   <span class=&quot;c-com&quot;># grow the region: [0, &quot;a&quot;, &quot;b&quot;, &quot;c&quot;, 3, 4]</span>
<span class=&quot;c-kw&quot;>del</span> xs[<span class=&quot;c-num&quot;>1</span>:<span class=&quot;c-num&quot;>3</span>]                <span class=&quot;c-com&quot;># remove a region in place</span></code></pre>
  <p>Strings, tuples, <code>bytes</code>, and <code>range</code> slice with the
  <em>same</em> syntax, but they're <strong>immutable</strong> — so a slice of a
  string returns a brand-new string (a copy), and slice assignment on them is an
  error.</p>

  <div class=&quot;note&quot;><strong>Peek under the hood:</strong> <code>seq[1:3]</code> is
  sugar — Python builds a <code>slice(1, 3)</code> object and hands it to
  <code>seq.__getitem__</code>. You can make one explicitly with
  <code>slice(start, stop, step)</code>. We'll unpack that in the data-model
  lesson; for now, just know the colon syntax <em>constructs an object</em>.</div>

  <!-- ---------------- Quiz ---------------- -->
  <h2>Three quick checks</h2>
  <p class=&quot;muted&quot;>Recall beats recognition — answer before you scroll. Immediate
  feedback below each.</p>

  <div class=&quot;quiz&quot; id=&quot;q1&quot;>
    <div class=&quot;q&quot;>1. Given <code>s = &quot;python&quot;</code>, what is <code>s[1:4]</code>?</div>
    <button class=&quot;opt&quot; data-correct=&quot;1&quot;>&quot;yth&quot; — indices 1, 2, 3 (stop is excluded)</button>
    <button class=&quot;opt&quot;>&quot;ytho&quot; — indices 1 through 4 inclusive</button>
    <button class=&quot;opt&quot;>&quot;pyth&quot; — indices 0, 1, 2, 3 included</button>
    <div class=&quot;fb&quot;></div>
  </div>

  <div class=&quot;quiz&quot; id=&quot;q2&quot;>
    <div class=&quot;q&quot;>2. Which expression reverses a sequence idiomatically?</div>
    <button class=&quot;opt&quot;>seq[len(seq)::-1] flips it end to start</button>
    <button class=&quot;opt&quot; data-correct=&quot;1&quot;>seq[::-1] walks it with a step of -1</button>
    <button class=&quot;opt&quot;>seq[-1:0] reads it from the back</button>
    <div class=&quot;fb&quot;></div>
  </div>

  <div class=&quot;quiz&quot; id=&quot;q3&quot;>
    <div class=&quot;q&quot;>3. With <code>xs = [1, 2, 3]</code>, what does <code>xs[5:9]</code> do?</div>
    <button class=&quot;opt&quot; data-correct=&quot;1&quot;>Returns [] — out-of-range bounds clamp, no error</button>
    <button class=&quot;opt&quot;>Raises IndexError because 5 is past the end</button>
    <button class=&quot;opt&quot;>Returns [3] by clamping start back to the last item</button>
    <div class=&quot;fb&quot;></div>
  </div>

  <hr>

  <p><strong>Primary source to go deeper:</strong> the official Python tutorial's
  <a href=&quot;https://docs.python.org/3/tutorial/introduction.html#lists&quot;>introduction
  to lists and slicing</a> walks the half-open interval with worked examples — the
  clearest first read. For the exact rules (clamping, steps, negative bounds), see
  the language reference on
  <a href=&quot;https://docs.python.org/3/reference/expressions.html#slicings&quot;>slicings</a>.</p>

  <div class=&quot;ask-teacher&quot;>💬 <strong>Stuck or curious?</strong> Ask me directly —
  “why is <code>stop</code> exclusive?”, “how is <code>s[:]</code> different from

document.querySelectorAll(&quot;.quiz&quot;).forEach(function (quiz) {
  var fb = quiz.querySelector(&quot;.fb&quot;);
  var msgs = {
    q1: { ok: &quot;Correct — a slice includes start and excludes stop, so s[1:4] is indices 1, 2, 3: \&quot;yth\&quot;.&quot;,
          no: &quot;Remember the half-open rule: include start (1), exclude stop (4). That's indices 1, 2, 3 — \&quot;yth\&quot;.&quot; },
    q2: { ok: &quot;Correct — an empty start/stop with step -1 walks the whole sequence backwards.&quot;,
          no: &quot;The clean idiom is seq[::-1]. seq[-1:0] is empty (a -1 step would be needed), and the others don't reverse cleanly.&quot; },
    q3: { ok: &quot;Correct — slices clamp out-of-range bounds instead of raising; start past the end yields [].&quot;,

      });
      if (!right) opt.classList.add(&quot;wrong&quot;);
      fb.textContent = right ? msgs.ok : msgs.no;
