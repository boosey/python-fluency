<!-- Voice-over script. One sentence per utterance. Hidden from view. -->
<div id=&quot;narration&quot; hidden>
Welcome to lesson eight: function arguments.
You already know how to call functions, so this lesson is about reading and writing Python's unusually flexible signatures with confidence.
Every Python argument can be passed by position or by name, and choosing names at the call site is one of the cheapest readability wins there is.
When you see a bare True or a lone number in a call, the reader has to guess what it means; passing it as verbose equals True spells out the intent.
Default values let a parameter fall back to something sensible when the caller stays silent.
But there is a famous trap: a default value is evaluated once, when the function is defined, not on every call.
So if you write def f with items defaulting to an empty list, that one list is shared across every call that relies on the default, and it quietly accumulates.
The fix is to default to None, then inside the body write items equals items or None-becomes-a-fresh-list.
A clean phrasing is: if items is None, set items to a new empty list.
Next, the star parameter, written args, collects any extra positional arguments into a tuple.
The double-star parameter, written kwargs, collects any extra keyword arguments into a dictionary.
Together they let a function accept an arbitrary number of arguments, which is how wrappers and decorators stay general.
The same two stars work in the other direction at the call site.
Calling f of star sequence spreads a list or tuple into positional arguments, and f of double-star mapping spreads a dict into keyword arguments.
A bare star in a signature is a marker: everything after it must be passed by keyword.
That is how you force callers to write verbose equals True instead of a mystery positional flag.
A slash in the signature does the opposite, marking the parameters before it as positional-only, which you will mostly meet in the standard library.
The guiding idiom is simple: prefer keyword arguments for booleans and flags, because a name at the call site is worth a comment.
Scroll down, take the quick checks, and replay this walkthrough whenever you like.
When something is unclear, ask me directly. I am your teacher for this course.
</div>

<main>
  <div class=&quot;kicker&quot;>Lesson 08 · Idiomatic Python</div>
  <h1>Function arguments</h1>
  <p class=&quot;lede&quot;>Python signatures are more flexible than almost any language you've
  used. Learn to read and write them, and you can follow real-world code — and APIs —
  without squinting.</p>

  <p>You already know how to call a function. The win here is fluency with the
  <em>shape</em> of Python signatures: passing by name, safe defaults,
  <code>*args</code>/<code>**kwargs</code>, and call-site unpacking.</p>

  <h2>Positional or keyword — your choice</h2>
  <p>Every ordinary parameter can be filled by position <em>or</em> by name. Passing
  by name is the idiom whenever the value alone wouldn't tell the reader what it is:</p>
  <div class=&quot;contrast&quot;>
    <div class=&quot;col other&quot;>
      <h4>Mystery positionals</h4>
<pre><code><span class=&quot;c-com&quot;># what do these mean?</span>
connect(<span class=&quot;c-str&quot;>&quot;db&quot;</span>, <span class=&quot;c-num&quot;>5432</span>, <span class=&quot;c-kw&quot;>True</span>)</code></pre>
    </div>
    <div class=&quot;col py&quot;>
      <h4>Idiomatic Python</h4>
<pre><code><span class=&quot;c-com&quot;># the names are the documentation</span>
connect(<span class=&quot;c-str&quot;>&quot;db&quot;</span>, port=<span class=&quot;c-num&quot;>5432</span>, ssl=<span class=&quot;c-kw&quot;>True</span>)</code></pre>
    </div>
  </div>

  <h2>Default arguments — and the classic trap</h2>
  <p>A default lets a parameter fall back to a value when the caller stays silent.
  But a default is evaluated <strong>once</strong>, at <em>def</em> time — not on
  every call. A mutable default is therefore shared across calls and accumulates:</p>
<pre><code><span class=&quot;c-com&quot;># BROKEN: the one list is reused on every default call</span>
<span class=&quot;c-kw&quot;>def</span> <span class=&quot;c-fn&quot;>append_to</span>(value, items=[]):
    items.append(value)
    <span class=&quot;c-kw&quot;>return</span> items

<span class=&quot;c-fn&quot;>append_to</span>(<span class=&quot;c-num&quot;>1</span>)  <span class=&quot;c-com&quot;># [1]</span>
<span class=&quot;c-fn&quot;>append_to</span>(<span class=&quot;c-num&quot;>2</span>)  <span class=&quot;c-com&quot;># [1, 2]  — surprise!</span></code></pre>
  <p>The fix is the idiom you'll see everywhere: default to <code>None</code>, then
  build a fresh object inside the body.</p>
<pre><code><span class=&quot;c-com&quot;># FIXED: a new list every call</span>
<span class=&quot;c-kw&quot;>def</span> <span class=&quot;c-fn&quot;>append_to</span>(value, items=<span class=&quot;c-kw&quot;>None</span>):
    <span class=&quot;c-kw&quot;>if</span> items <span class=&quot;c-kw&quot;>is</span> <span class=&quot;c-kw&quot;>None</span>:
        items = []
    items.append(value)
    <span class=&quot;c-kw&quot;>return</span> items</code></pre>
  <div class=&quot;note&quot;><strong>Rule of thumb:</strong> never put a mutable value
  (<code>[]</code>, <code>{}</code>, <code>set()</code>) in a default. Use
  <code>None</code> as the sentinel and create the real object in the body — either
  <code>if items is None: items = []</code> or the terser <code>items = items or
  []</code>.</div>

  <h2><code>*args</code> and <code>**kwargs</code>: collect the extras</h2>
  <p>A <code>*</code> parameter collects leftover <em>positional</em> arguments into a
  <strong>tuple</strong>; a <code>**</code> parameter collects leftover
  <em>keyword</em> arguments into a <strong>dict</strong>. The names are convention,
  not syntax — the stars do the work:</p>
<pre><code><span class=&quot;c-kw&quot;>def</span> <span class=&quot;c-fn&quot;>log</span>(level, *args, **kwargs):
    <span class=&quot;c-fn&quot;>print</span>(level, args, kwargs)

<span class=&quot;c-fn&quot;>log</span>(<span class=&quot;c-str&quot;>&quot;INFO&quot;</span>, <span class=&quot;c-num&quot;>1</span>, <span class=&quot;c-num&quot;>2</span>, user=<span class=&quot;c-str&quot;>&quot;ada&quot;</span>)
<span class=&quot;c-com&quot;># INFO (1, 2) {'user': 'ada'}</span></code></pre>
  <p>This is how wrappers and decorators stay general: they accept
  <code>(*args, **kwargs)</code> and forward them on unchanged.</p>

  <h2>Unpacking at the call site</h2>
  <p>The same two stars run in reverse when <em>calling</em>. <code>*</code> spreads a
  sequence into positional arguments; <code>**</code> spreads a mapping into keyword
  arguments:</p>
<pre><code>point = (<span class=&quot;c-num&quot;>3</span>, <span class=&quot;c-num&quot;>4</span>)
opts  = {<span class=&quot;c-str&quot;>&quot;port&quot;</span>: <span class=&quot;c-num&quot;>5432</span>, <span class=&quot;c-str&quot;>&quot;ssl&quot;</span>: <span class=&quot;c-kw&quot;>True</span>}

<span class=&quot;c-fn&quot;>move</span>(*point)        <span class=&quot;c-com&quot;># same as move(3, 4)</span>
<span class=&quot;c-fn&quot;>connect</span>(<span class=&quot;c-str&quot;>&quot;db&quot;</span>, **opts)  <span class=&quot;c-com&quot;># same as connect(&quot;db&quot;, port=5432, ssl=True)</span></code></pre>

  <h2>Keyword-only arguments: the bare <code>*</code></h2>
  <p>A bare <code>*</code> in a signature is a fence: every parameter after it
  <strong>must</strong> be passed by name. This is how a library forces callers to be
  explicit about flags instead of trailing a mystery boolean:</p>
<pre><code><span class=&quot;c-kw&quot;>def</span> <span class=&quot;c-fn&quot;>render</span>(template, *, verbose=<span class=&quot;c-kw&quot;>False</span>):
    ...

<span class=&quot;c-fn&quot;>render</span>(<span class=&quot;c-str&quot;>&quot;page&quot;</span>, verbose=<span class=&quot;c-kw&quot;>True</span>)   <span class=&quot;c-com&quot;># OK — named, readable</span>
<span class=&quot;c-fn&quot;>render</span>(<span class=&quot;c-str&quot;>&quot;page&quot;</span>, <span class=&quot;c-kw&quot;>True</span>)           <span class=&quot;c-com&quot;># TypeError: too many positional args</span></code></pre>
  <p class=&quot;muted&quot;>The mirror image is the positional-only marker <code>/</code> (Python
  3.8+): parameters before it can't be passed by name, e.g.
  <code>def f(a, b, /):</code>. You'll meet it mostly in the standard library; you'll
  rarely need to write it yourself.</p>

  <div class=&quot;note&quot;><strong>The idiom to keep:</strong> prefer keyword arguments for
  booleans and flags. A bare <code>True</code> at a call site tells the reader
  nothing; <code>verbose=True</code> reads like a sentence. When you design a function
  with flags, put them after a bare <code>*</code> so callers can't omit the name.</div>

  <!-- ---------------- Quiz ---------------- -->
  <h2>Three quick checks</h2>
  <p class=&quot;muted&quot;>Recall beats recognition — answer before you scroll. Immediate
  feedback below each.</p>

  <div class=&quot;quiz&quot; id=&quot;q1&quot;>
    <div class=&quot;q&quot;>1. Why does <code>def f(x, items=[])</code> misbehave across calls?</div>
    <button class=&quot;opt&quot; data-correct=&quot;1&quot;>the default list is created once at def time and reused</button>
    <button class=&quot;opt&quot;>the default list is rebuilt fresh on each separate call</button>
    <button class=&quot;opt&quot;>empty lists are illegal as defaults and raise an error</button>
    <div class=&quot;fb&quot;></div>
  </div>

  <div class=&quot;quiz&quot; id=&quot;q2&quot;>
    <div class=&quot;q&quot;>2. Inside <code>def g(*args, **kwargs)</code>, what types are they?</div>
    <button class=&quot;opt&quot; data-correct=&quot;1&quot;>args is a tuple and kwargs is a dict</button>
    <button class=&quot;opt&quot;>args is a list and kwargs is a set</button>
    <button class=&quot;opt&quot;>args is a dict and kwargs is a list</button>
    <div class=&quot;fb&quot;></div>
  </div>

  <div class=&quot;quiz&quot; id=&quot;q3&quot;>
    <div class=&quot;q&quot;>3. In <code>def f(a, *, verbose=False)</code>, how must <code>verbose</code> be passed?</div>
    <button class=&quot;opt&quot; data-correct=&quot;1&quot;>by keyword only, written as verbose=True</button>
    <button class=&quot;opt&quot;>by position only, as the second argument</button>
    <button class=&quot;opt&quot;>either by position or by keyword freely</button>
    <div class=&quot;fb&quot;></div>
  </div>

document.querySelectorAll(&quot;.quiz&quot;).forEach(function (quiz) {
  var fb = quiz.querySelector(&quot;.fb&quot;);
  var msgs = {
    q1: { ok: &quot;Correct — the default is evaluated once at def time, so one shared list accumulates across calls. Use items=None then build a fresh list inside.&quot;,
          no: &quot;Not quite. The default is evaluated once at def time, so the same list is reused and grows. Default to None and create a new list in the body.&quot; },
    q2: { ok: &quot;Correct — `*args` gathers extra positionals into a tuple, `**kwargs` gathers extra keywords into a dict.&quot;,
          no: &quot;No — `*args` is always a tuple and `**kwargs` is always a dict, regardless of the names you choose.&quot; },
    q3: { ok: &quot;Correct — everything after a bare `*` is keyword-only, so it must be written `verbose=True`.&quot;,
          no: &quot;Not quite. A bare `*` makes following parameters keyword-only, so `verbose` can't be passed positionally.&quot; }
  }[quiz.id];
  quiz.querySelectorAll(&quot;.opt&quot;).forEach(function (opt) {
    opt.addEventListener(&quot;click&quot;, function () {
      var right = opt.dataset.correct === &quot;1&quot;;
      quiz.querySelectorAll(&quot;.opt&quot;).forEach(function (o) {
        o.disabled = true;
        if (o.dataset.correct === &quot;1&quot;) o.classList.add(&quot;correct&quot;);
      });

<script>
/* narrate.js — reusable voice-over for course lessons.
 *
 * Uses the browser's built-in Web Speech API (speechSynthesis). No install, no
 * network, works offline in any modern browser.
 *
 * Usage in a lesson:
 *   1. Add a hidden narration script:
 *        <div id=&quot;narration&quot; hidden>
 *          First sentence of the voice-over. Second sentence. ...
 *        </div>
 *      Split narration into sentences ending in . ! or ? — each becomes one
 *      utterance so pause/stop are responsive and Chrome's long-utterance bug
 *      (it silently stops after ~15s) is avoided.
 *   2. Include this script: <script src=&quot;../assets/narrate.js&quot; defer><\/script>
 *
 * The control bar (Play / Pause / Stop, speed, voice) is injected automatically.
 */
(function () {
  &quot;use strict&quot;;

  if (!(&quot;speechSynthesis&quot; in window)) {
    document.addEventListener(&quot;DOMContentLoaded&quot;, function () {
      var bar = document.createElement(&quot;div&quot;);
      bar.className = &quot;narrator-bar&quot;;
      bar.style.cssText = barCss() + &quot;;color:#b23b3b&quot;;
      bar.textContent = &quot;Voice-over unavailable: this browser has no speech synthesis.&quot;;
      document.body.appendChild(bar);
    });
    return;
  }

  var synth = window.speechSynthesis;
  var chunks = [];      // sentences to speak
  var idx = 0;          // current sentence index
  var playing = false;
  var paused = false;
  var voices = [];
  var chosenVoice = null;
  var rate = 1.0;
  var els = {};
  var watchdog = null;   // fallback timer for voices that never fire `onend`
  var heartbeat = null;  // periodic resume() to defeat Chrome's ~15s stall

  function clearTimers() {
    if (watchdog) { clearTimeout(watchdog); watchdog = null; }
    if (heartbeat) { clearInterval(heartbeat); heartbeat = null; }
  }

  function barCss() {
    return [
      &quot;position:fixed&quot;, &quot;top:0&quot;, &quot;left:0&quot;, &quot;right:0&quot;, &quot;z-index:1000&quot;,
      &quot;display:flex&quot;, &quot;gap:.5rem&quot;, &quot;align-items:center&quot;,
      &quot;padding:.5rem .9rem&quot;,
      &quot;background:rgba(253,252,249,.92)&quot;, &quot;backdrop-filter:blur(6px)&quot;,
      &quot;border-bottom:1px solid #e3e0d8&quot;,
      &quot;font-family:ui-sans-serif,system-ui,sans-serif&quot;, &quot;font-size:.85rem&quot;
    ].join(&quot;;&quot;);
  }

  function btn(label, title) {
    var b = document.createElement(&quot;button&quot;);
    b.textContent = label;
    b.title = title || label;
    b.style.cssText =
      &quot;font:inherit;cursor:pointer;border:1px solid #cfcabb;background:#fff;&quot; +
      &quot;border-radius:6px;padding:.25rem .6rem;color:#1a1a1a&quot;;
    return b;
  }

  function loadNarration() {
    var src = document.getElementById(&quot;narration&quot;);
    if (!src) return [];
    var text = src.textContent.replace(/\s+/g, &quot; &quot;).trim();
    if (!text) return [];
    // Split into sentences, keeping the terminal punctuation.
    var parts = text.match(/[^.!?]+[.!?]+(\s|$)|[^.!?]+$/g) || [text];
    return parts.map(function (s) { return s.trim(); }).filter(Boolean);
  }

  function pickDefaultVoice() {
    if (!voices.length) return null;
    // Prefer an English voice; fall back to the first available.
    var en = voices.filter(function (v) { return /^en(-|_|$)/i.test(v.lang); });
    var pool = en.length ? en : voices;
    // Prefer a LOCAL (on-device) voice. Chrome's remote Google voices fire
    // `onend` unreliably — usually not at all between back-to-back utterances —
    // which stalls the sentence-by-sentence chain after the first line. Local
    // voices fire it dependably, so use them first.
    var local = pool.filter(function (v) { return v.localService; });
    return local[0] || pool[0];
  }

  function startHeartbeat() {
    if (heartbeat) clearInterval(heartbeat);
    // Chrome silently pauses synthesis after ~15s; a periodic resume() keeps
    // long sentences (and the queue) alive.
    heartbeat = setInterval(function () {
      if (playing &amp;&amp; !paused &amp;&amp; synth.speaking) synth.resume();
    }, 10000);
  }

  function speakFrom(i) {
    if (i >= chunks.length) { stop(); return; }
    idx = i;
    var advanced = false;            // guard: advance to the next chunk once
    function next() {
      if (advanced) return;
      advanced = true;
      if (watchdog) { clearTimeout(watchdog); watchdog = null; }
      if (playing &amp;&amp; !paused) speakFrom(idx + 1);
    }

    var u = new SpeechSynthesisUtterance(chunks[i]);
    if (chosenVoice) u.voice = chosenVoice;
    u.rate = rate;
    u.onend = next;                  // fast path: advance the moment it ends
    u.onerror = next;                // a failed/cancelled chunk: skip ahead
    var started = false;
    u.onstart = function () { started = true; };
    synth.speak(u);

    // Fallback for voices that never fire `onend` (notably Chrome's remote
    // Google voices): poll `speaking` every 250ms and advance as soon as the
    // engine has spoken and gone quiet, so the gap between lines stays short
    // instead of stalling. A per-line hard cap covers an engine that never
    // starts at all.
    var words = chunks[i].split(/\s+/).length;
    var hardCapMs = (words / 2.0) * 1000 + 8000;
    var elapsed = 0, step = 250;
    function poll() {
      if (advanced) return;
      if (paused) { watchdog = setTimeout(poll, step); return; }
      if (synth.speaking) started = true;
      elapsed += step;
      if (!playing || (started &amp;&amp; !synth.speaking) || elapsed >= hardCapMs) { next(); return; }
      watchdog = setTimeout(poll, step);
    }
    watchdog = setTimeout(poll, step);
  }

  function play() {
    if (!chunks.length) return;
    if (paused) { synth.resume(); paused = false; setState(); return; }
    if (playing) return;
    synth.cancel();
    playing = true; paused = false;
    startHeartbeat();
    speakFrom(idx >= chunks.length ? 0 : idx);
    setState();
  }
  function pause() {
    if (!playing || paused) return;
    synth.pause(); paused = true; setState();
  }
  function stop() {
    // Set state BEFORE cancel(): cancelling can synchronously fire the current
    // utterance onend/onerror, and if playing were still true that handler
    // would speak the next sentence — the press-Stop-hear-the-next-line bug.
    playing = false; paused = false; idx = 0;
    clearTimers();
    synth.cancel();
    setState();
  }

  function setState() {
    els.play.textContent = paused ? &quot;▶ Resume&quot; : (playing ? &quot;❚❚ Pause&quot; : &quot;▶ Play narration&quot;);
    els.play.onclick = (playing &amp;&amp; !paused) ? pause : play;
    els.stop.disabled = !playing;
    els.stop.style.opacity = playing ? &quot;1&quot; : &quot;.5&quot;;
  }

  function buildBar() {
    chunks = loadNarration();

    var bar = document.createElement(&quot;div&quot;);
    bar.className = &quot;narrator-bar&quot;;
    bar.style.cssText = barCss();

    var label = document.createElement(&quot;strong&quot;);
    label.textContent = &quot;🔊 Voice-over&quot;;
    label.style.cssText = &quot;color:#3a5a78;margin-right:.3rem&quot;;

    els.play = btn(&quot;▶ Play narration&quot;);
    els.stop = btn(&quot;■ Stop&quot;);
    els.stop.onclick = stop;

    // Speed control
    var speedWrap = document.createElement(&quot;label&quot;);
    speedWrap.style.cssText = &quot;display:flex;align-items:center;gap:.3rem;color:#6b6b6b&quot;;
    speedWrap.append(&quot;speed&quot;);
    var speed = document.createElement(&quot;input&quot;);
    speed.type = &quot;range&quot;; speed.min = &quot;0.7&quot;; speed.max = &quot;1.4&quot;; speed.step = &quot;0.1&quot;; speed.value = &quot;1&quot;;
    speed.style.width = &quot;70px&quot;;
    var speedVal = document.createElement(&quot;span&quot;);
    speedVal.textContent = &quot;1.0×&quot;; speedVal.style.minWidth = &quot;2.4em&quot;;
    speed.oninput = function () {
      rate = parseFloat(speed.value); speedVal.textContent = rate.toFixed(1) + &quot;×&quot;;
      if (playing &amp;&amp; !paused) { var resumeAt = idx; stop(); idx = resumeAt; play(); }
    };
    speedWrap.append(speed, speedVal);

    // Voice selector
    var voiceSel = document.createElement(&quot;select&quot;);
    voiceSel.style.cssText = &quot;font:inherit;max-width:11rem;border:1px solid #cfcabb;border-radius:6px;padding:.2rem&quot;;
    voiceSel.title = &quot;Narration voice&quot;;
    voiceSel.onchange = function () {
      chosenVoice = voices[parseInt(voiceSel.value, 10)] || null;
      if (playing) { var at = idx; stop(); idx = at; play(); }
    };
    els.voiceSel = voiceSel;

    var spacer = document.createElement(&quot;span&quot;);
    spacer.style.flex = &quot;1&quot;;

    bar.append(label, els.play, els.stop, speedWrap, spacer, voiceSel);
    document.body.appendChild(bar);

    // Push page content down so the fixed bar doesn't cover the title.
    document.body.style.paddingTop = &quot;2.6rem&quot;;

    setState();
    refreshVoices();
  }

  function refreshVoices() {
    voices = synth.getVoices();
    if (!els.voiceSel) return;
    els.voiceSel.innerHTML = &quot;&quot;;
    voices.forEach(function (v, i) {
      var o = document.createElement(&quot;option&quot;);
      o.value = i; o.textContent = v.name + &quot; (&quot; + v.lang + &quot;)&quot;;
      els.voiceSel.appendChild(o);
    });
    if (!chosenVoice) chosenVoice = pickDefaultVoice();
    if (chosenVoice) els.voiceSel.value = String(voices.indexOf(chosenVoice));
  }

  // Voices load asynchronously in most browsers.
  if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = refreshVoices;

  // Stop narration when leaving the page (otherwise it keeps talking).
  window.addEventListener(&quot;beforeunload&quot;, function () { synth.cancel(); });

  document.addEventListener(&quot;DOMContentLoaded&quot;, buildBar);
})();

</script>

<!-- Voice-over script. One sentence per utterance. Hidden from view. -->
<div id=&quot;narration&quot; hidden>
Welcome to lesson nine: context managers.
In most languages, when you open a file you must remember to close it, usually in a finally block so it still closes if an exception is thrown.
Python folds that whole setup-and-teardown dance into one piece of syntax: the with statement.
You write with open path as f, and the file is guaranteed to close the moment the block ends.
That guarantee holds even if the body raises an exception, just like a finally clause, but without the boilerplate.
So the win is deterministic cleanup tied to a block: no manual close, no finally, no leaked handle.
The as part binds whatever the manager hands back, which for open is the file object itself.
You can manage several resources in one statement: with open a as fa, open b as fb, and both close cleanly.
Files are the famous example, but the protocol is everywhere once you start looking.
A threading Lock is a context manager: with lock acquires it on entry and releases it on exit, even if the body blows up.
The tempfile module gives you temporary files and directories that clean themselves up when the block ends.
contextlib suppress lets you swallow a specific exception in one readable line instead of a try except that does nothing.
And when you want your own manager, the easiest way is the contextlib contextmanager decorator on a generator.
You write setup, then yield the value, then teardown, and the yield is where the body runs.
Under the hood, any object with dunder enter and dunder exit can be a context manager, and we will meet those dunder methods properly in the next lesson.
dunder enter runs on the way in and its return value is what as binds; dunder exit runs on the way out and handles any exception.
Even the decimal module uses this: decimal localcontext temporarily changes precision just inside the block.
The mental shift is to stop thinking close it when I am done and start thinking this resource lives exactly as long as this block.
Whenever you see a try finally whose only job is cleanup, that is usually a context manager waiting to happen.
Scroll down, take the quick checks, and replay this narration whenever you like.
When something is unclear, ask me directly. I am your teacher for this course.
</div>

<main>
  <div class=&quot;kicker&quot;>Lesson 09 · Idiomatic Python</div>
  <h1>Context managers</h1>
  <p class=&quot;lede&quot;>One block, guaranteed cleanup. <code>with</code> ties a resource's
  whole lifetime to a scope — so it's released the instant you leave, exception or not.</p>

  <p>You already know to free what you acquire. The point of this lesson isn't
  <em>that</em> you must clean up — it's that Python has a dedicated syntax that
  makes the cleanup automatic and impossible to forget.</p>

  <h2>The pattern Python replaces</h2>
  <div class=&quot;contrast&quot;>
    <div class=&quot;col other&quot;>
      <h4>Most languages</h4>
<pre><code><span class=&quot;c-com&quot;># acquire, use, release in finally</span>
f = <span class=&quot;c-fn&quot;>open</span>(path)
<span class=&quot;c-kw&quot;>try</span>:
    data = f.read()
<span class=&quot;c-kw&quot;>finally</span>:
    f.close()</code></pre>
    </div>
    <div class=&quot;col py&quot;>
      <h4>Idiomatic Python</h4>
<pre><code><span class=&quot;c-com&quot;># the file closes for you</span>
<span class=&quot;c-kw&quot;>with</span> <span class=&quot;c-fn&quot;>open</span>(path) <span class=&quot;c-kw&quot;>as</span> f:
    data = f.read()</code></pre>
    </div>
  </div>

  <p>Read it as: <strong>“<code>open(path)</code> for the duration of this
  block, called <code>f</code>.”</strong> When the block ends — whether it falls
  off the bottom, <code>return</code>s, or <strong>raises</strong> — the file is
  closed. The <code>finally</code> is built in.</p>

  <div class=&quot;note&quot;><strong>The mental shift:</strong> stop thinking “close it when
  I'm done” and start thinking “this resource lives exactly as long as this
  block.” The <code>with</code> statement makes the resource's lifetime visible in
  the indentation.</div>

  <h2>The <code>as</code> binds the entry value</h2>
  <p>The thing after <code>as</code> is whatever the manager hands back on entry —
  for <code>open</code> that's the file object, but it isn't always the same object
  you called <code>with</code> on. A manager can return anything useful:</p>
<pre><code><span class=&quot;c-kw&quot;>with</span> <span class=&quot;c-fn&quot;>open</span>(path) <span class=&quot;c-kw&quot;>as</span> f:        <span class=&quot;c-com&quot;># f is the file object</span>
    <span class=&quot;c-kw&quot;>for</span> line <span class=&quot;c-kw&quot;>in</span> f:
        process(line)</code></pre>
  <p>You can also use a manager with no <code>as</code> at all when you only care
  about its side effect (a lock, a timer, a redirect).</p>

  <h2>Managing several resources at once</h2>
<pre><code><span class=&quot;c-com&quot;># both files close, in reverse order, no matter what</span>
<span class=&quot;c-kw&quot;>with</span> <span class=&quot;c-fn&quot;>open</span>(src) <span class=&quot;c-kw&quot;>as</span> fa, <span class=&quot;c-fn&quot;>open</span>(dst, <span class=&quot;c-str&quot;>&quot;w&quot;</span>) <span class=&quot;c-kw&quot;>as</span> fb:
    fb.write(fa.read())</code></pre>
  <p>Comma-separate the managers in one <code>with</code>. They're entered
  left-to-right and exited right-to-left, so <code>fb</code> closes before
  <code>fa</code>. (For long lists, parenthesise across lines on 3.10+.)</p>

  <h2>Managers you'll meet constantly</h2>
<pre><code><span class=&quot;c-com&quot;># a lock: acquired on entry, released on exit — even on error</span>
<span class=&quot;c-kw&quot;>with</span> lock:
    counter += <span class=&quot;c-num&quot;>1</span>

<span class=&quot;c-com&quot;># a self-cleaning temp directory</span>
<span class=&quot;c-kw&quot;>import</span> tempfile
<span class=&quot;c-kw&quot;>with</span> tempfile.TemporaryDirectory() <span class=&quot;c-kw&quot;>as</span> d:
    work_in(d)            <span class=&quot;c-com&quot;># d and its contents vanish at block end</span>

<span class=&quot;c-com&quot;># swallow exactly one expected error, no empty except</span>
<span class=&quot;c-kw&quot;>from</span> contextlib <span class=&quot;c-kw&quot;>import</span> suppress
<span class=&quot;c-kw&quot;>with</span> suppress(FileNotFoundError):
    os.remove(stale)</code></pre>
  <p><code>threading.Lock</code>, <code>tempfile</code>, and
  <code>contextlib.suppress</code> all speak the same protocol as <code>open</code>.
  Once you recognise the shape, <code>with</code> reads as “do this safely, then
  tidy up.”</p>

  <h2>Writing your own — the easy way</h2>
  <p>You rarely need a class. <code>contextlib.contextmanager</code> turns a
  generator into a manager: everything before <code>yield</code> is setup,
  everything after is teardown, and <code>yield</code> is where the body runs.</p>
<pre><code><span class=&quot;c-kw&quot;>from</span> contextlib <span class=&quot;c-kw&quot;>import</span> contextmanager

<span class=&quot;c-fn&quot;>@contextmanager</span>
<span class=&quot;c-kw&quot;>def</span> <span class=&quot;c-fn&quot;>timed</span>(label):
    start = time.perf_counter()
    <span class=&quot;c-kw&quot;>try</span>:
        <span class=&quot;c-kw&quot;>yield</span>                       <span class=&quot;c-com&quot;># the with-block runs here</span>
    <span class=&quot;c-kw&quot;>finally</span>:
        dt = time.perf_counter() - start
        <span class=&quot;c-fn&quot;>print</span>(f<span class=&quot;c-str&quot;>&quot;{label}: {dt:.3f}s&quot;</span>)

<span class=&quot;c-kw&quot;>with</span> timed(<span class=&quot;c-str&quot;>&quot;load&quot;</span>):
    rows = load()</code></pre>
  <p>The <code>finally</code> around the <code>yield</code> guarantees teardown
  even if the block raises — the same safety <code>open</code> gives you, now in
  your own code. Whatever you <code>yield</code> becomes the <code>as</code> value.</p>

  <h2>The protocol underneath</h2>
  <p>Any object is a context manager if it defines two methods:
  <code>__enter__</code> runs on the way in and its return value is what
  <code>as</code> binds; <code>__exit__</code> runs on the way out and receives any
  exception so it can clean up (and, if it chooses, suppress it).</p>
  <p class=&quot;muted&quot;>These are <em>dunder</em> methods — part of Python's data model.
  We meet them properly in the next lesson; for now, just know <code>with</code>
  calls them for you. Even <code>decimal.localcontext()</code> uses this to restore
  precision when its block ends.</p>

<script>
/* narrate.js — reusable voice-over for course lessons.
 *
 * Uses the browser's built-in Web Speech API (speechSynthesis). No install, no
 * network, works offline in any modern browser.
 *
 * Usage in a lesson:
 *   1. Add a hidden narration script:
 *        <div id=&quot;narration&quot; hidden>
 *          First sentence of the voice-over. Second sentence. ...
 *        </div>
 *      Split narration into sentences ending in . ! or ? — each becomes one
 *      utterance so pause/stop are responsive and Chrome's long-utterance bug
 *      (it silently stops after ~15s) is avoided.
 *   2. Include this script: <script src=&quot;../assets/narrate.js&quot; defer><\/script>
 *
 * The control bar (Play / Pause / Stop, speed, voice) is injected automatically.
 */
(function () {
  &quot;use strict&quot;;

  if (!(&quot;speechSynthesis&quot; in window)) {
    document.addEventListener(&quot;DOMContentLoaded&quot;, function () {
      var bar = document.createElement(&quot;div&quot;);
      bar.className = &quot;narrator-bar&quot;;
      bar.style.cssText = barCss() + &quot;;color:#b23b3b&quot;;
      bar.textContent = &quot;Voice-over unavailable: this browser has no speech synthesis.&quot;;
      document.body.appendChild(bar);
    });
    return;
  }

  var synth = window.speechSynthesis;
  var chunks = [];      // sentences to speak
  var idx = 0;          // current sentence index
  var playing = false;
  var paused = false;
  var voices = [];
  var chosenVoice = null;
  var rate = 1.0;
  var els = {};
  var watchdog = null;   // fallback timer for voices that never fire `onend`
  var heartbeat = null;  // periodic resume() to defeat Chrome's ~15s stall

  function clearTimers() {
    if (watchdog) { clearTimeout(watchdog); watchdog = null; }
    if (heartbeat) { clearInterval(heartbeat); heartbeat = null; }
  }

  function barCss() {
    return [
      &quot;position:fixed&quot;, &quot;top:0&quot;, &quot;left:0&quot;, &quot;right:0&quot;, &quot;z-index:1000&quot;,
      &quot;display:flex&quot;, &quot;gap:.5rem&quot;, &quot;align-items:center&quot;,
      &quot;padding:.5rem .9rem&quot;,
      &quot;background:rgba(253,252,249,.92)&quot;, &quot;backdrop-filter:blur(6px)&quot;,
      &quot;border-bottom:1px solid #e3e0d8&quot;,
      &quot;font-family:ui-sans-serif,system-ui,sans-serif&quot;, &quot;font-size:.85rem&quot;
    ].join(&quot;;&quot;);
  }

  function btn(label, title) {
    var b = document.createElement(&quot;button&quot;);
    b.textContent = label;
    b.title = title || label;
    b.style.cssText =
      &quot;font:inherit;cursor:pointer;border:1px solid #cfcabb;background:#fff;&quot; +
      &quot;border-radius:6px;padding:.25rem .6rem;color:#1a1a1a&quot;;
    return b;
  }

  function loadNarration() {
    var src = document.getElementById(&quot;narration&quot;);
    if (!src) return [];
    var text = src.textContent.replace(/\s+/g, &quot; &quot;).trim();
    if (!text) return [];
    // Split into sentences, keeping the terminal punctuation.
    var parts = text.match(/[^.!?]+[.!?]+(\s|$)|[^.!?]+$/g) || [text];
    return parts.map(function (s) { return s.trim(); }).filter(Boolean);
  }

  function pickDefaultVoice() {
    if (!voices.length) return null;
    // Prefer an English voice; fall back to the first available.
    var en = voices.filter(function (v) { return /^en(-|_|$)/i.test(v.lang); });
    var pool = en.length ? en : voices;
    // Prefer a LOCAL (on-device) voice. Chrome's remote Google voices fire
    // `onend` unreliably — usually not at all between back-to-back utterances —
    // which stalls the sentence-by-sentence chain after the first line. Local
    // voices fire it dependably, so use them first.
    var local = pool.filter(function (v) { return v.localService; });
    return local[0] || pool[0];
  }

  function startHeartbeat() {
    if (heartbeat) clearInterval(heartbeat);
    // Chrome silently pauses synthesis after ~15s; a periodic resume() keeps
    // long sentences (and the queue) alive.
    heartbeat = setInterval(function () {
      if (playing &amp;&amp; !paused &amp;&amp; synth.speaking) synth.resume();
    }, 10000);
  }

  function speakFrom(i) {
    if (i >= chunks.length) { stop(); return; }
    idx = i;
    var advanced = false;            // guard: advance to the next chunk once
    function next() {
      if (advanced) return;
      advanced = true;
      if (watchdog) { clearTimeout(watchdog); watchdog = null; }
      if (playing &amp;&amp; !paused) speakFrom(idx + 1);
    }

    var u = new SpeechSynthesisUtterance(chunks[i]);
    if (chosenVoice) u.voice = chosenVoice;
    u.rate = rate;
    u.onend = next;                  // fast path: advance the moment it ends
    u.onerror = next;                // a failed/cancelled chunk: skip ahead
    var started = false;
    u.onstart = function () { started = true; };
    synth.speak(u);

    // Fallback for voices that never fire `onend` (notably Chrome's remote
    // Google voices): poll `speaking` every 250ms and advance as soon as the
    // engine has spoken and gone quiet, so the gap between lines stays short
    // instead of stalling. A per-line hard cap covers an engine that never
    // starts at all.
    var words = chunks[i].split(/\s+/).length;
    var hardCapMs = (words / 2.0) * 1000 + 8000;
    var elapsed = 0, step = 250;
    function poll() {
      if (advanced) return;
      if (paused) { watchdog = setTimeout(poll, step); return; }
      if (synth.speaking) started = true;
      elapsed += step;
      if (!playing || (started &amp;&amp; !synth.speaking) || elapsed >= hardCapMs) { next(); return; }
      watchdog = setTimeout(poll, step);
    }
    watchdog = setTimeout(poll, step);
  }

  function play() {
    if (!chunks.length) return;
    if (paused) { synth.resume(); paused = false; setState(); return; }
    if (playing) return;
    synth.cancel();
    playing = true; paused = false;
    startHeartbeat();
    speakFrom(idx >= chunks.length ? 0 : idx);
    setState();
  }
  function pause() {
    if (!playing || paused) return;
    synth.pause(); paused = true; setState();
  }
  function stop() {
    // Set state BEFORE cancel(): cancelling can synchronously fire the current
    // utterance onend/onerror, and if playing were still true that handler
    // would speak the next sentence — the press-Stop-hear-the-next-line bug.
    playing = false; paused = false; idx = 0;
    clearTimers();
    synth.cancel();
    setState();
  }

  function setState() {
    els.play.textContent = paused ? &quot;▶ Resume&quot; : (playing ? &quot;❚❚ Pause&quot; : &quot;▶ Play narration&quot;);
    els.play.onclick = (playing &amp;&amp; !paused) ? pause : play;
    els.stop.disabled = !playing;
    els.stop.style.opacity = playing ? &quot;1&quot; : &quot;.5&quot;;
  }

  function buildBar() {
    chunks = loadNarration();

    var bar = document.createElement(&quot;div&quot;);
    bar.className = &quot;narrator-bar&quot;;
    bar.style.cssText = barCss();

    var label = document.createElement(&quot;strong&quot;);
    label.textContent = &quot;🔊 Voice-over&quot;;
    label.style.cssText = &quot;color:#3a5a78;margin-right:.3rem&quot;;

    els.play = btn(&quot;▶ Play narration&quot;);
    els.stop = btn(&quot;■ Stop&quot;);
    els.stop.onclick = stop;

    // Speed control
    var speedWrap = document.createElement(&quot;label&quot;);
    speedWrap.style.cssText = &quot;display:flex;align-items:center;gap:.3rem;color:#6b6b6b&quot;;
    speedWrap.append(&quot;speed&quot;);
    var speed = document.createElement(&quot;input&quot;);
    speed.type = &quot;range&quot;; speed.min = &quot;0.7&quot;; speed.max = &quot;1.4&quot;; speed.step = &quot;0.1&quot;; speed.value = &quot;1&quot;;
    speed.style.width = &quot;70px&quot;;
    var speedVal = document.createElement(&quot;span&quot;);
    speedVal.textContent = &quot;1.0×&quot;; speedVal.style.minWidth = &quot;2.4em&quot;;
    speed.oninput = function () {
      rate = parseFloat(speed.value); speedVal.textContent = rate.toFixed(1) + &quot;×&quot;;
      if (playing &amp;&amp; !paused) { var resumeAt = idx; stop(); idx = resumeAt; play(); }
    };
    speedWrap.append(speed, speedVal);

    // Voice selector
    var voiceSel = document.createElement(&quot;select&quot;);
    voiceSel.style.cssText = &quot;font:inherit;max-width:11rem;border:1px solid #cfcabb;border-radius:6px;padding:.2rem&quot;;
    voiceSel.title = &quot;Narration voice&quot;;
    voiceSel.onchange = function () {
      chosenVoice = voices[parseInt(voiceSel.value, 10)] || null;
      if (playing) { var at = idx; stop(); idx = at; play(); }
    };
    els.voiceSel = voiceSel;

    var spacer = document.createElement(&quot;span&quot;);
    spacer.style.flex = &quot;1&quot;;

    bar.append(label, els.play, els.stop, speedWrap, spacer, voiceSel);
    document.body.appendChild(bar);

    // Push page content down so the fixed bar doesn't cover the title.
    document.body.style.paddingTop = &quot;2.6rem&quot;;

    setState();
    refreshVoices();
  }

  function refreshVoices() {
    voices = synth.getVoices();
    if (!els.voiceSel) return;
    els.voiceSel.innerHTML = &quot;&quot;;
    voices.forEach(function (v, i) {
      var o = document.createElement(&quot;option&quot;);
      o.value = i; o.textContent = v.name + &quot; (&quot; + v.lang + &quot;)&quot;;
      els.voiceSel.appendChild(o);

  window.addEventListener(&quot;beforeunload&quot;, function () { synth.cancel(); });

  document.addEventListener(&quot;DOMContentLoaded&quot;, buildBar);

Welcome to lesson ten: the data model and dunder methods.
Here is the big idea that makes Python feel coherent once it clicks.
Python has no keyword for operator overloading and no special interface you declare.
Instead, the language defines a set of named methods, written with double underscores, that the syntax quietly calls for you.
We call these dunder methods, short for double underscore.
When you write len of x, Python calls x dot dunder len.
When you write a plus b, Python calls a dot dunder add of b.
The builtins already implement these methods, which is why lists, strings, and dicts feel native.
Your own classes opt in by implementing the very same protocol.
Let us build one small class, a two dimensional vector, and make it feel built in.
First, dunder repr: it returns an unambiguous, developer facing string, ideally one you could paste back to recreate the object.
Dunder str is the friendly version for end users, and if you skip it, str falls back to repr.
So implement repr first; it is the one that helps you in the debugger and the REPL.
Next, dunder eq gives you value equality, so two vectors with the same components compare equal.
If you define dunder eq and want the object to stay hashable for sets and dict keys, you must also define dunder hash.
Dunder len lets len of your object work, and dunder bool decides truthiness, falling back to len when absent.
Dunder iter makes the object iterable in a for loop, and dunder getitem makes it indexable and sliceable.
Dunder add overloads the plus operator, and dunder lt defines less than, which sorting uses.
You rarely write all six comparison methods by hand; functools dot total ordering fills in the rest from a couple you provide.
The philosophy is simple: builtins reach these methods through syntax, and your classes join in by implementing the same names.
Scroll down, take the quick checks, and replay this walkthrough whenever you like.
When something is unclear, ask me directly. I am your teacher for this course.

  <h1>The data model &amp;amp; dunder methods</h1>
  <p class=&quot;lede&quot;>Python has no <code>operator+</code> keyword and no interface to
  declare. You make your objects feel native by implementing the same named
  methods the language already calls on its builtins.</p>

  <p>You know how to define a class. The point of this lesson isn't <em>that</em>
  you can add behaviour — it's the realisation that <code>len(x)</code>,
  <code>a + b</code>, <code>for i in x</code>, and <code>x == y</code> are all just
  syntax that calls specially named methods. Implement those methods and your
  class plugs straight into the language.</p>

  <h2>The one idea: syntax calls dunder methods</h2>
  <div class=&quot;contrast&quot;>
    <div class=&quot;col other&quot;>
      <h4>Many languages</h4>
<pre><code><span class=&quot;c-com&quot;>// keywords / special interfaces</span>
operator + (a, b) { ... }
class V : IComparable { ... }</code></pre>
    </div>
    <div class=&quot;col py&quot;>
      <h4>Idiomatic Python</h4>
<pre><code><span class=&quot;c-com&quot;># the syntax calls a named method</span>
<span class=&quot;c-fn&quot;>len</span>(x)   <span class=&quot;c-com&quot;># → x.__len__()</span>
a + b    <span class=&quot;c-com&quot;># → a.__add__(b)</span></code></pre>
    </div>
  </div>

  <p>These double-underscore methods are called <strong>dunders</strong>. The
  builtins implement them — that's why a <code>list</code> already responds to
  <code>len()</code>, <code>+</code>, and <code>in</code>. Your class opts into the
  exact same protocol by defining the same names.</p>

  <h2>Our one class: a 2-D vector</h2>
<pre><code><span class=&quot;c-kw&quot;>class</span> <span class=&quot;c-fn&quot;>Vector</span>:
    <span class=&quot;c-kw&quot;>def</span> <span class=&quot;c-fn&quot;>__init__</span>(self, x, y):
        self.x, self.y = x, y</code></pre>
  <p>Right now <code>print(Vector(1, 2))</code> shows something like
  <code>&amp;lt;Vector object at 0x10f...&amp;gt;</code> — useless. Let's fix that first.</p>

  <h2><code>__repr__</code> vs <code>__str__</code></h2>
  <p><code>repr()</code> is for <em>developers</em>: it should be
  <strong>unambiguous</strong>, and ideally a string you could paste back to
  recreate the object. <code>str()</code> is the <em>friendly</em> form for end
  users. If you only write one, write <code>__repr__</code> — <code>str()</code>
  falls back to it.</p>
<pre><code>    <span class=&quot;c-kw&quot;>def</span> <span class=&quot;c-fn&quot;>__repr__</span>(self):
        <span class=&quot;c-kw&quot;>return</span> f<span class=&quot;c-str&quot;>&quot;Vector({self.x!r}, {self.y!r})&quot;</span></code></pre>
  <div class=&quot;note&quot;><strong>Why <code>!r</code>:</strong> the <code>!r</code>
  conversion calls <code>repr()</code> on each field, so strings keep their quotes
  and the result round-trips. This is the one dunder to implement on every class.</div>

  <h2><code>__eq__</code> — and pairing it with <code>__hash__</code></h2>
  <p>By default two distinct objects are never equal. Define <code>__eq__</code> to
  get <strong>value equality</strong>:</p>
<pre><code>    <span class=&quot;c-kw&quot;>def</span> <span class=&quot;c-fn&quot;>__eq__</span>(self, other):
        <span class=&quot;c-kw&quot;>if</span> <span class=&quot;c-kw&quot;>not</span> <span class=&quot;c-fn&quot;>isinstance</span>(other, Vector):
            <span class=&quot;c-kw&quot;>return</span> NotImplemented
        <span class=&quot;c-kw&quot;>return</span> (self.x, self.y) == (other.x, other.y)

    <span class=&quot;c-kw&quot;>def</span> <span class=&quot;c-fn&quot;>__hash__</span>(self):
        <span class=&quot;c-kw&quot;>return</span> <span class=&quot;c-fn&quot;>hash</span>((self.x, self.y))</code></pre>
  <div class=&quot;note&quot;><strong>The trap:</strong> defining <code>__eq__</code> sets
  <code>__hash__</code> to <code>None</code>, making instances <em>unhashable</em> —
  they can't go in a <code>set</code> or be <code>dict</code> keys. If your value is
  immutable, define <code>__hash__</code> too, and keep the rule: equal objects
  must hash equal. Returning <code>NotImplemented</code> (not raising) lets Python
  try the other operand's <code>__eq__</code>.</div>

  <h2><code>__len__</code> and <code>__bool__</code></h2>
  <p>For a 2-D vector, &quot;length&quot; naturally means its dimension count, and
  &quot;truthiness&quot; means non-zero. <code>len(obj)</code> calls <code>__len__</code>;
  truthiness checks call <code>__bool__</code>, which <em>falls back to</em>
  <code>__len__</code> when absent:</p>
<pre><code>    <span class=&quot;c-kw&quot;>def</span> <span class=&quot;c-fn&quot;>__len__</span>(self):
        <span class=&quot;c-kw&quot;>return</span> <span class=&quot;c-num&quot;>2</span>

    <span class=&quot;c-kw&quot;>def</span> <span class=&quot;c-fn&quot;>__bool__</span>(self):
        <span class=&quot;c-kw&quot;>return</span> <span class=&quot;c-fn&quot;>bool</span>(self.x <span class=&quot;c-kw&quot;>or</span> self.y)</code></pre>
  <p>So <code>bool(Vector(0, 0))</code> is <code>False</code>, and an
  <code>if vector:</code> test reads naturally — no <code>len(...) != 0</code> in
  sight.</p>

  <h2><code>__iter__</code> / <code>__getitem__</code> — iterable &amp;amp; indexable</h2>
  <p>Define <code>__iter__</code> and the object works in a <code>for</code> loop,
  in unpacking, and anywhere an iterable is accepted. Define
  <code>__getitem__</code> and it supports indexing — and slicing — too:</p>
<pre><code>    <span class=&quot;c-kw&quot;>def</span> <span class=&quot;c-fn&quot;>__iter__</span>(self):
        <span class=&quot;c-kw&quot;>yield</span> self.x
        <span class=&quot;c-kw&quot;>yield</span> self.y

    <span class=&quot;c-kw&quot;>def</span> <span class=&quot;c-fn&quot;>__getitem__</span>(self, i):
        <span class=&quot;c-kw&quot;>return</span> (self.x, self.y)[i]</code></pre>
  <p>Now <code>x, y = vector</code> unpacks, <code>vector[0]</code> indexes, and
  <code>vector[:1]</code> slices — because indexing into a tuple already supports
  slices. This ties straight back to the iteration and slicing lessons.</p>

  <h2>Operator overloading: <code>__add__</code> and <code>__lt__</code></h2>
<pre><code>    <span class=&quot;c-kw&quot;>def</span> <span class=&quot;c-fn&quot;>__add__</span>(self, other):
        <span class=&quot;c-kw&quot;>return</span> Vector(self.x + other.x, self.y + other.y)

    <span class=&quot;c-kw&quot;>def</span> <span class=&quot;c-fn&quot;>__lt__</span>(self, other):
        <span class=&quot;c-kw&quot;>return</span> (self.x, self.y) &amp;lt; (other.x, other.y)</code></pre>
  <p>Now <code>Vector(1, 2) + Vector(3, 4)</code> gives <code>Vector(4, 6)</code>,
  and a list of vectors will <code>sort()</code> — because sorting only needs
  <code>&amp;lt;</code>, i.e. <code>__lt__</code>.</p>
  <div class=&quot;note&quot;><strong>Don't hand-write all six:</strong> the comparison
  operators (<code>&amp;lt;</code>, <code>&amp;lt;=</code>, <code>&amp;gt;</code>,
  <code>&amp;gt;=</code>, <code>==</code>, <code>!=</code>) are tedious to define one by
  one. Decorate the class with <code>@functools.total_ordering</code> and supply
  just <code>__eq__</code> plus one ordering method (e.g. <code>__lt__</code>); it
  fills in the rest.</div>

  <p class=&quot;muted&quot;>The philosophy in one line: we call these methods on builtins
  <em>via syntax</em>; your classes opt in by implementing the same protocol.</p>

  <!-- ---------------- Quiz ---------------- -->
  <h2>Three quick checks</h2>
  <p class=&quot;muted&quot;>Recall beats recognition — answer before you scroll. Immediate
  feedback below each.</p>

  <div class=&quot;quiz&quot; id=&quot;q1&quot;>
    <div class=&quot;q&quot;>1. When you write <code>len(v)</code>, what does Python actually call?</div>
    <button class=&quot;opt&quot; data-correct=&quot;1&quot;>v.__len__() — len() delegates to the dunder method</button>
    <button class=&quot;opt&quot;>len.__call__(v) — len reads the object's size field</button>
    <button class=&quot;opt&quot;>v.__size__() — the size protocol returns the count</button>
    <div class=&quot;fb&quot;></div>
  </div>

  <div class=&quot;quiz&quot; id=&quot;q2&quot;>
    <div class=&quot;q&quot;>2. You add <code>__eq__</code> to a class. What breaks, and how do you fix it?</div>
    <button class=&quot;opt&quot;>Nothing breaks; instances stay hashable and printable as before</button>
    <button class=&quot;opt&quot; data-correct=&quot;1&quot;>Instances become unhashable; restore it by defining __hash__</button>
    <button class=&quot;opt&quot;>Printing breaks; restore the output by defining __repr__</button>
    <div class=&quot;fb&quot;></div>
  </div>

  <div class=&quot;quiz&quot; id=&quot;q3&quot;>
    <div class=&quot;q&quot;>3. Which single dunder is enough to make <code>sorted(vectors)</code> work?</div>
    <button class=&quot;opt&quot; data-correct=&quot;1&quot;>__lt__ — sorting compares pairs using the less-than method</button>
    <button class=&quot;opt&quot;>__cmp__ — the three-way compare hook drives all sorting</button>
    <button class=&quot;opt&quot;>__sort__ — the sort protocol orders the whole sequence</button>
    <div class=&quot;fb&quot;></div>
  </div>

  <hr>

  <p><strong>Primary source to go deeper:</strong> Luciano Ramalho,
  <em>Fluent Python</em> — the data-model chapter (“A Pythonic Object” /
  “Object References, Mutability, and Recycling”) builds essentially this
  <code>Vector</code> class dunder by dunder. Reference:
  <a href=&quot;https://docs.python.org/3/reference/datamodel.html&quot;>the official Data
  Model reference</a>, the canonical list of every special method.</p>

  <div class=&quot;ask-teacher&quot;>💬 <strong>Stuck or curious?</strong> Ask me directly —
  “when do I need <code>__hash__</code>?”, “what's the difference between
  <code>__repr__</code> and <code>__str__</code>?”, “how does
  <code>@total_ordering</code> know which methods to add?”. I'm your teacher for
  this course, and the next lesson adapts to what you ask.</div>

      bar.className = &quot;narrator-bar&quot;;
      bar.style.cssText = barCss() + &quot;;color:#b23b3b&quot;;
      bar.textContent = &quot;Voice-over unavailable: this browser has no speech synthesis.&quot;;
      document.body.appendChild(bar);
    });
    return;
  }

  var synth = window.speechSynthesis;
  var chunks = [];      // sentences to speak
  var idx = 0;          // current sentence index
  var playing = false;
  var paused = false;
  var voices = [];
  var chosenVoice = null;
  var rate = 1.0;
  var els = {};
  var watchdog = null;   // fallback timer for voices that never fire `onend`
  var heartbeat = null;  // periodic resume() to defeat Chrome's ~15s stall

  function clearTimers() {
    if (watchdog) { clearTimeout(watchdog); watchdog = null; }
    if (heartbeat) { clearInterval(heartbeat); heartbeat = null; }
  }

  function barCss() {
    return [
      &quot;position:fixed&quot;, &quot;top:0&quot;, &quot;left:0&quot;, &quot;right:0&quot;, &quot;z-index:1000&quot;,
      &quot;display:flex&quot;, &quot;gap:.5rem&quot;, &quot;align-items:center&quot;,
      &quot;padding:.5rem .9rem&quot;,
      &quot;background:rgba(253,252,249,.92)&quot;, &quot;backdrop-filter:blur(6px)&quot;,
      &quot;border-bottom:1px solid #e3e0d8&quot;,
      &quot;font-family:ui-sans-serif,system-ui,sans-serif&quot;, &quot;font-size:.85rem&quot;
    ].join(&quot;;&quot;);
  }

  function btn(label, title) {
    var b = document.createElement(&quot;button&quot;);
    b.textContent = label;
    b.title = title || label;
    b.style.cssText =
      &quot;font:inherit;cursor:pointer;border:1px solid #cfcabb;background:#fff;&quot; +
      &quot;border-radius:6px;padding:.25rem .6rem;color:#1a1a1a&quot;;
    return b;
  }

  function loadNarration() {
    var src = document.getElementById(&quot;narration&quot;);
    if (!src) return [];
    var text = src.textContent.replace(/\s+/g, &quot; &quot;).trim();
    if (!text) return [];
    // Split into sentences, keeping the terminal punctuation.
    var parts = text.match(/[^.!?]+[.!?]+(\s|$)|[^.!?]+$/g) || [text];
    return parts.map(function (s) { return s.trim(); }).filter(Boolean);
  }

  function pickDefaultVoice() {
    if (!voices.length) return null;
    // Prefer an English voice; fall back to the first available.
    var en = voices.filter(function (v) { return /^en(-|_|$)/i.test(v.lang); });
    var pool = en.length ? en : voices;
    // Prefer a LOCAL (on-device) voice. Chrome's remote Google voices fire
    // `onend` unreliably — usually not at all between back-to-back utterances —
    // which stalls the sentence-by-sentence chain after the first line. Local
    // voices fire it dependably, so use them first.
    var local = pool.filter(function (v) { return v.localService; });
    return local[0] || pool[0];
  }

  function startHeartbeat() {
    if (heartbeat) clearInterval(heartbeat);
    // Chrome silently pauses synthesis after ~15s; a periodic resume() keeps
    // long sentences (and the queue) alive.
    heartbeat = setInterval(function () {
      if (playing &amp;&amp; !paused &amp;&amp; synth.speaking) synth.resume();
    }, 10000);
  }

  function speakFrom(i) {
    if (i >= chunks.length) { stop(); return; }
    idx = i;
    var advanced = false;            // guard: advance to the next chunk once
    function next() {
      if (advanced) return;
      advanced = true;
      if (watchdog) { clearTimeout(watchdog); watchdog = null; }
      if (playing &amp;&amp; !paused) speakFrom(idx + 1);
    }

    var u = new SpeechSynthesisUtterance(chunks[i]);
    if (chosenVoice) u.voice = chosenVoice;
    u.rate = rate;
    u.onend = next;                  // fast path: advance the moment it ends
    u.onerror = next;                // a failed/cancelled chunk: skip ahead
    var started = false;
    u.onstart = function () { started = true; };
    synth.speak(u);

    // Fallback for voices that never fire `onend` (notably Chrome's remote
    // Google voices): poll `speaking` every 250ms and advance as soon as the
    // engine has spoken and gone quiet, so the gap between lines stays short
    // instead of stalling. A per-line hard cap covers an engine that never
    // starts at all.
    var words = chunks[i].split(/\s+/).length;
    var hardCapMs = (words / 2.0) * 1000 + 8000;
    var elapsed = 0, step = 250;
    function poll() {
      if (advanced) return;
      if (paused) { watchdog = setTimeout(poll, step); return; }
      if (synth.speaking) started = true;
      elapsed += step;
      if (!playing || (started &amp;&amp; !synth.speaking) || elapsed >= hardCapMs) { next(); return; }
      watchdog = setTimeout(poll, step);
    }
    watchdog = setTimeout(poll, step);
  }

  function play() {
    if (!chunks.length) return;
    if (paused) { synth.resume(); paused = false; setState(); return; }
    if (playing) return;
    synth.cancel();
    playing = true; paused = false;
    startHeartbeat();
    speakFrom(idx >= chunks.length ? 0 : idx);
    setState();
  }
  function pause() {
    if (!playing || paused) return;
    synth.pause(); paused = true; setState();
  }
  function stop() {
    // Set state BEFORE cancel(): cancelling can synchronously fire the current
    // utterance onend/onerror, and if playing were still true that handler
    // would speak the next sentence — the press-Stop-hear-the-next-line bug.
    playing = false; paused = false; idx = 0;
    clearTimers();
    synth.cancel();
    setState();
  }

  function setState() {
    els.play.textContent = paused ? &quot;▶ Resume&quot; : (playing ? &quot;❚❚ Pause&quot; : &quot;▶ Play narration&quot;);
    els.play.onclick = (playing &amp;&amp; !paused) ? pause : play;
    els.stop.disabled = !playing;
    els.stop.style.opacity = playing ? &quot;1&quot; : &quot;.5&quot;;
  }

  function buildBar() {
    chunks = loadNarration();

    var bar = document.createElement(&quot;div&quot;);
    bar.className = &quot;narrator-bar&quot;;
    bar.style.cssText = barCss();

    var label = document.createElement(&quot;strong&quot;);
    label.textContent = &quot;🔊 Voice-over&quot;;
    label.style.cssText = &quot;color:#3a5a78;margin-right:.3rem&quot;;

    els.play = btn(&quot;▶ Play narration&quot;);
    els.stop = btn(&quot;■ Stop&quot;);
    els.stop.onclick = stop;

    // Speed control
    var speedWrap = document.createElement(&quot;label&quot;);
    speedWrap.style.cssText = &quot;display:flex;align-items:center;gap:.3rem;color:#6b6b6b&quot;;
    speedWrap.append(&quot;speed&quot;);
    var speed = document.createElement(&quot;input&quot;);
    speed.type = &quot;range&quot;; speed.min = &quot;0.7&quot;; speed.max = &quot;1.4&quot;; speed.step = &quot;0.1&quot;; speed.value = &quot;1&quot;;
    speed.style.width = &quot;70px&quot;;
    var speedVal = document.createElement(&quot;span&quot;);
    speedVal.textContent = &quot;1.0×&quot;; speedVal.style.minWidth = &quot;2.4em&quot;;
    speed.oninput = function () {
      rate = parseFloat(speed.value); speedVal.textContent = rate.toFixed(1) + &quot;×&quot;;
      if (playing &amp;&amp; !paused) { var resumeAt = idx; stop(); idx = resumeAt; play(); }
    };
    speedWrap.append(speed, speedVal);

    // Voice selector
    var voiceSel = document.createElement(&quot;select&quot;);
    voiceSel.style.cssText = &quot;font:inherit;max-width:11rem;border:1px solid #cfcabb;border-radius:6px;padding:.2rem&quot;;
    voiceSel.title = &quot;Narration voice&quot;;
    voiceSel.onchange = function () {
      chosenVoice = voices[parseInt(voiceSel.value, 10)] || null;
      if (playing) { var at = idx; stop(); idx = at; play(); }
    };
    els.voiceSel = voiceSel;

    var spacer = document.createElement(&quot;span&quot;);
    spacer.style.flex = &quot;1&quot;;

    bar.append(label, els.play, els.stop, speedWrap, spacer, voiceSel);
    document.body.appendChild(bar);

    // Push page content down so the fixed bar doesn't cover the title.
    document.body.style.paddingTop = &quot;2.6rem&quot;;

    setState();
    refreshVoices();
  }

  function refreshVoices() {
    voices = synth.getVoices();
    if (!els.voiceSel) return;
    els.voiceSel.innerHTML = &quot;&quot;;
    voices.forEach(function (v, i) {
      var o = document.createElement(&quot;option&quot;);
      o.value = i; o.textContent = v.name + &quot; (&quot; + v.lang + &quot;)&quot;;
      els.voiceSel.appendChild(o);
    });
    if (!chosenVoice) chosenVoice = pickDefaultVoice();
    if (chosenVoice) els.voiceSel.value = String(voices.indexOf(chosenVoice));
  }

  // Voices load asynchronously in most browsers.
  if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = refreshVoices;

  // Stop narration when leaving the page (otherwise it keeps talking).
  window.addEventListener(&quot;beforeunload&quot;, function () { synth.cancel(); });

  document.addEventListener(&quot;DOMContentLoaded&quot;, buildBar);
})();

</script>
</body>

<div id=&quot;narration&quot; hidden>
Welcome to lesson eleven: decorators.
The single win here is reading and writing the at-sign decorator syntax without it feeling like magic.
The whole idea rests on one fact: in Python, functions are first-class objects.
You can assign a function to a variable, pass it into another function, store it in a list, and return it from a function, just like any other value.
Once you accept that, a decorator is almost boring: it is just a function that takes a function and returns another function.
The at-sign line is pure sugar.
Writing at-timer above a function definition is exactly the same as writing func equals timer of func right after it.
Nothing more is happening; the name is rebound to whatever the decorator returns.
Let us build one from scratch so it stops being mysterious.
Inside the decorator we define a small wrapper function that accepts star-args and star-star-kwargs, calls the original, and adds behaviour around it.
We use star-args and star-star-kwargs so the wrapper works for any function signature, no matter how many arguments it takes.
There is one tax to pay: the wrapper replaces the original, so the wrapped function reports the wrapper's name and docstring instead of its own.
The fix is to decorate your wrapper with functools dot wraps, passing the original function, which copies the name, docstring, and other metadata across.
Always reach for functools dot wraps; without it, debuggers, help, and documentation tools see the wrong thing.
You will rarely write decorators day to day, but you will read them constantly.
The standard library ships the ones you will meet most: functools dot cache and lru-cache to memoise expensive calls.
Property to expose a method as an attribute, and staticmethod and classmethod to control how a method receives its first argument.
And dataclass, which we will meet properly in a later lesson, generates init and repr for you.
One last layer: a decorator that takes arguments is really a decorator factory, an outer function that returns the actual decorator.
That is just one more nesting level, so do not panic when you see at-something with parentheses and arguments.
Scroll down, take the quick checks, and replay the narration whenever you like.
When something is unclear, ask me directly. I am your teacher for this course.

<main>
  <div class=&quot;kicker&quot;>Lesson 11 · Idiomatic Python</div>
  <h1>Decorators</h1>
  <p class=&quot;lede&quot;>The <code>@</code> line that sits above so many Python functions
  isn't magic — it's one tiny rule applied consistently. Learn the rule and you
  read and write decorators with confidence.</p>

  <p>You'll write your own decorators only occasionally, but you'll <em>read</em>
  them constantly — in web frameworks, in test suites, in the standard library.
  The win for this lesson is decoding any <code>@something</code> on sight.</p>

  <h2>The foundation: functions are first-class</h2>
  <p>Before decorators make sense, one fact has to be automatic: a function in
  Python is just an object. You can assign it, pass it, return it, and store it —
  no calling parentheses required.</p>
<pre><code><span class=&quot;c-kw&quot;>def</span> <span class=&quot;c-fn&quot;>shout</span>(text):
    <span class=&quot;c-kw&quot;>return</span> text.upper()

greet = shout              <span class=&quot;c-com&quot;># assign the function itself (no parens)</span>
greet(<span class=&quot;c-str&quot;>&quot;hi&quot;</span>)               <span class=&quot;c-com&quot;># -&amp;gt; &quot;HI&quot;</span>

funcs = [shout, <span class=&quot;c-fn&quot;>str</span>.strip]  <span class=&quot;c-com&quot;># store functions in a list</span>
<span class=&quot;c-kw&quot;>for</span> f <span class=&quot;c-kw&quot;>in</span> funcs:
    f(<span class=&quot;c-str&quot;>&quot;  hi  &quot;</span>)            <span class=&quot;c-com&quot;># call each one</span></code></pre>
  <div class=&quot;note&quot;><strong>The mental shift:</strong> <code>shout</code> is a
  value; <code>shout()</code> is the act of <em>calling</em> it. A decorator is
  built entirely on passing the value around <em>before</em> anyone calls it.</div>

  <h2>What a decorator actually is</h2>
  <p>A decorator is a function that <strong>takes a function and returns a
  function</strong> — usually a new one that wraps the original with extra
  behaviour. The <code>@</code> syntax is pure sugar for a reassignment:</p>
  <div class=&quot;contrast&quot;>
    <div class=&quot;col other&quot;>
      <h4>The desugared form</h4>
<pre><code><span class=&quot;c-kw&quot;>def</span> <span class=&quot;c-fn&quot;>greet</span>():
    <span class=&quot;c-kw&quot;>return</span> <span class=&quot;c-str&quot;>&quot;hi&quot;</span>

greet = timer(greet)</code></pre>
    </div>
    <div class=&quot;col py&quot;>
      <h4>Idiomatic Python</h4>
<pre><code>@<span class=&quot;c-fn&quot;>timer</span>
<span class=&quot;c-kw&quot;>def</span> <span class=&quot;c-fn&quot;>greet</span>():
    <span class=&quot;c-kw&quot;>return</span> <span class=&quot;c-str&quot;>&quot;hi&quot;</span></code></pre>
    </div>
  </div>
  <p>Both lines mean the identical thing: <em>“call <code>timer</code> with
  <code>greet</code>, and rebind the name <code>greet</code> to whatever comes
  back.”</em> Read every <code>@decorator</code> as <code>name = decorator(name)</code>
  and the mystery is gone.</p>

  <h2>Build one from scratch</h2>
  <p>Here is a complete, idiomatic timer. The pattern is always the same: define a
  <code>wrapper</code> inside, do something before and after, and return the
  wrapper.</p>
<pre><code><span class=&quot;c-kw&quot;>import</span> functools, time

<span class=&quot;c-kw&quot;>def</span> <span class=&quot;c-fn&quot;>timer</span>(func):
    @<span class=&quot;c-fn&quot;>functools.wraps</span>(func)
    <span class=&quot;c-kw&quot;>def</span> <span class=&quot;c-fn&quot;>wrapper</span>(*args, **kwargs):
        start = time.perf_counter()
        result = func(*args, **kwargs)     <span class=&quot;c-com&quot;># call the real function</span>
        elapsed = time.perf_counter() - start
        <span class=&quot;c-fn&quot;>print</span>(f<span class=&quot;c-str&quot;>&quot;{func.__name__} took {elapsed:.4f}s&quot;</span>)
        <span class=&quot;c-kw&quot;>return</span> result                      <span class=&quot;c-com&quot;># pass its result back through</span>
    <span class=&quot;c-kw&quot;>return</span> wrapper                         <span class=&quot;c-com&quot;># return the replacement</span>

@<span class=&quot;c-fn&quot;>timer</span>
<span class=&quot;c-kw&quot;>def</span> <span class=&quot;c-fn&quot;>slow_add</span>(a, b):
    time.sleep(<span class=&quot;c-num&quot;>0.1</span>)
    <span class=&quot;c-kw&quot;>return</span> a + b</code></pre>
  <div class=&quot;note&quot;><strong>Why <code>*args, **kwargs</code>?</strong> The wrapper
  stands in for <em>any</em> function, so it must accept any arguments and forward
  them unchanged. Capturing with <code>*args, **kwargs</code> and re-passing them
  to <code>func</code> makes one decorator work on every signature.</div>

  <h2>The tax: <code>functools.wraps</code></h2>
  <p>Because the wrapper <em>replaces</em> the original, the decorated function
  starts reporting the wrapper's identity — its <code>__name__</code> becomes
  <code>&quot;wrapper&quot;</code> and its <code>__doc__</code> is lost. That breaks
  <code>help()</code>, debuggers, and doc tools.</p>
  <div class=&quot;contrast&quot;>
    <div class=&quot;col other&quot;>
      <h4>Without <code>@functools.wraps</code></h4>
<pre><code>slow_add.__name__
<span class=&quot;c-com&quot;># -&amp;gt; 'wrapper'  (wrong!)</span></code></pre>
    </div>
    <div class=&quot;col py&quot;>
      <h4>With <code>@functools.wraps(func)</code></h4>
<pre><code>slow_add.__name__
<span class=&quot;c-com&quot;># -&amp;gt; 'slow_add'  (preserved)</span></code></pre>
    </div>
  </div>
  <p><code>functools.wraps(func)</code> copies <code>__name__</code>,
  <code>__doc__</code>, and friends from the original onto your wrapper. It costs
  one line — <strong>always include it</strong>.</p>

  <h2>The ones you'll meet in the wild</h2>
  <p>You rarely hand-write decorators, but the standard library hands you several
  you'll use constantly:</p>
<pre><code>@<span class=&quot;c-fn&quot;>functools.cache</span>             <span class=&quot;c-com&quot;># memoise: cache results by arguments (3.9+)</span>
<span class=&quot;c-kw&quot;>def</span> <span class=&quot;c-fn&quot;>fib</span>(n):
    <span class=&quot;c-kw&quot;>return</span> n <span class=&quot;c-kw&quot;>if</span> n &amp;lt; <span class=&quot;c-num&quot;>2</span> <span class=&quot;c-kw&quot;>else</span> fib(n - <span class=&quot;c-num&quot;>1</span>) + fib(n - <span class=&quot;c-num&quot;>2</span>)

<span class=&quot;c-kw&quot;>class</span> <span class=&quot;c-fn&quot;>Circle</span>:
    <span class=&quot;c-kw&quot;>def</span> <span class=&quot;c-fn&quot;>__init__</span>(self, r):
        self.r = r

    @<span class=&quot;c-fn&quot;>property</span>                  <span class=&quot;c-com&quot;># call-free attribute access: c.area</span>
    <span class=&quot;c-kw&quot;>def</span> <span class=&quot;c-fn&quot;>area</span>(self):
        <span class=&quot;c-kw&quot;>return</span> <span class=&quot;c-num&quot;>3.14159</span> * self.r ** <span class=&quot;c-num&quot;>2</span>

    @<span class=&quot;c-fn&quot;>staticmethod</span>              <span class=&quot;c-com&quot;># no self / no cls</span>
    <span class=&quot;c-kw&quot;>def</span> <span class=&quot;c-fn&quot;>describe</span>():
        <span class=&quot;c-kw&quot;>return</span> <span class=&quot;c-str&quot;>&quot;a round shape&quot;</span>

    @<span class=&quot;c-fn&quot;>classmethod</span>               <span class=&quot;c-com&quot;># receives the class as cls</span>
    <span class=&quot;c-kw&quot;>def</span> <span class=&quot;c-fn&quot;>unit</span>(cls):
        <span class=&quot;c-kw&quot;>return</span> cls(<span class=&quot;c-num&quot;>1</span>)</code></pre>
  <p>You'll also meet <code>@functools.lru_cache(maxsize=...)</code> (the
  bounded-size sibling of <code>@cache</code>) and <code>@dataclass</code>, which
  generates <code>__init__</code> and <code>__repr__</code> for a class — we give
  it its own lesson later.</p>

  <h2>Decorators that take arguments</h2>
  <p>When you see <code>@retry(times=3)</code>, that <code>()</code> means an extra
  layer. A parameterised decorator is a <strong>decorator factory</strong>: an
  outer function that takes the arguments and <em>returns</em> the real decorator.</p>
<pre><code><span class=&quot;c-kw&quot;>def</span> <span class=&quot;c-fn&quot;>repeat</span>(times):              <span class=&quot;c-com&quot;># factory: takes the config...</span>
    <span class=&quot;c-kw&quot;>def</span> <span class=&quot;c-fn&quot;>decorator</span>(func):         <span class=&quot;c-com&quot;># ...returns a real decorator...</span>
        @<span class=&quot;c-fn&quot;>functools.wraps</span>(func)
        <span class=&quot;c-kw&quot;>def</span> <span class=&quot;c-fn&quot;>wrapper</span>(*args, **kwargs):
            <span class=&quot;c-kw&quot;>for</span> _ <span class=&quot;c-kw&quot;>in</span> <span class=&quot;c-fn&quot;>range</span>(times):
                result = func(*args, **kwargs)
            <span class=&quot;c-kw&quot;>return</span> result
        <span class=&quot;c-kw&quot;>return</span> wrapper
    <span class=&quot;c-kw&quot;>return</span> decorator

@<span class=&quot;c-fn&quot;>repeat</span>(times=<span class=&quot;c-num&quot;>3</span>)               <span class=&quot;c-com&quot;># repeat(3) returns the decorator</span>
<span class=&quot;c-kw&quot;>def</span> <span class=&quot;c-fn&quot;>ping</span>():
    <span class=&quot;c-fn&quot;>print</span>(<span class=&quot;c-str&quot;>&quot;ping&quot;</span>)</code></pre>
  <p><code>@repeat(times=3)</code> first <em>calls</em> <code>repeat(times=3)</code>,
  which returns <code>decorator</code>; that decorator is then applied to
  <code>ping</code>. Three nestings instead of two — same rule each time. Keep this
  in your back pocket; don't reach for it unless you genuinely need the argument.</p>

  <!-- ---------------- Quiz ---------------- -->
  <h2>Three quick checks</h2>
  <p class=&quot;muted&quot;>Recall beats recognition — answer before you scroll. Immediate
  feedback below each.</p>

  <div class=&quot;quiz&quot; id=&quot;q1&quot;>
    <div class=&quot;q&quot;>1. The line <code>@timer</code> above <code>def greet(): ...</code> is exactly equivalent to which statement?</div>
    <button class=&quot;opt&quot; data-correct=&quot;1&quot;>greet = timer(greet)</button>
    <button class=&quot;opt&quot;>timer = greet(timer)</button>
    <button class=&quot;opt&quot;>greet = timer.greet()</button>
    <div class=&quot;fb&quot;></div>
  </div>

  <div class=&quot;quiz&quot; id=&quot;q2&quot;>
    <div class=&quot;q&quot;>2. Why does the inner <code>wrapper</code> use <code>*args, **kwargs</code>?</div>
    <button class=&quot;opt&quot; data-correct=&quot;1&quot;>to accept and forward any arguments for any function signature</button>
    <button class=&quot;opt&quot;>to make the wrapped function run faster than the original call</button>
    <button class=&quot;opt&quot;>to force the decorated function to take only keyword arguments</button>
    <div class=&quot;fb&quot;></div>
  </div>

  <div class=&quot;quiz&quot; id=&quot;q3&quot;>
    <div class=&quot;q&quot;>3. What does <code>functools.wraps(func)</code> on the wrapper fix?</div>
    <button class=&quot;opt&quot; data-correct=&quot;1&quot;>it copies the original's __name__ and __doc__ onto the wrapper</button>
    <button class=&quot;opt&quot;>it caches the original's return values keyed by the arguments</button>
    <button class=&quot;opt&quot;>it lets the decorator accept configuration arguments cleanly</button>
    <div class=&quot;fb&quot;></div>
  </div>

  <hr>

  <p><strong>Primary source to go deeper:</strong> the official Python glossary
  entry for <a href=&quot;https://docs.python.org/3/glossary.html#term-decorator&quot;>“decorator”</a>

document.querySelectorAll(&quot;.quiz&quot;).forEach(function (quiz) {
  var fb = quiz.querySelector(&quot;.fb&quot;);
  var msgs = {
    q1: { ok: &quot;Correct — `@timer` simply rebinds the name to `timer(greet)`. That's the whole rule.&quot;,
          no: &quot;Read it as `name = decorator(name)`: `@timer` over `greet` means `greet = timer(greet)`.&quot; },
    q2: { ok: &quot;Correct — `*args, **kwargs` captures any arguments and forwards them, so one wrapper fits every signature.&quot;,
          no: &quot;It's about generality, not speed or keyword-only calls: it forwards any arguments to the real function.&quot; },
    q3: { ok: &quot;Correct — `wraps` copies `__name__`, `__doc__` and other metadata so the wrapper reports the original's identity.&quot;,
          no: &quot;Caching is `@cache`; arguments are a factory. `wraps` restores the original's `__name__` and `__doc__`.&quot; }
  }[quiz.id];
  quiz.querySelectorAll(&quot;.opt&quot;).forEach(function (opt) {
    opt.addEventListener(&quot;click&quot;, function () {
      var right = opt.dataset.correct === &quot;1&quot;;
      quiz.querySelectorAll(&quot;.opt&quot;).forEach(function (o) {
        o.disabled = true;
        if (o.dataset.correct === &quot;1&quot;) o.classList.add(&quot;correct&quot;);
      });
      if (!right) opt.classList.add(&quot;wrong&quot;);
      fb.textContent = right ? msgs.ok : msgs.no;
