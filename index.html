  <h1>Type hints</h1>
  <p class=&quot;lede&quot;>Annotations that document your intent and power your editor and
  type checker — without changing how a single line runs.</p>

  <p>You already know static types from other languages. The delta here is small
  but surprising: Python's hints look like static types, yet they're advisory.
  The win is learning to read and write modern annotations so tooling can catch
  your mistakes before you run the code.</p>

  <h2>The surprise: hints are not enforced</h2>
  <div class=&quot;note&quot;><strong>The mental shift:</strong> annotations are <em>not</em>
  checked at runtime. The interpreter parses them and stores them, then ignores
  them when the function runs. They're for <strong>tooling</strong> (mypy,
  pyright), your editor, and human readers — not for the runtime.</div>

<pre><code><span class=&quot;c-kw&quot;>def</span> <span class=&quot;c-fn&quot;>greet</span>(name: str) -&amp;gt; str:
    <span class=&quot;c-kw&quot;>return</span> <span class=&quot;c-str&quot;>&quot;hi &quot;</span> + name

<span class=&quot;c-fn&quot;>greet</span>(<span class=&quot;c-num&quot;>42</span>)  <span class=&quot;c-com&quot;># runs! TypeError only from the + , not from the hint</span></code></pre>
  <p>A type checker reads <code>name: str</code> and flags the call as wrong
  <em>before</em> you run it. Python itself does no such check — that's the part
  that trips up newcomers from static languages.</p>

  <h2>Annotating functions and variables</h2>
  <p>A colon and a type after a parameter; an arrow and a type for the return. The
  same colon form annotates a variable.</p>
<pre><code><span class=&quot;c-kw&quot;>def</span> <span class=&quot;c-fn&quot;>scale</span>(values: list[int], factor: int) -&amp;gt; list[int]:
    <span class=&quot;c-kw&quot;>return</span> [v * factor <span class=&quot;c-kw&quot;>for</span> v <span class=&quot;c-kw&quot;>in</span> values]

count: int = <span class=&quot;c-num&quot;>0</span>
name: str = <span class=&quot;c-str&quot;>&quot;ada&quot;</span></code></pre>

  <h2>Built-in generics (3.9+)</h2>
  <p>Write container types with the lowercase builtins directly — no import needed.</p>
<pre><code>nums:    list[int]
lookup:  dict[str, int]
pair:    tuple[int, str]       <span class=&quot;c-com&quot;># exactly two items</span>
row:     tuple[int, ...]       <span class=&quot;c-com&quot;># any number of ints</span></code></pre>
  <div class=&quot;contrast&quot;>
    <div class=&quot;col other&quot;>
      <h4>Legacy (deprecated)</h4>
<pre><code><span class=&quot;c-kw&quot;>from</span> typing <span class=&quot;c-kw&quot;>import</span> List, Dict

xs: List[int]
m:  Dict[str, int]</code></pre>
    </div>
    <div class=&quot;col py&quot;>
      <h4>Modern (3.9+)</h4>
<pre><code><span class=&quot;c-com&quot;># no import at all</span>

xs: list[int]
m:  dict[str, int]</code></pre>
    </div>
  </div>

  <h2>Optional and unions with <code>|</code></h2>
  <p>Since 3.10, write <code>X | None</code> for a value that might be missing —
  this is the modern <code>Optional[X]</code>. The same pipe builds any union.</p>
<pre><code><span class=&quot;c-kw&quot;>def</span> <span class=&quot;c-fn&quot;>find</span>(key: str) -&amp;gt; str | None:        <span class=&quot;c-com&quot;># may return a str or None</span>
    <span class=&quot;c-kw&quot;>return</span> _cache.get(key)

<span class=&quot;c-kw&quot;>def</span> <span class=&quot;c-fn&quot;>parse</span>(raw: str) -&amp;gt; int | float:        <span class=&quot;c-com&quot;># either numeric type</span>
    ...</code></pre>
  <p>The older spelling <code>Optional[str]</code> (from <code>typing</code>) is
  identical to <code>str | None</code>; prefer the pipe in new code on 3.10+.</p>

  <h2>What still comes from <code>typing</code></h2>
  <p>Builtins cover containers, but some helpers have no lowercase form. Import
  those from <code>typing</code>:</p>
<pre><code><span class=&quot;c-kw&quot;>from</span> typing <span class=&quot;c-kw&quot;>import</span> Any, Callable, Iterable, Optional

handler: Callable[[int, str], bool]   <span class=&quot;c-com&quot;># takes (int, str), returns bool</span>
items:   Iterable[str]                <span class=&quot;c-com&quot;># anything you can iterate</span>
data:    Any                          <span class=&quot;c-com&quot;># opt out of checking</span></code></pre>
  <p class=&quot;muted&quot;><code>List</code>, <code>Dict</code>, <code>Tuple</code> from
  <code>typing</code> still exist but are deprecated — reach for the builtins.</p>

  <h2>Duck typing, made checkable: <code>Protocol</code></h2>
  <p>Python's culture is &quot;if it quacks like a duck.&quot; <code>Protocol</code> turns
  that into something a checker understands: any object with the right methods
  fits — no inheritance required.</p>
<pre><code><span class=&quot;c-kw&quot;>from</span> typing <span class=&quot;c-kw&quot;>import</span> Protocol

<span class=&quot;c-kw&quot;>class</span> <span class=&quot;c-fn&quot;>Sized</span>(Protocol):
    <span class=&quot;c-kw&quot;>def</span> <span class=&quot;c-fn&quot;>__len__</span>(self) -&amp;gt; int: ...

<span class=&quot;c-kw&quot;>def</span> <span class=&quot;c-fn&quot;>describe</span>(x: Sized) -&amp;gt; str:
    <span class=&quot;c-kw&quot;>return</span> f<span class=&quot;c-str&quot;>&quot;has {len(x)} items&quot;</span>   <span class=&quot;c-com&quot;># list, str, dict... all fit structurally</span></code></pre>

  <div class=&quot;note&quot;><strong>Tie-in:</strong> dataclasses (lesson 13) <em>are</em>
  these annotations — the field types you wrote are hints the checker reads. And
  <code>from __future__ import annotations</code> at the top of a file makes all
  annotations lazy strings, handy for forward references; you'll see it in older
  or self-referential code.</div>

  <h2>The idiom: hint the boundaries</h2>
  <p>Annotate <strong>public function signatures</strong>, where the contract
  matters and tools help most. Don't over-annotate obvious locals — inference
  already knows <code>count = 0</code> is an <code>int</code>.</p>
<pre><code><span class=&quot;c-com&quot;># good: the signature documents the contract</span>
<span class=&quot;c-kw&quot;>def</span> <span class=&quot;c-fn&quot;>load</span>(path: str) -&amp;gt; dict[str, int]:
    total = <span class=&quot;c-num&quot;>0</span>                 <span class=&quot;c-com&quot;># no hint needed — obvious</span>
    ...</code></pre>

  <!-- ---------------- Quiz ---------------- -->
  <h2>Three quick checks</h2>
  <p class=&quot;muted&quot;>Recall beats recognition — answer before you scroll. Immediate
  feedback below each.</p>

  <div class=&quot;quiz&quot; id=&quot;q1&quot;>
    <div class=&quot;q&quot;>1. What happens at runtime when you call <code>greet(42)</code> on <code>def greet(name: str) -&amp;gt; str</code>?</div>
    <button class=&quot;opt&quot;>Python raises a TypeError because the hint is violated</button>
    <button class=&quot;opt&quot; data-correct=&quot;1&quot;>It runs; the hint is ignored, only a checker would flag it</button>
    <button class=&quot;opt&quot;>Python silently converts the argument to a string first</button>
    <div class=&quot;fb&quot;></div>
  </div>

  <div class=&quot;quiz&quot; id=&quot;q2&quot;>
    <div class=&quot;q&quot;>2. Which is the modern (3.10+) way to annotate a value that may be missing?</div>
    <button class=&quot;opt&quot;>def find(k: str) -&amp;gt; typing.Maybe[str]: ...</button>
    <button class=&quot;opt&quot;>def find(k: str) -&amp;gt; str or None: ...</button>
    <button class=&quot;opt&quot; data-correct=&quot;1&quot;>def find(k: str) -&amp;gt; str | None: ...</button>
    <div class=&quot;fb&quot;></div>
  </div>

  <div class=&quot;quiz&quot; id=&quot;q3&quot;>
    <div class=&quot;q&quot;>3. Which annotation is the preferred modern form for a dict from str to int?</div>
    <button class=&quot;opt&quot; data-correct=&quot;1&quot;>lookup: dict[str, int]  &amp;nbsp;(builtin, no import)</button>
    <button class=&quot;opt&quot;>lookup: Dict[str, int]  &amp;nbsp;(from typing import Dict)</button>
    <button class=&quot;opt&quot;>lookup: dict{str: int}  &amp;nbsp;(brace generic syntax)</button>
    <div class=&quot;fb&quot;></div>
  </div>

  <p><strong>Primary source to go deeper:</strong> the official

  introduced type hints and explains the design intent — including why they are

document.querySelectorAll(&quot;.quiz&quot;).forEach(function (quiz) {
  var fb = quiz.querySelector(&quot;.fb&quot;);
  var msgs = {
    q1: { ok: &quot;Correct — hints aren't enforced at runtime. The call runs; only a checker like mypy or pyright would flag it.&quot;,
          no: &quot;Not quite. Python ignores annotations at runtime — the call just runs. Tooling, not the interpreter, catches the mismatch.&quot; },
    q2: { ok: &quot;Correct — `str | None` is the 3.10+ spelling of `Optional[str]`. The pipe builds the union.&quot;,
          no: &quot;No — `or` isn't a type operator and there's no `Maybe`. The modern form is `str | None`.&quot; },
    q3: { ok: &quot;Correct — lowercase builtins (3.9+) need no import; `dict[str, int]` is the preferred form.&quot;,

  }[quiz.id];
  quiz.querySelectorAll(&quot;.opt&quot;).forEach(function (opt) {
    opt.addEventListener(&quot;click&quot;, function () {
      var right = opt.dataset.correct === &quot;1&quot;;
      quiz.querySelectorAll(&quot;.opt&quot;).forEach(function (o) {
        o.disabled = true;
        if (o.dataset.correct === &quot;1&quot;) o.classList.add(&quot;correct&quot;);
      });
      if (!right) opt.classList.add(&quot;wrong&quot;);

<script>
/* narrate.js — reusable voice-over for course lessons.
 *
 * Uses the browser's built-in Web Speech API (speechSynthesis). No install, no
 * network, works offline in any modern browser.
 *
 * Usage in a lesson:
 *   1. Add a hidden narration script:
 *        <div id=&quot;narration&quot; hidden>
 *          First sentence of the voice-over. Second sentence. ...
 *        </div>
 *      Split narration into sentences ending in . ! or ? — each becomes one
 *      utterance so pause/stop are responsive and Chrome's long-utterance bug
 *      (it silently stops after ~15s) is avoided.
 *   2. Include this script: <script src=&quot;../assets/narrate.js&quot; defer><\/script>
 *
 * The control bar (Play / Pause / Stop, speed, voice) is injected automatically.
 */
(function () {
  &quot;use strict&quot;;

  if (!(&quot;speechSynthesis&quot; in window)) {
    document.addEventListener(&quot;DOMContentLoaded&quot;, function () {
      var bar = document.createElement(&quot;div&quot;);
      bar.className = &quot;narrator-bar&quot;;
      bar.style.cssText = barCss() + &quot;;color:#b23b3b&quot;;
      bar.textContent = &quot;Voice-over unavailable: this browser has no speech synthesis.&quot;;
      document.body.appendChild(bar);
    });
    return;
  }

  var synth = window.speechSynthesis;
  var chunks = [];      // sentences to speak
  var idx = 0;          // current sentence index
  var playing = false;
  var paused = false;
  var voices = [];
  var chosenVoice = null;
  var rate = 1.0;
  var els = {};
  var watchdog = null;   // fallback timer for voices that never fire `onend`
  var heartbeat = null;  // periodic resume() to defeat Chrome's ~15s stall

  function clearTimers() {
    if (watchdog) { clearTimeout(watchdog); watchdog = null; }
    if (heartbeat) { clearInterval(heartbeat); heartbeat = null; }
  }

  function barCss() {
    return [
      &quot;position:fixed&quot;, &quot;top:0&quot;, &quot;left:0&quot;, &quot;right:0&quot;, &quot;z-index:1000&quot;,
      &quot;display:flex&quot;, &quot;gap:.5rem&quot;, &quot;align-items:center&quot;,
      &quot;padding:.5rem .9rem&quot;,
      &quot;background:rgba(253,252,249,.92)&quot;, &quot;backdrop-filter:blur(6px)&quot;,
      &quot;border-bottom:1px solid #e3e0d8&quot;,
      &quot;font-family:ui-sans-serif,system-ui,sans-serif&quot;, &quot;font-size:.85rem&quot;
    ].join(&quot;;&quot;);
  }

  function btn(label, title) {
    var b = document.createElement(&quot;button&quot;);
    b.textContent = label;
    b.title = title || label;
    b.style.cssText =
      &quot;font:inherit;cursor:pointer;border:1px solid #cfcabb;background:#fff;&quot; +
      &quot;border-radius:6px;padding:.25rem .6rem;color:#1a1a1a&quot;;
    return b;
  }

  function loadNarration() {
    var src = document.getElementById(&quot;narration&quot;);
    if (!src) return [];
    var text = src.textContent.replace(/\s+/g, &quot; &quot;).trim();
    if (!text) return [];
    // Split into sentences, keeping the terminal punctuation.
    var parts = text.match(/[^.!?]+[.!?]+(\s|$)|[^.!?]+$/g) || [text];
    return parts.map(function (s) { return s.trim(); }).filter(Boolean);
  }

  function pickDefaultVoice() {
    if (!voices.length) return null;
    // Prefer an English voice; fall back to the first available.
    var en = voices.filter(function (v) { return /^en(-|_|$)/i.test(v.lang); });
    var pool = en.length ? en : voices;
    // Prefer a LOCAL (on-device) voice. Chrome's remote Google voices fire
    // `onend` unreliably — usually not at all between back-to-back utterances —
    // which stalls the sentence-by-sentence chain after the first line. Local
    // voices fire it dependably, so use them first.
    var local = pool.filter(function (v) { return v.localService; });
    return local[0] || pool[0];
  }

  function startHeartbeat() {
    if (heartbeat) clearInterval(heartbeat);
    // Chrome silently pauses synthesis after ~15s; a periodic resume() keeps
    // long sentences (and the queue) alive.
    heartbeat = setInterval(function () {
      if (playing &amp;&amp; !paused &amp;&amp; synth.speaking) synth.resume();
    }, 10000);
  }

  function speakFrom(i) {
    if (i >= chunks.length) { stop(); return; }
    idx = i;
    var advanced = false;            // guard: advance to the next chunk once
    function next() {
      if (advanced) return;
      advanced = true;
      if (watchdog) { clearTimeout(watchdog); watchdog = null; }
      if (playing &amp;&amp; !paused) speakFrom(idx + 1);
    }

    var u = new SpeechSynthesisUtterance(chunks[i]);
    if (chosenVoice) u.voice = chosenVoice;
    u.rate = rate;
    u.onend = next;                  // fast path: advance the moment it ends
    u.onerror = next;                // a failed/cancelled chunk: skip ahead
    var started = false;
    u.onstart = function () { started = true; };
    synth.speak(u);

    // Fallback for voices that never fire `onend` (notably Chrome's remote
    // Google voices): poll `speaking` every 250ms and advance as soon as the
    // engine has spoken and gone quiet, so the gap between lines stays short
    // instead of stalling. A per-line hard cap covers an engine that never
    // starts at all.
    var words = chunks[i].split(/\s+/).length;
    var hardCapMs = (words / 2.0) * 1000 + 8000;
    var elapsed = 0, step = 250;
    function poll() {
      if (advanced) return;
      if (paused) { watchdog = setTimeout(poll, step); return; }
      if (synth.speaking) started = true;
      elapsed += step;
      if (!playing || (started &amp;&amp; !synth.speaking) || elapsed >= hardCapMs) { next(); return; }
      watchdog = setTimeout(poll, step);
    }
    watchdog = setTimeout(poll, step);
  }

  function play() {
    if (!chunks.length) return;
    if (paused) { synth.resume(); paused = false; setState(); return; }
    if (playing) return;
    synth.cancel();
    playing = true; paused = false;
    startHeartbeat();
    speakFrom(idx >= chunks.length ? 0 : idx);
    setState();
  }
  function pause() {
    if (!playing || paused) return;
    synth.pause(); paused = true; setState();
  }
  function stop() {
    // Set state BEFORE cancel(): cancelling can synchronously fire the current
    // utterance onend/onerror, and if playing were still true that handler
    // would speak the next sentence — the press-Stop-hear-the-next-line bug.
    playing = false; paused = false; idx = 0;
    clearTimers();
    synth.cancel();
    setState();
  }

  function setState() {
    els.play.textContent = paused ? &quot;▶ Resume&quot; : (playing ? &quot;❚❚ Pause&quot; : &quot;▶ Play narration&quot;);
    els.play.onclick = (playing &amp;&amp; !paused) ? pause : play;
    els.stop.disabled = !playing;
    els.stop.style.opacity = playing ? &quot;1&quot; : &quot;.5&quot;;
  }

  function buildBar() {
    chunks = loadNarration();

    var bar = document.createElement(&quot;div&quot;);
    bar.className = &quot;narrator-bar&quot;;
    bar.style.cssText = barCss();

    var label = document.createElement(&quot;strong&quot;);
    label.textContent = &quot;🔊 Voice-over&quot;;
    label.style.cssText = &quot;color:#3a5a78;margin-right:.3rem&quot;;

    els.play = btn(&quot;▶ Play narration&quot;);
    els.stop = btn(&quot;■ Stop&quot;);
    els.stop.onclick = stop;

    // Speed control
    var speedWrap = document.createElement(&quot;label&quot;);
    speedWrap.style.cssText = &quot;display:flex;align-items:center;gap:.3rem;color:#6b6b6b&quot;;
    speedWrap.append(&quot;speed&quot;);
    var speed = document.createElement(&quot;input&quot;);
    speed.type = &quot;range&quot;; speed.min = &quot;0.7&quot;; speed.max = &quot;1.4&quot;; speed.step = &quot;0.1&quot;; speed.value = &quot;1&quot;;
    speed.style.width = &quot;70px&quot;;
    var speedVal = document.createElement(&quot;span&quot;);
    speedVal.textContent = &quot;1.0×&quot;; speedVal.style.minWidth = &quot;2.4em&quot;;
    speed.oninput = function () {
      rate = parseFloat(speed.value); speedVal.textContent = rate.toFixed(1) + &quot;×&quot;;
      if (playing &amp;&amp; !paused) { var resumeAt = idx; stop(); idx = resumeAt; play(); }
    };
    speedWrap.append(speed, speedVal);

    // Voice selector
    var voiceSel = document.createElement(&quot;select&quot;);
    voiceSel.style.cssText = &quot;font:inherit;max-width:11rem;border:1px solid #cfcabb;border-radius:6px;padding:.2rem&quot;;
    voiceSel.title = &quot;Narration voice&quot;;
    voiceSel.onchange = function () {
      chosenVoice = voices[parseInt(voiceSel.value, 10)] || null;
      if (playing) { var at = idx; stop(); idx = at; play(); }
    };
    els.voiceSel = voiceSel;

    var spacer = document.createElement(&quot;span&quot;);
    spacer.style.flex = &quot;1&quot;;

    bar.append(label, els.play, els.stop, speedWrap, spacer, voiceSel);
    document.body.appendChild(bar);

    // Push page content down so the fixed bar doesn't cover the title.
    document.body.style.paddingTop = &quot;2.6rem&quot;;

    setState();
    refreshVoices();
  }

  function refreshVoices() {
    voices = synth.getVoices();
    if (!els.voiceSel) return;
    els.voiceSel.innerHTML = &quot;&quot;;
    voices.forEach(function (v, i) {
      var o = document.createElement(&quot;option&quot;);
      o.value = i; o.textContent = v.name + &quot; (&quot; + v.lang + &quot;)&quot;;
      els.voiceSel.appendChild(o);
    });
    if (!chosenVoice) chosenVoice = pickDefaultVoice();
    if (chosenVoice) els.voiceSel.value = String(voices.indexOf(chosenVoice));
  }

  // Voices load asynchronously in most browsers.
  if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = refreshVoices;

  // Stop narration when leaving the page (otherwise it keeps talking).
  window.addEventListener(&quot;beforeunload&quot;, function () { synth.cancel(); });

  document.addEventListener(&quot;DOMContentLoaded&quot;, buildBar);
})();

</script>

<div id=&quot;narration&quot; hidden>
Welcome to lesson sixteen: structural pattern matching.
If you came from C, Java, or JavaScript, the words match and case will make you think switch — and that instinct will mislead you.
A C switch compares one value against a list of constants and falls through unless you break.
Python's match does something different: it matches the subject against the shape of the data, and binds names as it goes.
So the real win here is reading match statements with confidence, knowing they destructure, not just compare.
The simplest cases do look switch-like: case literal, with case underscore as the catch-all wildcard.
But the moment you write case Point of x and y, you are no longer comparing — you are pulling x and y out of the object.
Sequence patterns work the same way: case open-bracket a comma b matches a two-element sequence and binds a and b.
Add a star, as in case first comma star rest, and rest captures everything after the first element, just like unpacking.
Mapping patterns match dictionaries by the keys you name, ignoring any extra keys the dict happens to carry.
Class patterns can use positional arguments or keyword arguments, so case Point with x equals zero and y equals zero matches only the origin.
You can add a guard: case a comma b, then if a equals b, runs the case only when that extra condition also holds.
And you can combine alternatives with the pipe: case four-oh-one or four-oh-three or four-oh-four matches any of those three.
Now the single most important gotcha, the one that trips up everyone.
A bare lowercase name in a case does not compare against a variable of that name — it captures.
So case red will match anything and bind it to red, even if you meant to check against a constant called red.
To match against a constant, you must use a dotted name, like Color dot RED, or an attribute lookup.
That one rule explains most of the confusion people have with match, so hold on to it.
Reach for match when you are branching on the shape of structured data: parsed JSON, an abstract syntax tree, a command, an event.
For a simple equality check on one value, a plain if or a dict lookup is still cleaner.
Scroll down, take the quick checks, and replay the narrated walkthrough whenever you like.
If anything here is fuzzy, ask me directly — I am your teacher for this course.
</div>

<main>
  <div class=&quot;kicker&quot;>Lesson 16 · Idiomatic Python</div>
  <h1>Structural pattern matching</h1>
  <p class=&quot;lede&quot;>It looks like a <code>switch</code>, but it isn't one. <code>match</code>
  branches on the <em>shape</em> of your data and pulls values out as it goes —
  Python 3.10's most powerful reading skill.</p>

  <p>You'll meet <code>match</code> in parsers, event handlers, and anything that
  walks structured data. The goal of this lesson is to read <code>match</code>/<code>case</code>
  fluently — and to internalise the one rule that confuses everyone.</p>

  <h2>Not a switch — it destructures</h2>
  <div class=&quot;contrast&quot;>
    <div class=&quot;col other&quot;>
      <h4>What you expect (a switch)</h4>
<pre><code><span class=&quot;c-com&quot;>// compare one value to constants</span>
<span class=&quot;c-kw&quot;>switch</span> (status) {
  <span class=&quot;c-kw&quot;>case</span> <span class=&quot;c-num&quot;>404</span>: ...; <span class=&quot;c-kw&quot;>break</span>;
  <span class=&quot;c-kw&quot;>default</span>: ...;
}</code></pre>
    </div>
    <div class=&quot;col py&quot;>
      <h4>What match actually does</h4>
<pre><code><span class=&quot;c-com&quot;># match the SHAPE, bind as you go</span>
<span class=&quot;c-kw&quot;>match</span> point:
    <span class=&quot;c-kw&quot;>case</span> Point(x, y):
        <span class=&quot;c-com&quot;># x and y are now bound</span>
        ...</code></pre>
    </div>
  </div>
  <p>A <code>switch</code> asks <em>“is this value equal to that constant?”</em>.
  <code>match</code> asks <em>“does this data have this structure?”</em> — and where
  it does, it <strong>binds names</strong> to the pieces. There is no fall-through
  and no <code>break</code>; the first matching <code>case</code> wins.</p>

  <h2>Literals and the wildcard</h2>
  <p>The switch-like layer: match literal values, with <code>case _</code> as the
  catch-all. The underscore is the wildcard — it matches anything and binds
  nothing.</p>
<pre><code><span class=&quot;c-kw&quot;>match</span> command:
    <span class=&quot;c-kw&quot;>case</span> <span class=&quot;c-str&quot;>&quot;quit&quot;</span>:
        ...
    <span class=&quot;c-kw&quot;>case</span> <span class=&quot;c-str&quot;>&quot;help&quot;</span>:
        ...
    <span class=&quot;c-kw&quot;>case</span> _:
        <span class=&quot;c-com&quot;># anything else</span>
        ...</code></pre>

  <h2>Capture &amp;amp; sequence patterns</h2>
  <p>A name inside a pattern <em>captures</em> the matched value. Sequence patterns
  destructure lists and tuples — including a starred name for “the rest”, exactly
  like unpacking assignment:</p>
<pre><code><span class=&quot;c-kw&quot;>match</span> coords:
    <span class=&quot;c-kw&quot;>case</span> []:
        <span class=&quot;c-com&quot;># empty sequence</span>
        ...
    <span class=&quot;c-kw&quot;>case</span> [a, b]:
        <span class=&quot;c-com&quot;># exactly two items → a, b bound</span>
        ...
    <span class=&quot;c-kw&quot;>case</span> [first, *rest]:
        <span class=&quot;c-com&quot;># first item, then rest = everything after</span>
        ...</code></pre>

  <h2>Mapping &amp;amp; class patterns</h2>
  <p>Mapping patterns match dictionaries by the keys you name and <strong>ignore
  extra keys</strong>. Class patterns match an instance and pull out attributes,
  positionally or by keyword:</p>
<pre><code><span class=&quot;c-kw&quot;>match</span> shape:
    <span class=&quot;c-kw&quot;>case</span> {<span class=&quot;c-str&quot;>&quot;type&quot;</span>: <span class=&quot;c-str&quot;>&quot;circle&quot;</span>, <span class=&quot;c-str&quot;>&quot;r&quot;</span>: r}:
        <span class=&quot;c-com&quot;># r captured; other keys ignored</span>
        area = <span class=&quot;c-num&quot;>3.14159</span> * r * r
    <span class=&quot;c-kw&quot;>case</span> Point(x=<span class=&quot;c-num&quot;>0</span>, y=<span class=&quot;c-num&quot;>0</span>):
        <span class=&quot;c-com&quot;># only the origin matches</span>
        ...
    <span class=&quot;c-kw&quot;>case</span> Point(x=<span class=&quot;c-num&quot;>0</span>, y=y):
        <span class=&quot;c-com&quot;># on the y-axis; y captured</span>
        ...</code></pre>
  <p>Positional class patterns like <code>case Point(x, y)</code> rely on the class
  declaring <code>__match_args__</code> (dataclasses do this for you); keyword
  patterns like <code>Point(x=0, y=0)</code> always work.</p>

  <h2>Guards and OR patterns</h2>
  <p>A guard is a trailing <code>if</code> that adds a condition the pattern alone
  can't express. A <code>|</code> (OR) pattern matches any of several alternatives:</p>
<pre><code><span class=&quot;c-kw&quot;>match</span> pair:
    <span class=&quot;c-kw&quot;>case</span> [a, b] <span class=&quot;c-kw&quot;>if</span> a == b:
        <span class=&quot;c-com&quot;># two equal items</span>
        ...

<span class=&quot;c-kw&quot;>match</span> status:
    <span class=&quot;c-kw&quot;>case</span> <span class=&quot;c-num&quot;>401</span> | <span class=&quot;c-num&quot;>403</span> | <span class=&quot;c-num&quot;>404</span>:
        <span class=&quot;c-com&quot;># any of these three</span>
        ...</code></pre>

  <h2 id=&quot;gotcha&quot;>The one rule everyone trips on</h2>
  <div class=&quot;note&quot;><strong>A bare lowercase name in a <code>case</code> is a
  <em>capture</em>, not a comparison.</strong> <code>case red:</code> does not check
  whether the subject equals a variable named <code>red</code> — it matches
  <em>anything</em> and binds it to <code>red</code> (and so acts like a catch-all,
  shadowing later cases).</div>
  <p>To match against a <strong>constant</strong>, use a <em>dotted</em> name — an
  attribute lookup the parser recognises as a value, not a binding:</p>
  <div class=&quot;contrast&quot;>
    <div class=&quot;col other&quot;>
      <h4>The trap (always matches)</h4>
<pre><code><span class=&quot;c-kw&quot;>match</span> color:
    <span class=&quot;c-kw&quot;>case</span> RED:
        <span class=&quot;c-com&quot;># captures! binds RED to color</span>
        ...</code></pre>
    </div>
    <div class=&quot;col py&quot;>
      <h4>The fix (compares by value)</h4>
<pre><code><span class=&quot;c-kw&quot;>match</span> color:
    <span class=&quot;c-kw&quot;>case</span> Color.RED:
        <span class=&quot;c-com&quot;># dotted → matches the constant</span>
        ...</code></pre>
    </div>
  </div>
  <p class=&quot;muted&quot;>Literals (<code>404</code>, <code>&quot;quit&quot;</code>) and dotted names
  (<code>Color.RED</code>, <code>math.pi</code>) are <em>value</em> patterns. Bare
  names are always captures. When in doubt, qualify it.</p>

  <h2>When to reach for it</h2>
  <p>Use <code>match</code> when you branch on the <em>structure</em> of data:
  parsed JSON, an AST node, a command, an event object. For a plain equality check
  on a single value, an <code>if</code>/<code>elif</code> chain or a dict lookup is
  still simpler and clearer.</p>

<script>
/* narrate.js — reusable voice-over for course lessons.
 *
 * Uses the browser's built-in Web Speech API (speechSynthesis). No install, no
 * network, works offline in any modern browser.
 *
 * Usage in a lesson:
 *   1. Add a hidden narration script:
 *        <div id=&quot;narration&quot; hidden>
 *          First sentence of the voice-over. Second sentence. ...
 *        </div>
 *      Split narration into sentences ending in . ! or ? — each becomes one
 *      utterance so pause/stop are responsive and Chrome's long-utterance bug
 *      (it silently stops after ~15s) is avoided.
 *   2. Include this script: <script src=&quot;../assets/narrate.js&quot; defer><\/script>
 *
 * The control bar (Play / Pause / Stop, speed, voice) is injected automatically.
 */
(function () {
  &quot;use strict&quot;;

  if (!(&quot;speechSynthesis&quot; in window)) {
    document.addEventListener(&quot;DOMContentLoaded&quot;, function () {
      var bar = document.createElement(&quot;div&quot;);
      bar.className = &quot;narrator-bar&quot;;
      bar.style.cssText = barCss() + &quot;;color:#b23b3b&quot;;
      bar.textContent = &quot;Voice-over unavailable: this browser has no speech synthesis.&quot;;
      document.body.appendChild(bar);
    });
    return;
  }

  var synth = window.speechSynthesis;
  var chunks = [];      // sentences to speak
  var idx = 0;          // current sentence index
  var playing = false;
  var paused = false;
  var voices = [];
  var chosenVoice = null;
  var rate = 1.0;
  var els = {};
  var watchdog = null;   // fallback timer for voices that never fire `onend`
  var heartbeat = null;  // periodic resume() to defeat Chrome's ~15s stall

  function clearTimers() {
    if (watchdog) { clearTimeout(watchdog); watchdog = null; }
    if (heartbeat) { clearInterval(heartbeat); heartbeat = null; }
  }

  function barCss() {
    return [
      &quot;position:fixed&quot;, &quot;top:0&quot;, &quot;left:0&quot;, &quot;right:0&quot;, &quot;z-index:1000&quot;,
      &quot;display:flex&quot;, &quot;gap:.5rem&quot;, &quot;align-items:center&quot;,
      &quot;padding:.5rem .9rem&quot;,
      &quot;background:rgba(253,252,249,.92)&quot;, &quot;backdrop-filter:blur(6px)&quot;,
      &quot;border-bottom:1px solid #e3e0d8&quot;,
      &quot;font-family:ui-sans-serif,system-ui,sans-serif&quot;, &quot;font-size:.85rem&quot;
    ].join(&quot;;&quot;);
  }

  function btn(label, title) {
    var b = document.createElement(&quot;button&quot;);
    b.textContent = label;
    b.title = title || label;
    b.style.cssText =
      &quot;font:inherit;cursor:pointer;border:1px solid #cfcabb;background:#fff;&quot; +
      &quot;border-radius:6px;padding:.25rem .6rem;color:#1a1a1a&quot;;
    return b;
  }

  function loadNarration() {
    var src = document.getElementById(&quot;narration&quot;);
    if (!src) return [];
    var text = src.textContent.replace(/\s+/g, &quot; &quot;).trim();
    if (!text) return [];
    // Split into sentences, keeping the terminal punctuation.
    var parts = text.match(/[^.!?]+[.!?]+(\s|$)|[^.!?]+$/g) || [text];
    return parts.map(function (s) { return s.trim(); }).filter(Boolean);
  }

  function pickDefaultVoice() {
    if (!voices.length) return null;
    // Prefer an English voice; fall back to the first available.
    var en = voices.filter(function (v) { return /^en(-|_|$)/i.test(v.lang); });
    var pool = en.length ? en : voices;
    // Prefer a LOCAL (on-device) voice. Chrome's remote Google voices fire
    // `onend` unreliably — usually not at all between back-to-back utterances —
    // which stalls the sentence-by-sentence chain after the first line. Local
    // voices fire it dependably, so use them first.
    var local = pool.filter(function (v) { return v.localService; });
    return local[0] || pool[0];
  }

  function startHeartbeat() {
    if (heartbeat) clearInterval(heartbeat);
    // Chrome silently pauses synthesis after ~15s; a periodic resume() keeps
    // long sentences (and the queue) alive.
    heartbeat = setInterval(function () {
      if (playing &amp;&amp; !paused &amp;&amp; synth.speaking) synth.resume();
    }, 10000);
  }

  function speakFrom(i) {
    if (i >= chunks.length) { stop(); return; }
    idx = i;
    var advanced = false;            // guard: advance to the next chunk once
    function next() {
      if (advanced) return;
      advanced = true;
      if (watchdog) { clearTimeout(watchdog); watchdog = null; }
      if (playing &amp;&amp; !paused) speakFrom(idx + 1);
    }

    var u = new SpeechSynthesisUtterance(chunks[i]);
    if (chosenVoice) u.voice = chosenVoice;
    u.rate = rate;
    u.onend = next;                  // fast path: advance the moment it ends
    u.onerror = next;                // a failed/cancelled chunk: skip ahead
    var started = false;
    u.onstart = function () { started = true; };
    synth.speak(u);

    // Fallback for voices that never fire `onend` (notably Chrome's remote
    // Google voices): poll `speaking` every 250ms and advance as soon as the
    // engine has spoken and gone quiet, so the gap between lines stays short
    // instead of stalling. A per-line hard cap covers an engine that never
    // starts at all.
    var words = chunks[i].split(/\s+/).length;
    var hardCapMs = (words / 2.0) * 1000 + 8000;
    var elapsed = 0, step = 250;
    function poll() {
      if (advanced) return;
      if (paused) { watchdog = setTimeout(poll, step); return; }
      if (synth.speaking) started = true;
      elapsed += step;
      if (!playing || (started &amp;&amp; !synth.speaking) || elapsed >= hardCapMs) { next(); return; }
      watchdog = setTimeout(poll, step);
    }
    watchdog = setTimeout(poll, step);
  }

  function play() {
    if (!chunks.length) return;
    if (paused) { synth.resume(); paused = false; setState(); return; }
    if (playing) return;
    synth.cancel();
    playing = true; paused = false;
    startHeartbeat();
    speakFrom(idx >= chunks.length ? 0 : idx);
    setState();
  }
  function pause() {
    if (!playing || paused) return;
    synth.pause(); paused = true; setState();
  }
  function stop() {
    // Set state BEFORE cancel(): cancelling can synchronously fire the current
    // utterance onend/onerror, and if playing were still true that handler
    // would speak the next sentence — the press-Stop-hear-the-next-line bug.
    playing = false; paused = false; idx = 0;
    clearTimers();
    synth.cancel();
    setState();
  }

  function setState() {
    els.play.textContent = paused ? &quot;▶ Resume&quot; : (playing ? &quot;❚❚ Pause&quot; : &quot;▶ Play narration&quot;);
    els.play.onclick = (playing &amp;&amp; !paused) ? pause : play;
    els.stop.disabled = !playing;
    els.stop.style.opacity = playing ? &quot;1&quot; : &quot;.5&quot;;
  }

  function buildBar() {
    chunks = loadNarration();

    var bar = document.createElement(&quot;div&quot;);
    bar.className = &quot;narrator-bar&quot;;
    bar.style.cssText = barCss();

    var label = document.createElement(&quot;strong&quot;);
    label.textContent = &quot;🔊 Voice-over&quot;;
    label.style.cssText = &quot;color:#3a5a78;margin-right:.3rem&quot;;

    els.play = btn(&quot;▶ Play narration&quot;);
    els.stop = btn(&quot;■ Stop&quot;);
    els.stop.onclick = stop;

    // Speed control
    var speedWrap = document.createElement(&quot;label&quot;);
    speedWrap.style.cssText = &quot;display:flex;align-items:center;gap:.3rem;color:#6b6b6b&quot;;
    speedWrap.append(&quot;speed&quot;);
    var speed = document.createElement(&quot;input&quot;);
    speed.type = &quot;range&quot;; speed.min = &quot;0.7&quot;; speed.max = &quot;1.4&quot;; speed.step = &quot;0.1&quot;; speed.value = &quot;1&quot;;
    speed.style.width = &quot;70px&quot;;
    var speedVal = document.createElement(&quot;span&quot;);
    speedVal.textContent = &quot;1.0×&quot;; speedVal.style.minWidth = &quot;2.4em&quot;;
    speed.oninput = function () {
      rate = parseFloat(speed.value); speedVal.textContent = rate.toFixed(1) + &quot;×&quot;;
      if (playing &amp;&amp; !paused) { var resumeAt = idx; stop(); idx = resumeAt; play(); }
    };
    speedWrap.append(speed, speedVal);

    // Voice selector
    var voiceSel = document.createElement(&quot;select&quot;);
    voiceSel.style.cssText = &quot;font:inherit;max-width:11rem;border:1px solid #cfcabb;border-radius:6px;padding:.2rem&quot;;
    voiceSel.title = &quot;Narration voice&quot;;
    voiceSel.onchange = function () {
      chosenVoice = voices[parseInt(voiceSel.value, 10)] || null;
      if (playing) { var at = idx; stop(); idx = at; play(); }
    };
    els.voiceSel = voiceSel;

    var spacer = document.createElement(&quot;span&quot;);
    spacer.style.flex = &quot;1&quot;;

    bar.append(label, els.play, els.stop, speedWrap, spacer, voiceSel);
    document.body.appendChild(bar);

    // Push page content down so the fixed bar doesn't cover the title.
    document.body.style.paddingTop = &quot;2.6rem&quot;;

    setState();
    refreshVoices();
  }

  function refreshVoices() {
    voices = synth.getVoices();
    if (!els.voiceSel) return;
    els.voiceSel.innerHTML = &quot;&quot;;
    voices.forEach(function (v, i) {
      var o = document.createElement(&quot;option&quot;);
      o.value = i; o.textContent = v.name + &quot; (&quot; + v.lang + &quot;)&quot;;
      els.voiceSel.appendChild(o);
    });
    if (!chosenVoice) chosenVoice = pickDefaultVoice();
    if (chosenVoice) els.voiceSel.value = String(voices.indexOf(chosenVoice));
  }

  if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = refreshVoices;

  window.addEventListener(&quot;beforeunload&quot;, function () { synth.cancel(); });

})();

Welcome to lesson seventeen: the Zen of Python, applied.
This is the capstone, so its job is not to teach a new idiom but to tie the sixteen you already met under one philosophy.
Open a Python prompt and type import this, and you will see a short poem by Tim Peters called the Zen of Python.
It is real code: a module in the standard library, blessed as PEP twenty, and it is the closest thing Python has to a constitution.
Almost every idiom in this course is one of its lines made concrete.
Readability counts is why we write comprehensions and f-strings: the code should read like the sentence describing it.
There should be one obvious way to do it is why we reach for enumerate, for zip, for with, instead of reinventing each by hand.
Flat is better than nested is why a guard clause that returns early beats a pyramid of if statements.
Explicit is better than implicit is why we name our arguments, unpack into named targets, and avoid clever magic.
And errors should never pass silently is why we catch the specific exception and let the rest crash loudly.
Now let us replay the highest-value swaps from the whole course, side by side.
A manual index loop with range and len becomes enumerate, which hands you the index and the value together.
Checking len of a list greater than zero becomes a plain truthiness test, because an empty container is already falsy.
Building an empty list, looping, and appending becomes a single comprehension that says what you want, not how to gather it.
Manually opening and closing a file becomes a with block, so the cleanup happens even when something throws.
And a class full of getters and setters becomes a dataclass or a property, so attribute access stays simple.
None of these are tricks; each one is the language meeting you where the problem already is.
I have left you a compact checklist you can print and keep beside your editor.
But a checklist only takes you so far, because fluency is not memorised, it is absorbed.
You become fluent the way you did in your first language: by reading far more than you write, and writing a little every day.
So read real codebases, the standard library and well-loved open source, and notice the idioms in the wild.
Join a community like Python Discord or the learnpython subreddit and ask is this idiomatic.
Take the three synthesis checks below, ask me anything that is still fuzzy, and then go write some Python.
You have everything you need now, so the only thing left is the reading and the doing.

  <h1>The Zen of Python, applied</h1>
  <p class=&quot;lede&quot;>Sixteen lessons taught you the idioms. This one shows you the
  single philosophy underneath them — so that &quot;is this Pythonic?&quot; becomes a
  question you can answer yourself.</p>

  <p>Open any Python prompt and type one line:</p>
<pre><code><span class=&quot;c-kw&quot;>import</span> this</code></pre>
  <p>You'll get a 19-line poem — Tim Peters' <strong>Zen of Python</strong>,
  enshrined as <a href=&quot;https://peps.python.org/pep-0020/&quot;>PEP 20</a>. It is real,
  importable code shipped in the standard library, and it is the closest thing the
  language has to a constitution. Nearly every idiom in this course is one of its
  aphorisms made concrete. Let's connect the load-bearing ones to what you already
  learned.</p>

  <h2>Five aphorisms, five idioms you already know</h2>

  <p><strong>“Readability counts.”</strong> The whole point of a comprehension or
  an f-string is that the code reads like the sentence that describes it —
  <code>[n * n for n in nums]</code> says <em>what</em> you want, not the mechanics
  of gathering it (lessons <strong>01</strong> and <strong>06</strong>).</p>

  <p><strong>“There should be one — and preferably only one — obvious way to do
  it.”</strong> That obvious way already exists for iterating: reach for
  <code>enumerate</code>, <code>zip</code>, and <code>with</code> instead of
  hand-rolling indices, parallel loops, or cleanup (lessons <strong>05</strong>
  and <strong>09</strong>).</p>

  <p><strong>“Flat is better than nested.”</strong> A guard clause that
  <code>return</code>s early flattens a pyramid of <code>if</code> blocks; a single
  comprehension flattens a build-loop-append. When nesting climbs past two levels,
  the idiom is usually to step back out (lessons <strong>01</strong> and
  <strong>03</strong>).</p>

  <p><strong>“Explicit is better than implicit.”</strong> Naming keyword arguments,
  unpacking into named targets, and avoiding clever magic all make intent visible
  at the call site — the reader shouldn't have to guess (lessons <strong>02</strong>
  and <strong>08</strong>).</p>

  <p><strong>“Errors should never pass silently.”</strong> The Pythonic style is
  EAFP — try the thing and catch the <em>specific</em> exception — never a bare
  <code>except:</code> that swallows everything. Ask forgiveness, but only for the
  error you expected (lessons <strong>03</strong> and <strong>07</strong>).</p>

  <div class=&quot;note&quot;><strong>The unifying idea:</strong> &quot;Pythonic&quot; is not a style
  preference. It means the code lets the language carry the weight — the data model,
  the built-ins, the protocols — instead of porting a pattern from somewhere else.</div>

  <h2>Pythonic vs not — the highest-value swaps</h2>
  <p>If you remember nothing else, remember these five before/after pairs. Each one
  is a pattern you'd write in many languages, and the form Python prefers instead.</p>

  <div class=&quot;contrast&quot;>
    <div class=&quot;col other&quot;>
      <h4>Ported pattern</h4>
<pre><code><span class=&quot;c-com&quot;># manual index loop</span>
<span class=&quot;c-kw&quot;>for</span> i <span class=&quot;c-kw&quot;>in</span> <span class=&quot;c-fn&quot;>range</span>(<span class=&quot;c-fn&quot;>len</span>(items)):
    <span class=&quot;c-fn&quot;>print</span>(i, items[i])</code></pre>
    </div>
    <div class=&quot;col py&quot;>
      <h4>Idiomatic Python</h4>
<pre><code><span class=&quot;c-com&quot;># enumerate hands you both</span>
<span class=&quot;c-kw&quot;>for</span> i, item <span class=&quot;c-kw&quot;>in</span> <span class=&quot;c-fn&quot;>enumerate</span>(items):
    <span class=&quot;c-fn&quot;>print</span>(i, item)</code></pre>
    </div>
  </div>

  <div class=&quot;contrast&quot;>
    <div class=&quot;col other&quot;>
      <h4>Ported pattern</h4>
<pre><code><span class=&quot;c-com&quot;># compare length to zero</span>
<span class=&quot;c-kw&quot;>if</span> <span class=&quot;c-fn&quot;>len</span>(items) &amp;gt; <span class=&quot;c-num&quot;>0</span>:
    handle(items)</code></pre>
    </div>
    <div class=&quot;col py&quot;>
      <h4>Idiomatic Python</h4>
<pre><code><span class=&quot;c-com&quot;># empty is already falsy</span>
<span class=&quot;c-kw&quot;>if</span> items:
    handle(items)</code></pre>
    </div>
  </div>

  <div class=&quot;contrast&quot;>
    <div class=&quot;col other&quot;>
      <h4>Ported pattern</h4>
<pre><code><span class=&quot;c-com&quot;># build, loop, append</span>
out = []
<span class=&quot;c-kw&quot;>for</span> n <span class=&quot;c-kw&quot;>in</span> nums:
    out.append(n * n)</code></pre>
    </div>
    <div class=&quot;col py&quot;>
      <h4>Idiomatic Python</h4>
<pre><code><span class=&quot;c-com&quot;># one expression</span>
out = [n * n <span class=&quot;c-kw&quot;>for</span> n <span class=&quot;c-kw&quot;>in</span> nums]</code></pre>
    </div>
  </div>

  <div class=&quot;contrast&quot;>
    <div class=&quot;col other&quot;>
      <h4>Ported pattern</h4>
<pre><code><span class=&quot;c-com&quot;># open and close by hand</span>
f = <span class=&quot;c-fn&quot;>open</span>(path)
data = f.read()
f.close()</code></pre>
    </div>
    <div class=&quot;col py&quot;>
      <h4>Idiomatic Python</h4>
<pre><code><span class=&quot;c-com&quot;># with closes, even on error</span>
<span class=&quot;c-kw&quot;>with</span> <span class=&quot;c-fn&quot;>open</span>(path) <span class=&quot;c-kw&quot;>as</span> f:
    data = f.read()</code></pre>
    </div>
  </div>

  <div class=&quot;contrast&quot;>
    <div class=&quot;col other&quot;>
      <h4>Ported pattern</h4>
<pre><code><span class=&quot;c-com&quot;># getters and setters</span>
<span class=&quot;c-kw&quot;>class</span> <span class=&quot;c-fn&quot;>Point</span>:
    <span class=&quot;c-kw&quot;>def</span> <span class=&quot;c-fn&quot;>get_x</span>(self):
        <span class=&quot;c-kw&quot;>return</span> self._x</code></pre>
    </div>
    <div class=&quot;col py&quot;>
      <h4>Idiomatic Python</h4>
<pre><code><span class=&quot;c-com&quot;># dataclass: plain attributes</span>
<span class=&quot;c-kw&quot;>from</span> dataclasses <span class=&quot;c-kw&quot;>import</span> dataclass

<span class=&quot;c-com&quot;># @dataclass</span>
<span class=&quot;c-kw&quot;>class</span> <span class=&quot;c-fn&quot;>Point</span>:
    x: <span class=&quot;c-fn&quot;>int</span>; y: <span class=&quot;c-fn&quot;>int</span></code></pre>
    </div>
  </div>
  <p class=&quot;muted&quot;>Plain attribute access stays plain; reach for
  <code>@property</code> only when you need computed or validated access — not by
  default (lessons <strong>10</strong> and <strong>11</strong>).</p>

  <h2>The idiom checklist — print this</h2>
  <p>A page to keep beside your editor. Before you call a chunk of Python &quot;done&quot;,
  scan it:</p>
  <div class=&quot;note&quot;>
  <ul>
    <li><strong>Looping by index?</strong> Use <code>enumerate</code>; for two
      sequences, <code>zip</code>.</li>
    <li><strong>Building a collection in a loop?</strong> Try a comprehension or a
      generator expression first.</li>
    <li><strong>Checking <code>len(x) &amp;gt; 0</code> or <code>x == None</code>?</strong>
      Write <code>if x:</code> and <code>if x is None:</code>.</li>
    <li><strong>Acquiring a resource?</strong> A file, lock, or connection belongs
      in a <code>with</code> block.</li>
    <li><strong>Unpacking a tuple by index?</strong> Assign to named targets:
      <code>x, y = point</code>.</li>
    <li><strong>Looking before you leap?</strong> Prefer EAFP — <code>try</code>
      and catch the <em>specific</em> exception.</li>
    <li><strong>Writing getters/setters?</strong> Use a <code>@dataclass</code>;
      add <code>@property</code> only when access needs logic.</li>
    <li><strong>Concatenating strings in a loop?</strong> Collect and
      <code>&quot;&quot;.join(parts)</code>; format with an f-string.</li>
    <li><strong>Reaching for a default in a dict?</strong> Use <code>.get</code>,
      <code>setdefault</code>, or <code>defaultdict</code>.</li>
    <li><strong>Nesting more than two levels?</strong> Flatten with a guard clause
      or an early <code>return</code>.</li>
  </ul>
  </div>

  <!-- ---------------- Quiz ---------------- -->
  <h2>Three quick checks</h2>
  <p class=&quot;muted&quot;>Synthesis, not recall — each spans more than one lesson. Answer
  before you scroll.</p>

  <div class=&quot;quiz&quot; id=&quot;q1&quot;>
    <div class=&quot;q&quot;>1. A colleague writes <code>for i in range(len(rows)): use(rows[i])</code>. Which single rewrite is most Pythonic?</div>
    <button class=&quot;opt&quot; data-correct=&quot;1&quot;>for i, row in enumerate(rows): use(row)</button>
    <button class=&quot;opt&quot;>while i &amp;lt; len(rows): use(rows[i]); i += 1</button>
    <button class=&quot;opt&quot;>[use(rows[i]) for i in range(len(rows))]</button>
    <div class=&quot;fb&quot;></div>
  </div>

  <div class=&quot;quiz&quot; id=&quot;q2&quot;>
    <div class=&quot;q&quot;>2. Which line best embodies both &quot;explicit is better than implicit&quot; <em>and</em> &quot;errors should never pass silently&quot;?</div>
    <button class=&quot;opt&quot;>try: parse(s)\nexcept: pass  # keep going no matter what</button>
    <button class=&quot;opt&quot; data-correct=&quot;1&quot;>try: parse(s)\nexcept ValueError: log.warning(...)</button>
    <button class=&quot;opt&quot;>if is_parseable(s): parse(s)  # check first, then act</button>
    <div class=&quot;fb&quot;></div>
  </div>

  <div class=&quot;quiz&quot; id=&quot;q3&quot;>
    <div class=&quot;q&quot;>3. You wrote a class with <code>get_total()</code> and <code>set_total()</code>. Which &quot;one obvious way&quot; reaction is most Pythonic?</div>
    <button class=&quot;opt&quot; data-correct=&quot;1&quot;>Use a public attribute; add @property only if it needs logic.</button>
    <button class=&quot;opt&quot;>Keep both methods; explicit getters are clearer to readers.</button>
    <button class=&quot;opt&quot;>Make total private and expose a get_total wrapper method.</button>
    <div class=&quot;fb&quot;></div>
  </div>

  <hr>

  <p><strong>Primary sources to keep going:</strong> read the
  <a href=&quot;https://peps.python.org/pep-0020/&quot;>Zen of Python (PEP 20)</a> until its
  lines feel obvious, then the
  <a href=&quot;https://peps.python.org/pep-0008/&quot;>style guide (PEP 8)</a> for the
  community's layout and naming conventions. The single best video remains Raymond
  Hettinger's <a href=&quot;https://www.youtube.com/watch?v=OSGv2VnC0go&quot;>“Transforming
  Code into Beautiful, Idiomatic Python”</a> (PyCon 2013). For book-length depth,
  Luciano Ramalho's <em>Fluent Python</em> (2nd ed.) explains why each idiom works
  via the data model. And to ask &quot;is this idiomatic?&quot;, the
  <a href=&quot;https://www.pythondiscord.com/&quot;>Python Discord</a> and
  <a href=&quot;https://www.reddit.com/r/learnpython/&quot;>r/learnpython</a> communities are
  friendly and fast (all listed in this course's <code>RESOURCES.md</code>).</p>

  <p>One last word: fluency isn't memorised, it's absorbed — exactly the way you
  learned your first programming language. Read far more Python than you write:
  the standard library and well-loved open source are full of idioms in the wild.
  Write a little every day, join a community, and ask for code review. You have all
  the pieces now. The rest is reading and doing.</p>

  <div class=&quot;ask-teacher&quot;>💬 <strong>Before you go — ask me anything.</strong>
  “Which lesson should I re-read first?”, “show me a non-idiomatic snippet and
  let me fix it”, “what's a good open-source codebase to read for idioms?”. I'm
  your teacher for this course, and I'm happy to keep going beyond the lessons.</div>

      bar.style.cssText = barCss() + &quot;;color:#b23b3b&quot;;
      bar.textContent = &quot;Voice-over unavailable: this browser has no speech synthesis.&quot;;
      document.body.appendChild(bar);
    });
    return;
  }

  var synth = window.speechSynthesis;
  var chunks = [];      // sentences to speak
  var idx = 0;          // current sentence index
  var playing = false;
  var paused = false;
  var voices = [];
  var chosenVoice = null;
  var rate = 1.0;
  var els = {};
  var watchdog = null;   // fallback timer for voices that never fire `onend`
  var heartbeat = null;  // periodic resume() to defeat Chrome's ~15s stall

  function clearTimers() {
    if (watchdog) { clearTimeout(watchdog); watchdog = null; }
    if (heartbeat) { clearInterval(heartbeat); heartbeat = null; }
  }

  function barCss() {
    return [
      &quot;position:fixed&quot;, &quot;top:0&quot;, &quot;left:0&quot;, &quot;right:0&quot;, &quot;z-index:1000&quot;,
      &quot;display:flex&quot;, &quot;gap:.5rem&quot;, &quot;align-items:center&quot;,
      &quot;padding:.5rem .9rem&quot;,
      &quot;background:rgba(253,252,249,.92)&quot;, &quot;backdrop-filter:blur(6px)&quot;,
      &quot;border-bottom:1px solid #e3e0d8&quot;,
      &quot;font-family:ui-sans-serif,system-ui,sans-serif&quot;, &quot;font-size:.85rem&quot;
    ].join(&quot;;&quot;);
  }

  function btn(label, title) {
    var b = document.createElement(&quot;button&quot;);
    b.textContent = label;
    b.title = title || label;
    b.style.cssText =
      &quot;font:inherit;cursor:pointer;border:1px solid #cfcabb;background:#fff;&quot; +
      &quot;border-radius:6px;padding:.25rem .6rem;color:#1a1a1a&quot;;
    return b;
  }

  function loadNarration() {
    var src = document.getElementById(&quot;narration&quot;);
    if (!src) return [];
    var text = src.textContent.replace(/\s+/g, &quot; &quot;).trim();
    if (!text) return [];
    // Split into sentences, keeping the terminal punctuation.
    var parts = text.match(/[^.!?]+[.!?]+(\s|$)|[^.!?]+$/g) || [text];
    return parts.map(function (s) { return s.trim(); }).filter(Boolean);
  }

  function pickDefaultVoice() {
    if (!voices.length) return null;
    // Prefer an English voice; fall back to the first available.
    var en = voices.filter(function (v) { return /^en(-|_|$)/i.test(v.lang); });
    var pool = en.length ? en : voices;
    // Prefer a LOCAL (on-device) voice. Chrome's remote Google voices fire
    // `onend` unreliably — usually not at all between back-to-back utterances —
    // which stalls the sentence-by-sentence chain after the first line. Local
    // voices fire it dependably, so use them first.
    var local = pool.filter(function (v) { return v.localService; });
    return local[0] || pool[0];
  }

  function startHeartbeat() {
    if (heartbeat) clearInterval(heartbeat);
    // Chrome silently pauses synthesis after ~15s; a periodic resume() keeps
    // long sentences (and the queue) alive.
    heartbeat = setInterval(function () {
      if (playing &amp;&amp; !paused &amp;&amp; synth.speaking) synth.resume();
    }, 10000);
  }

  function speakFrom(i) {
    if (i >= chunks.length) { stop(); return; }
    idx = i;
    var advanced = false;            // guard: advance to the next chunk once
    function next() {
      if (advanced) return;
      advanced = true;
      if (watchdog) { clearTimeout(watchdog); watchdog = null; }
      if (playing &amp;&amp; !paused) speakFrom(idx + 1);
    }

    var u = new SpeechSynthesisUtterance(chunks[i]);
    if (chosenVoice) u.voice = chosenVoice;
    u.rate = rate;
    u.onend = next;                  // fast path: advance the moment it ends
    u.onerror = next;                // a failed/cancelled chunk: skip ahead
    var started = false;
    u.onstart = function () { started = true; };
    synth.speak(u);

    // Fallback for voices that never fire `onend` (notably Chrome's remote
    // Google voices): poll `speaking` every 250ms and advance as soon as the
    // engine has spoken and gone quiet, so the gap between lines stays short
    // instead of stalling. A per-line hard cap covers an engine that never
    // starts at all.
    var words = chunks[i].split(/\s+/).length;
    var hardCapMs = (words / 2.0) * 1000 + 8000;
    var elapsed = 0, step = 250;
    function poll() {
      if (advanced) return;
      if (paused) { watchdog = setTimeout(poll, step); return; }
      if (synth.speaking) started = true;
      elapsed += step;
      if (!playing || (started &amp;&amp; !synth.speaking) || elapsed >= hardCapMs) { next(); return; }
      watchdog = setTimeout(poll, step);
    }
    watchdog = setTimeout(poll, step);
  }

  function play() {
    if (!chunks.length) return;
    if (paused) { synth.resume(); paused = false; setState(); return; }
    if (playing) return;
    synth.cancel();
    playing = true; paused = false;
    startHeartbeat();
    speakFrom(idx >= chunks.length ? 0 : idx);
    setState();
  }
  function pause() {
    if (!playing || paused) return;
    synth.pause(); paused = true; setState();
  }
  function stop() {
    // Set state BEFORE cancel(): cancelling can synchronously fire the current
    // utterance onend/onerror, and if playing were still true that handler
    // would speak the next sentence — the press-Stop-hear-the-next-line bug.
    playing = false; paused = false; idx = 0;
    clearTimers();
    synth.cancel();
    setState();
  }

  function setState() {
    els.play.textContent = paused ? &quot;▶ Resume&quot; : (playing ? &quot;❚❚ Pause&quot; : &quot;▶ Play narration&quot;);
    els.play.onclick = (playing &amp;&amp; !paused) ? pause : play;
    els.stop.disabled = !playing;
    els.stop.style.opacity = playing ? &quot;1&quot; : &quot;.5&quot;;
  }

  function buildBar() {
    chunks = loadNarration();

    var bar = document.createElement(&quot;div&quot;);
    bar.className = &quot;narrator-bar&quot;;
    bar.style.cssText = barCss();

    var label = document.createElement(&quot;strong&quot;);
    label.textContent = &quot;🔊 Voice-over&quot;;
    label.style.cssText = &quot;color:#3a5a78;margin-right:.3rem&quot;;

    els.play = btn(&quot;▶ Play narration&quot;);
    els.stop = btn(&quot;■ Stop&quot;);
    els.stop.onclick = stop;

    // Speed control
    var speedWrap = document.createElement(&quot;label&quot;);
    speedWrap.style.cssText = &quot;display:flex;align-items:center;gap:.3rem;color:#6b6b6b&quot;;
    speedWrap.append(&quot;speed&quot;);
    var speed = document.createElement(&quot;input&quot;);
    speed.type = &quot;range&quot;; speed.min = &quot;0.7&quot;; speed.max = &quot;1.4&quot;; speed.step = &quot;0.1&quot;; speed.value = &quot;1&quot;;
    speed.style.width = &quot;70px&quot;;
    var speedVal = document.createElement(&quot;span&quot;);
    speedVal.textContent = &quot;1.0×&quot;; speedVal.style.minWidth = &quot;2.4em&quot;;
    speed.oninput = function () {
      rate = parseFloat(speed.value); speedVal.textContent = rate.toFixed(1) + &quot;×&quot;;
      if (playing &amp;&amp; !paused) { var resumeAt = idx; stop(); idx = resumeAt; play(); }
    };
    speedWrap.append(speed, speedVal);

    // Voice selector
    var voiceSel = document.createElement(&quot;select&quot;);
    voiceSel.style.cssText = &quot;font:inherit;max-width:11rem;border:1px solid #cfcabb;border-radius:6px;padding:.2rem&quot;;
    voiceSel.title = &quot;Narration voice&quot;;
    voiceSel.onchange = function () {
      chosenVoice = voices[parseInt(voiceSel.value, 10)] || null;
      if (playing) { var at = idx; stop(); idx = at; play(); }
    };
    els.voiceSel = voiceSel;

    var spacer = document.createElement(&quot;span&quot;);
    spacer.style.flex = &quot;1&quot;;

    bar.append(label, els.play, els.stop, speedWrap, spacer, voiceSel);
    document.body.appendChild(bar);

    // Push page content down so the fixed bar doesn't cover the title.
    document.body.style.paddingTop = &quot;2.6rem&quot;;

    setState();
    refreshVoices();
  }

  function refreshVoices() {
    voices = synth.getVoices();
    if (!els.voiceSel) return;
    els.voiceSel.innerHTML = &quot;&quot;;
    voices.forEach(function (v, i) {
      var o = document.createElement(&quot;option&quot;);
      o.value = i; o.textContent = v.name + &quot; (&quot; + v.lang + &quot;)&quot;;
      els.voiceSel.appendChild(o);
    });
    if (!chosenVoice) chosenVoice = pickDefaultVoice();
    if (chosenVoice) els.voiceSel.value = String(voices.indexOf(chosenVoice));
  }

  // Voices load asynchronously in most browsers.
  if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = refreshVoices;

  // Stop narration when leaving the page (otherwise it keeps talking).
  window.addEventListener(&quot;beforeunload&quot;, function () { synth.cancel(); });

  document.addEventListener(&quot;DOMContentLoaded&quot;, buildBar);
})();

</script>
</body>
</html>

<script>
  const frames = [...document.querySelectorAll('.lesson-frame')];
  const picker = document.getElementById('picker');
  const prev = document.getElementById('prev');
  const next = document.getElementById('next');
  let cur = 0;
  function stopSpeech(i) {
    try { frames[i].contentWindow.speechSynthesis &&
           frames[i].contentWindow.speechSynthesis.cancel(); } catch (e) {}
  }
  function show(i) {
    i = Math.max(0, Math.min(frames.length - 1, i));
    if (i === cur) { return; }
    stopSpeech(cur);
    frames[cur].hidden = true;
    frames[i].hidden = false;
    cur = i;
    picker.value = String(i);
    prev.disabled = (i === 0);
    next.disabled = (i === frames.length - 1);
    document.getElementById('frames').scrollTop = 0;
  }
  picker.addEventListener('change', () => show(parseInt(picker.value, 10)));
  prev.addEventListener('click', () => show(cur - 1));
  next.addEventListener('click', () => show(cur + 1));
  prev.disabled = true;
</script>
